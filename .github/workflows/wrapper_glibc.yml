name: Build Linux glibc Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # [교정 완료] 기존 소스 리스트를 amd64 전용으로 고정하고, arm64 전용 ports 서버를 명확하게 분리 등록합니다.
      - name: 安装系统依赖
        run: |
          sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt install -y glslang-tools libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev \
              libxext-dev llvm-19 libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev \
              libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev \
              libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev python3-pip \
              python3-setuptools python3-wheel ninja-build

      - name: 安装 Python 构建工具
        run: |
          # 使用系统级的 pip 安装，避免用户级安装的路径问题
          #sudo pip3 install --upgrade pip
          sudo pip3 install meson mako
        
          # 验证安装
          echo "检查安装的 meson 版本:"
          meson --version
          python3 -c "import mesonbuild; print('mesonbuild 模块路径:', mesonbuild.__file__)"
        
          # 设置环境变量，确保能找到所有工具
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create Linux glibc Cross File
        run: |
          cat > /tmp/linux-cross.ini << 'EOF'
          [host_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = 'aarch64-linux-gnu-gcc'
          cpp = 'aarch64-linux-gnu-g++'
          ar = 'aarch64-linux-gnu-ar'
          strip = 'aarch64-linux-gnu-strip'
          pkgconfig = 'pkg-config'

          [built-in options]
          c_args = ['-fPIC']
          cpp_args = ['-fPIC']
          c_link_args = []
          cpp_link_args = []

          [env]
          PKG_CONFIG_PATH = '/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '/usr/lib/aarch64-linux-gnu/pkgconfig'
          EOF

      # [변경] 복잡한 안드로이드 패스 버퍼(LDFLAGS 등)를 제거하고 
      # termux-glibc 표준 경로 prefix를 선언합니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          meson setup build \
            --cross-file /tmp/linux-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dplatforms=x11 \
            --prefix=/data/data/com.termux/files/usr/glibc

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-glibc
          path: |
            mesa-src/build.log
            mesa-src/install
