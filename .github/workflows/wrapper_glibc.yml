name: Build Linux glibc Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    # ARM64 네이티브 가상 머신 사용 (aarch64 코드가 기본으로 컴파일됨)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt install -y glslang-tools libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev \
              libxext-dev llvm-19 libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev \
              libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev \
              libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev python3-pip \
              python3-setuptools python3-wheel ninja-build

      # [교정 완료] Mesa 빌드에 필수적인 pyyaml 패키지를 추가로 설치합니다.
      - name: 安装 Python 构建工具
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml

          meson --version
          python3 -c "import mesonbuild; print('mesonbuild 模块路径:', mesonbuild.__file__)"
          python3 -c "import yaml; print('PyYAML 모듈 정상 로드 완료')"

      # [변경] 크로스 파일 설정을 빼고 순수하게 Meson에게 환경변수 아키텍처 인자를 넘겨 빌드를 구성합니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          # 컴파일러가 PIC(위치 독립 코드)를 사용하도록 표준 환경변수 주입
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"

          # --cross-file 인자를 제거하여 네이티브 ARM64 컴파일을 유도합니다.
          meson setup build \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dplatforms=x11 \
            --prefix=/data/data/com.termux/files/usr/glibc

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-glibc
          path: |
            mesa-src/build.log
            mesa-src/install
