name: Build Linux glibc Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # [교정 완료] 기존 소스 리스트를 amd64 전용으로 고정하고, arm64 전용 ports 서버를 명확하게 분리 등록합니다.
      - name: Install Cross Compiler and Multiarch Dependencies
        run: |
          sudo dpkg --add-architecture arm64
          
          # 1. 기존 기본 리포지토리를 오직 [arch=amd64] 전용으로 재작성
          sudo cat > /etc/apt/sources.list << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse
          EOF

          # 2. arm64 패키지를 가져올 전용 ports 서버를 [arch=arm64] 전용으로 추가
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list

          # 3. 패키지 목록 업데이트 및 빌드 의존성 라이브러리 설치
          sudo apt update
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            glslang-tools \
            libx11-dev:arm64 \
            libxext-dev:arm64 \
            libxcb1-dev:arm64 \
            libxrandr-dev:arm64 \
            libxfixes-dev:arm64 \
            libxshmfence-dev:arm64 \
            libdrm-dev:arm64 \
            zlib1g-dev:arm64 \
            libzstd-dev:arm64

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Create Linux glibc Cross File
        run: |
          cat > /tmp/linux-cross.ini << 'EOF'
          [host_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = 'aarch64-linux-gnu-gcc'
          cpp = 'aarch64-linux-gnu-g++'
          ar = 'aarch64-linux-gnu-ar'
          strip = 'aarch64-linux-gnu-strip'
          pkgconfig = 'pkg-config'

          [built-in options]
          c_args = ['-fPIC']
          cpp_args = ['-fPIC']
          c_link_args = []
          cpp_link_args = []

          [env]
          PKG_CONFIG_PATH = '/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '/usr/lib/aarch64-linux-gnu/pkgconfig'
          EOF

      # [변경] 복잡한 안드로이드 패스 버퍼(LDFLAGS 등)를 제거하고 
      # termux-glibc 표준 경로 prefix를 선언합니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          meson setup build \
            --cross-file /tmp/linux-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dplatforms=x11 \
            --prefix=/data/data/com.termux/files/usr/glibc

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-glibc
          path: |
            mesa-src/build.log
            mesa-src/install
