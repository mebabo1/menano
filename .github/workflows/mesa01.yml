name: Build Mesa Turnip (glibc aarch64)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 1. 에뮬레이션 없는 네이티브 aarch64 환경 사용
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install glibc Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build patchelf flex bison git perl python3-pip \
            glslang-tools curl zip libdrm-dev libx11-dev \
            libxcb-dri3-dev libwayland-dev libxshmfence-dev \
            libxrandr-dev libxxf86vm-dev llvm-19 libgoogle-perftools-dev \
            libglvnd-dev libx11-xcb-dev libxcb-glx0-dev \
            libxcb-shm0-dev libxcb-present-dev libxcb-randr0-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-dri3-dev \
            libxcb-dri2-0-dev libxkbcommon-dev libzstd-dev
          
          # 안전한 설치
          pip3 install mako meson --user
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Drivers
        run: |
          # build_turnip.sh를 실행하기 전 환경 변수 주입
          chmod +x build_turnip.sh
          export BUILD_VERSION="${{ github.run_number }}"
          
          # 만약 스크립트가 없다면, 직접 빌드 명령어를 입력해도 됩니다.
          # 이 단계에서 첫 번째 코드의 'meson setup' 옵션들이 적용되어야 합니다.
          ./build_turnip.sh
      - name: Package Artifacts
        run: |
          # 1. 압축할 대상이 모여있는 폴더 확인
          # 스크립트에서 INSTALL_DIR=$WORK_DIR/install 로 설정했으므로 해당 경로를 참조합니다.
          # WORK_DIR=$(pwd)/turnip_workdir 였으므로 경로는 아래와 같습니다.
          
          SOURCE_PATH="turnip_workdir/install/usr"
          
          if [ -d "$SOURCE_PATH" ]; then
            echo "✅ 빌드 결과물 확인 완료. 압축을 시작합니다."
            # 2. 해당 폴더의 내용물만 압축 파일로 만듭니다.
            tar -czvf turnip-glibc-aarch64.tar.gz -C "$SOURCE_PATH" .
          else
            echo "❌ 에러: 빌드 결과물 폴더($SOURCE_PATH)를 찾을 수 없습니다."
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-Glibc-Drivers
          path: "*.tar.gz"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glibc-v${{ github.run_number }}
          name: Turnip Driver for glibc (v${{ github.run_number }})
          files: "*.tar.gz"
          body: |
            Turnip (Freedreno Vulkan) driver built for glibc environment.
            - Architecture: aarch64
            - Runner: ubuntu-24.04-arm (Native)
            - Download the full tar.gz package  
              ```bash  
              tar xf /sdcard/Download/turnip-glibc-aarch64.tar.gz -C $PREFIX/
              ```  
