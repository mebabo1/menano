name: Build termux-x11

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'img/**'
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'img/**'

permissions:
  contents: write
  
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
      
    - name: Java setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Gradle & Repair Wrapper
      run: |
        # Gradle 설치 및 환경 정리
        sudo apt-get update
        sudo apt-get install -y gradle
        
        # Jar 파일이 없거나 깨졌을 경우를 대비해 래퍼 재생성
        gradle wrapper
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Build companion package
      run: |
        if [ -f "./build_termux_package" ]; then
          chmod +x ./build_termux_package
          ./build_termux_package
        else
          echo "Companion build script not found, skipping."
        fi

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: termux-x11-debug-apks
        path: ./app/build/outputs/apk/debug/*.apk
    
    - name: Store companion package
      uses: actions/upload-artifact@v4
      with:
        name: termux-companion-packages
        path: |
          ./app/build/outputs/apk/debug/termux-x11-*-all.deb
          ./app/build/outputs/apk/debug/termux-x11-*-any.pkg.tar.xz
        
    - name: Store unstripped libraries
      uses: actions/upload-artifact@v4
      with:
        name: termux-x11-unstripped-libraries
        path: ./app/build/intermediates/cxx/Debug/*

    - name: Update Nightly Release
      uses: andelf/nightly-release@main
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: nightly
        name: 'Nightly Release ${{ github.sha }}'
        draft: false
        prerelease: false
        body: |
          This is a nightly release of the termux-x11 app.
          Based on ${{ github.sha }}
        files: |
          ./app/build/outputs/apk/debug/*.apk
          ./app/build/outputs/apk/debug/termux-x11-*-all.deb
          ./app/build/outputs/apk/debug/termux-x11-*-any.pkg.tar.xz
