name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip

          python -m pip install \
            meson \
            mako \
            pyyaml \
            ninja

      - name: Download Android NDK
        run: |
          cd /tmp

          wget -q \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # [추가] 치트키인 termuxfs를 다운로드하고 압축을 해제합니다.
      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          # 압축 해제 후 내부에 usr 폴더가 제대로 있는지 확인용 경로 설정
          if [ -d "$HOME/termuxfs/aarch64/usr" ]; then
            echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/usr" >> $GITHUB_ENV
          else
            echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          fi

      # [수정] sysroot와 링크 인자를 구글 순정 NDK 대신 termuxfs 경로로 지정합니다.
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin

          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          # 진짜 Termux 내부 환경을 sysroot로 바인딩
          sysroot = '$TERMUX_PREFIX'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          # termuxfs 내부에 빌드되어 있는 진짜 atomic과 shmem 라이브러리를 링크합니다.
          c_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic']
          cpp_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic']
          EOF

      # [수정] LDFLAGS 환경변수도 termuxfs 경로에 맞춰 정렬합니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          export LDFLAGS="-L$TERMUX_PREFIX/lib -landroid-shmem -latomic -static-libgcc"
          export CFLAGS="$CFLAGS -march=armv8-a"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src

          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            mesa-src/install
