name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    # 최신 Apple Silicon GitHub Runner
    runs-on: macos-15

    env:
      API_LEVEL: 30
      ANDROID_NDK_VERSION: r29

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            meson \
            mako \
            pyyaml \
            ninja

      - name: Install macOS Dependencies
        run: |
          brew update

          brew install \
            bison \
            flex \
            pkg-config \
            ninja \
            glslang

      # ------------------------------------------------------------
      # Android NDK 다운로드 및 안전 추출
      # ------------------------------------------------------------
      - name: Download Android NDK
        run: |
          cd /tmp

          curl -L -o android-ndk.dmg \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-darwin.dmg

      - name: Mount and Extract NDK
        run: |
          cd /tmp

          mkdir -p ndk_mount

          hdiutil attach android-ndk.dmg \
            -mountpoint /tmp/ndk_mount \
            -nobrowse \
            -readonly

          echo "=== Mounted Files ==="
          ls -la /tmp/ndk_mount

          INNER_DIR=$(find /tmp/ndk_mount -mindepth 1 -maxdepth 1 -type d | head -n 1)

          echo "Detected NDK Dir: $INNER_DIR"

          mkdir -p /tmp/android-ndk-${ANDROID_NDK_VERSION}

          cp -R "$INNER_DIR"/. /tmp/android-ndk-${ANDROID_NDK_VERSION}/

          hdiutil detach /tmp/ndk_mount

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Android Cross File 생성
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64/bin

          if [ ! -d "$TOOLCHAIN" ]; then
            TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-arm64/bin
          fi

          echo "Using toolchain: $TOOLCHAIN"

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          EOF

      # ------------------------------------------------------------
      # Mesa Configure
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src

          rm -rf build

          export LDFLAGS="-landroid-shmem -latomic"

          meson setup build \
            --cross-file android-aarch64.cross \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dshared-glapi=enabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dbuildtype=release \
            --prefix=/usr

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src

          ninja -C build 2>&1 | tee build.log

      # ------------------------------------------------------------
      # Install
      # ------------------------------------------------------------
      - name: Install Build
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      # ------------------------------------------------------------
      # Output 확인
      # ------------------------------------------------------------
      - name: Show Files
        run: |
          find mesa-src/install -type f || true

      # ------------------------------------------------------------
      # Artifact Upload
      # ------------------------------------------------------------
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build-macos
          path: |
            mesa-src/build.log
            mesa-src/build/meson-logs/
            mesa-src/install/
          retention-days: 5
