name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    # 1. macOS 14 (Apple Silicon M1 러너) 사용으로 속도 최적화
    runs-on: macos-latest

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      # ------------------------------------------------------------
      # [변경] apt를 무시하고 Homebrew를 사용해 필수 도구 다운로드
      # ------------------------------------------------------------
      - name: Install System Dependencies (macOS)
        run: |
          brew update
          brew install bison flex pkg-config ninja glslang

      # ------------------------------------------------------------
      # [변경] macOS용 Android NDK 다운로드 (해당 아카이브는 멀티 플랫폼 바이너리 포함)
      # ------------------------------------------------------------
      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-macos.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-macos.zip
          # 환경 변수에 NDK 경로 설정
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # [변경] 크로스 파일 내의 툴체인 경로를 linux에서 darwin으로 변경
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          # ★ 핵심: 맥 호스트에서는 toolchains 경로가 darwin-x86_64 입니다.
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-DANDROID']
          cpp_args = ['-DANDROID']
          EOF

      # ------------------------------------------------------------
      # Configure Step (Vulkan Wrapper 구조 유지)
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src
          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=/ \
            -Dplatforms=android \
            -Dandroid-stub=true \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dlibdrm=disabled \
            -Dintel-clc=disabled \
            -Dshared-glapi=enabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dzstd=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper

      # ------------------------------------------------------------
      # [변경] 빌드 코어를 활용하기 위해 sysctl 명령어 사용
      # ------------------------------------------------------------
      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(sysctl -n hw.logicalcpu) -v

      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      - name: Show Output
        run: |
          cd mesa-src
          echo "=== 생성된 라이브러리 파일 확인 ==="
          find install-output -type f || echo "No files installed."

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build-macos
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
