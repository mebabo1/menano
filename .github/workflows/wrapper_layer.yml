name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r26b
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src
          
          # anon_file.c의 시스템 콜 코드 표준 함수로 치환
          sed -i 's/syscall(SYS_memfd_create,/memfd_create(/g' mesa-src/src/util/anon_file.c

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          # Termux 경로 변수 정밀 확보
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV

      # [교정] -landroid-sysvshm 으로 실제 Termux 공유메모리 라이브러리명을 일치시킵니다.
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/android-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-idirafter$TERMUX_PREFIX/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-idirafter$TERMUX_PREFIX/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          c_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-sysvshm', '-latomic']
          cpp_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-sysvshm', '-latomic']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      - name: Configure Mesa
        run: |
          cd mesa-src

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_SYSROOT"

          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-sysvshm"
          
          export CFLAGS="-march=armv8-a -idirafter $TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export CXXFLAGS="-march=armv8-a -idirafter $TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -landroid-sysvshm -latomic"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      # [신설] 생성된 ICD JSON 명세서를 추출하여 이름과 내부 library_path 경로를 Termux 정석 포맷으로 강제 컨버팅합니다.
      - name: Process ICD JSON for Termux
        run: |
          mkdir -p output
          
          # 빌드 완료된 .so 파일 복사
          cp mesa-src/install/usr/lib/libvulkan_wrapper.so output/
          
          # 생성된 오리지널 JSON 탐색 및 추출
          ORIGINAL_JSON=$(find mesa-src/install -name "*.json" | head -n 1)
          
          if [ -f "$ORIGINAL_JSON" ]; then
            echo "Found ICD JSON: $ORIGINAL_JSON"
            # library_path 값을 Termux 내부에서 로드할 실제 소크 파일 절대경로 포맷으로 치환하여 저장
            sed 's|"library_path": ".*"|"library_path": "/data/data/com.termux/files/usr/lib/libvulkan_wrapper.so"|g' "$ORIGINAL_JSON" > output/wrapper_icd.aarch64.json
          else
            echo "⚠️ Warning: 오리지널 ICD json 파일이 자동 생성되지 않았습니다. 수동 빌드 구조용 백업 포맷을 생성합니다."
            cat > output/wrapper_icd.aarch64.json << 'EOF'
          {
              "file_format_version": "1.0.0",
              "ICD": {
                  "library_path": "/data/data/com.termux/files/usr/lib/libvulkan_wrapper.so",
                  "api_version": "1.3.255"
              }
          }
          EOF
          fi

      - name: Show Final Output Files
        run: |
          echo "=== Final Output Directory ==="
          ls -l output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-aarch64
          path: |
            mesa-src/build.log
            output/
