name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: macos-latest

    env:
      ANDROID_NDK_VERSION: r29
      API_LEVEL: 30

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            meson \
            mako \
            pyyaml \
            ninja

      - name: Install macOS Dependencies
        run: |
          brew update

          brew install \
            bison \
            flex \
            pkg-config \
            ninja \
            glslang

      - name: Download Android NDK
        run: |
          cd /tmp

          curl -L -o android-ndk.zip \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-darwin.dmg

          mkdir ndk_mount

          hdiutil attach android-ndk.zip -mountpoint ndk_mount

          INNER_DIR=$(find /Volumes -maxdepth 1 -name "AndroidNDK*" | head -n 1)

          cp -R "$INNER_DIR" /tmp/android-ndk-${ANDROID_NDK_VERSION}

          hdiutil detach "$INNER_DIR"

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Create Meson Cross File
        run: |
          TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64/bin"

          if [ ! -d "$TOOLCHAIN" ]; then
            TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-arm64/bin"
          fi

          echo "Using toolchain: $TOOLCHAIN"

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          EOF

      - name: Configure Mesa Wrapper
        run:
