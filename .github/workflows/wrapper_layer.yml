name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout Workspace
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Clone Mesa wrapper branch
      # ------------------------------------------------------------
      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      # ------------------------------------------------------------
      # Python
      # ------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------
      # Python packages
      # ------------------------------------------------------------
      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      # ------------------------------------------------------------
      # Linux build dependencies
      # ------------------------------------------------------------
      - name: Install System Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libdrm-dev \
            libexpat1-dev \
            libelf-dev \
            libzstd-dev \
            zlib1g-dev \
            glslang-tools

      # ------------------------------------------------------------
      # Android NDK
      # ------------------------------------------------------------
      - name: Download Android NDK
        run: |
          cd /tmp

          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Create Android cross file
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-DANDROID', '-D__ANDROID_API__=${API_LEVEL}']
          cpp_args = ['-DANDROID', '-D__ANDROID_API__=${API_LEVEL}']
          EOF

      # ------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src

          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=$PWD/install-root \
            -Dplatforms=android \
            -Dplatform-sdk-version=${API_LEVEL} \
            -Dandroid-stub=false \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Degl=enabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=true \
            -Dgallium-drivers=zink \
            -Dvulkan-drivers=freedreno

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(nproc)

      # ------------------------------------------------------------
      # Install
      # ------------------------------------------------------------
      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      # ------------------------------------------------------------
      # Show output
      # ------------------------------------------------------------
      - name: Show Generated Files
        run: |
          cd mesa-src

          echo "=== Wrapper Libraries ==="
          find build -iname "*wrapper*" || true

          echo "=== Vulkan Libraries ==="
          find install-output -iname "*.so" || true

          echo "=== Vulkan JSON Files ==="
          find install-output -iname "*.json" || true

      # ------------------------------------------------------------
      # Upload artifacts
      # ------------------------------------------------------------
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
