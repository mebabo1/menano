name: macOS-CI

on: 
  push:
  workflow_dispatch: # 수동 실행 버튼 추가

permissions:
  contents: read

jobs:
  macOS-CI:
    strategy:
      matrix:
        glx_option: ['xlib']

    runs-on: ubuntu-24.04

    steps:
    # 1. 워크플로우 실행을 위해 기본 저장소 체크아웃 (기본 환경 설정용)
    - name: Initialize Workspace
      uses: actions/checkout@v4

    # 2. 외부 GitLab 저장소에서 wrapper-25 브랜치 직접 가져오기
    - name: Clone GitLab Repository
      run: |
        git clone --depth 1 --branch wrapper-25 https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git mesa-src

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装系统依赖
      run: |
        sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
        sudo apt update
        sudo apt install -y glslang-tools libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev \
            libxext-dev llvm-19 libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev \
            libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev python3-pip \
            python3-setuptools python3-wheel ninja-build

    - name: 安装 Python 构建工具
      run: |
        # 使用系统级的 pip 安装，避免用户级安装的路径问题
        #sudo pip3 install --upgrade pip
        sudo pip3 install meson mako

    - name: Configure Mesa Wrapper Build
      run: |
        cd mesa-src
        rm -rf build

        meson setup build \
          --buildtype=debugoptimized \
          -Dprefix=$PWD/install-root \
          -Dbuild-tests=false \
          -Dllvm=enabled \
          -Dosmesa=true \
          -Degl=enabled \
          -Dgbm=disabled \
          -Dshared-glapi=enabled \
          -Dglx=dri \
          -Dplatforms=x11,android \
          -Dplatform-sdk-version=26 \
          -Dandroid-stub=true \
          -Dgallium-drivers=freedreno,zink,swrast \
          -Dvulkan-drivers=freedreno,swrast

    - name: Build
      run: |
        cd mesa-src
        meson compile -C build -j$(nproc)

    - name: Install
      run: |
        cd mesa-src
        meson install -C build --destdir $PWD/install-output

    - name: Show Results
      run: |
        cd mesa-src
        echo "--- Libraries found ---"
        find build -name "*wrapper*" || true
        find install-output -name "*.so" || true
        find install-output -name "*.json" || true

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-wrapper25-${{ matrix.glx_option }}
        path: |
          mesa-src/build/meson-logs/
          mesa-src/install-output/
        retention-days: 5
