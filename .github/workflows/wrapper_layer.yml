name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip

          python -m pip install \
            meson \
            mako \
            pyyaml \
            ninja

      - name: Download Android NDK
        run: |
          cd /tmp

          wget -q \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # [통합 및 수정] fake libatomic 생성 및 libandroid-shmem 빌드를 한 번에 처리합니다.
      - name: Build External Dependencies (Atomic & Shmem)
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          # 의존성 파일들을 모아둘 전용 디렉토리 생성
          mkdir -p /tmp/ndk-deps/lib /tmp/ndk-deps/include/sys

          # 1. 가짜 libatomic.a 생성
          cat > /tmp/fake-atomic.c <<EOF
          void __atomic_fetch_add_8() {}
          void __atomic_fetch_sub_8() {}
          void __atomic_load_8() {}
          void __atomic_store_8() {}
          EOF

          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -c /tmp/fake-atomic.c -o /tmp/fake-atomic.o
          $TOOLCHAIN/llvm-ar rcs /tmp/ndk-deps/lib/libatomic.a /tmp/fake-atomic.o

          # 2. libandroid-shmem 다운로드 및 빌드 (Bionic libc 누락 매크로 패치 포함)
          git clone --depth 1 https://github.com/termux/libandroid-shmem.git /tmp/libandroid-shmem
          cd /tmp/libandroid-shmem
          
          echo '#define _PATH_TMP "/tmp/"' > shmem.c.new
          cat shmem.c >> shmem.c.new
          mv shmem.c.new shmem.c

          export CC="$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang"
          make
          
          # 결과를 통합 디렉토리로 이동
          cp libandroid-shmem.so /tmp/ndk-deps/lib/
          cp shm.h /tmp/ndk-deps/include/sys/

      # [수정] 크로스 파일에 생성한 의존성 라이브러리 경로(-I, -L)를 바인딩합니다.
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I/tmp/ndk-deps/include']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I/tmp/ndk-deps/include']
          c_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-L/tmp/ndk-deps/lib', '-landroid-shmem', '-latomic']
          cpp_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-L/tmp/ndk-deps/lib', '-landroid-shmem', '-latomic']
          EOF

      # [수정] LDFLAGS 환경변수 경로를 통합 디렉토리 타겟으로 정렬합니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          export LDFLAGS="-L/tmp/ndk-deps/lib -landroid-shmem -latomic -static-libgcc"
          export CFLAGS="$CFLAGS -march=armv8-a"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src

          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            mesa-src/install
