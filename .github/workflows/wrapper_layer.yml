name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # Termux 환경의 Sysroot 파일들을 다운로드합니다.
      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          # 압축 해제된 내부에 'usr' 폴더가 있는 위치를 정확하게 찾아서 가리킵니다.
          REAL_PREFIX=$(find $HOME/termuxfs/aarch64 -type d -name "usr" | head -n 1)
          if [ -z "$REAL_PREFIX" ]; then
            REAL_PREFIX=$HOME/termuxfs/aarch64
          fi
          echo "TERMUX_PREFIX=$REAL_PREFIX" >> $GITHUB_ENV

      # 1. 크로스 파일에 pkg-config 정상화 및 과거 성공 플래그 녹여내기
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          # termuxfs의 include 경로와 과거 성공했던 플래그들을 결합
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          c_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic']
          cpp_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic']

          # pkg-config가 termuxfs 내부를 바라보도록 강제 조정
          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_PREFIX'
          EOF

      # 2. Configure Mesa 스텝에 과거 성공했던 환경변수 직접 주입
      - name: Configure Mesa
        run: |
          cd mesa-src

          # [핵심] 과거에 성공하셨던 X11 관련 수동 주입 환경변수를 선언합니다.
          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-shmem -latomic"
          
          # 기본 컴파일/링크 플래그도 한 번 더 단단히 고정
          export CFLAGS="$CFLAGS -march=armv8-a -I$TERMUX_PREFIX/include"
          export CXXFLAGS="$CXXFLAGS -march=armv8-a -I$TERMUX_PREFIX/include"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -landroid-shmem -latomic"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            mesa-src/install
