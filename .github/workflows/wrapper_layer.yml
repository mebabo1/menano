name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: macos-14

    env:
      API_LEVEL: 30
      ANDROID_NDK_VERSION: r26d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          brew update

          brew install \
            meson \
            ninja \
            pkg-config \
            bison \
            flex \
            glslang

          python -m pip install --upgrade pip
          python -m pip install mako pyyaml

      - name: Download Android NDK
        run: |
          cd /tmp
          # macOS용 NDK는 .zip으로 다운로드해야 합니다.
          curl -LO \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-darwin.zip

          # 압축 해제
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-darwin.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Detect NDK Toolchain
        run: |
          # macOS 환경에서 NDK 툴체인 경로는 'darwin-x86_64'로 고정됩니다.
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          
          # 환경 변수로 내보내기
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV

          echo "Detected toolchain: $TOOLCHAIN"
          echo "Detected sysroot: $SYSROOT"

      - name: Create Cross File
        run: |
          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC']
          # 아래 링크 인자(link_args)들을 추가하여 Meson이 내부 체크 시 무조건 참조하도록 합니다.
          c_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-landroid-shmem', '-latomic']
          cpp_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-landroid-shmem', '-latomic']
          EOF

      - name: Configure Mesa
        run: |
          cd mesa-src

          export LDFLAGS="-landroid-shmem -latomic"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src

          ninja -C build 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-macos
          path: |
            mesa-src/build.log
            mesa-src/install
