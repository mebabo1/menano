name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: macos-14

    env:
      API_LEVEL: 30
      ANDROID_NDK_VERSION: r26d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          brew update

          brew install \
            meson \
            ninja \
            pkg-config \
            bison \
            flex \
            glslang

          python -m pip install --upgrade pip
          python -m pip install mako pyyaml

      - name: Download Android NDK
        run: |
          cd /tmp
          # macOS용 NDK는 .zip으로 다운로드해야 합니다.
          curl -LO \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-darwin.zip

          # 압축 해제
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-darwin.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Detect NDK Toolchain
        run: |
          # macOS 환경에서 NDK 툴체인 경로는 'darwin-x86_64'로 고정됩니다.
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          
          # 환경 변수로 내보내기
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV

          echo "Detected toolchain: $TOOLCHAIN"
          echo "Detected sysroot: $SYSROOT"

      # 순정 NDK에 없는 Termux 전용 shmem 라이브러리를 직접 빌드하여 주입합니다.
      - name: Build and Install libandroid-shmem
        run: |
          git clone --depth 1 https://github.com/termux/libandroid-shmem.git /tmp/libandroid-shmem
          cd /tmp/libandroid-shmem
          
          # NDK Clang을 사용하여 가짜 shmem 라이브러리 컴파일
          export CC="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang"
          make
          
          # Mesa 빌드가 참조할 수 있도록 임시 디렉토리에 배치
          mkdir -p /tmp/termux-deps/include/sys /tmp/termux-deps/lib
          cp libandroid-shmem.so /tmp/termux-deps/lib/
          cp shm.h /tmp/termux-deps/include/sys/

      # -latomic을 제거하고 가짜 shmem 헤더/라이브러리 경로를 추가했습니다.
      - name: Create Cross File
        run: |
          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC', '-I/tmp/termux-deps/include']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '-fPIC', '-I/tmp/termux-deps/include']
          c_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-L/tmp/termux-deps/lib', '-landroid-shmem']
          cpp_link_args = ['-L$SYSROOT/usr/lib/aarch64-linux-android', '-L/tmp/termux-deps/lib', '-landroid-shmem']
          EOF

      # LDFLAGS 환경변수에서도 -latomic을 제거하고 빌드 경로를 연결했습니다.
      - name: Configure Mesa
        run: |
          cd mesa-src

          export LDFLAGS="-L/tmp/termux-deps/lib -landroid-shmem"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src

          ninja -C build 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-macos
          path: |
            mesa-src/build.log
            mesa-src/install
