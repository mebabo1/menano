name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # Termux нҷҳкІҪмқҳ Sysroot нҢҢмқјл“Өмқ„ лӢӨмҡҙлЎңл“ңн•©лӢҲлӢӨ.
      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          # м••м¶• н•ҙм ңлҗң лӮҙл¶Җм—җ 'usr' нҸҙлҚ”к°Җ мһҲлҠ” мң„м№ҳлҘј м •нҷ•н•ҳкІҢ м°ҫм•„м„ң к°ҖлҰ¬нӮөлӢҲлӢӨ.
          REAL_PREFIX=$(find $HOME/termuxfs/aarch64 -type d -name "usr" | head -n 1)
          if [ -z "$REAL_PREFIX" ]; then
            REAL_PREFIX=$HOME/termuxfs/aarch64
          fi
          echo "TERMUX_PREFIX=$REAL_PREFIX" >> $GITHUB_ENV

      # [көҗм •] pkgconfig м§Җм •мқ„ м°ЁлӢЁн•ҳкі  м»ҙнҢҢмқјлҹ¬м—җ лқјмқҙлёҢлҹ¬лҰ¬ кІҪлЎңлҘј лӢӨмқҙл үнҠёлЎң кҪӮм•„мӨҚлӢҲлӢӨ.
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          # нҳёмҠӨнҠёмқҳ мҳӨмһ‘лҸҷн•ҳлҠ” pkg-config кІҖмғүмқ„ к°•м ңлЎң мҡ°нҡҢмӢңнӮөлӢҲлӢӨ.
          pkgconfig = 'false'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          # termuxfsмқҳ includeмҷҖ lib кІҪлЎңлҘј л№Ңл“ң мҳөм…ҳм—җ м§Ғм ‘ н•ҳл“ңмҪ”л”©н•©лӢҲлӢӨ.
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-fPIC', '-I$TERMUX_PREFIX/include']
          c_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic', '-lxcb', '-lxcb-randr']
          cpp_link_args = ['-L$TERMUX_PREFIX/lib', '-landroid-shmem', '-latomic', '-lxcb', '-lxcb-randr']
          EOF

      # [көҗм •] м „м—ӯ л№Ңл“ң н”Ңлһҳк·ём—җм„ңлҸ„ xcb л°Ҹ мқҳмЎҙм„ұл“Өмқ„ мҲҳлҸҷ к°•м ң л§Өн•‘н•©лӢҲлӢӨ.
      - name: Configure Mesa
        run: |
          cd mesa-src

          export CFLAGS="$CFLAGS -march=armv8-a -I$TERMUX_PREFIX/include"
          export CXXFLAGS="$CXXFLAGS -march=armv8-a -I$TERMUX_PREFIX/include"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -landroid-shmem -latomic -lxcb -lxcb-randr"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            mesa-src/install
