name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r26b
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src
            
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      # [교정 완료] 성공한 유저의 핵심 3대 플래그(-U__ANDROID__, --target, -landroid-shmem)를 크로스 파일 빌드 옵션에 주입
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/android-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30', '-fPIC', '-idirafter$TERMUX_PREFIX/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30', '-fPIC', '-idirafter$TERMUX_PREFIX/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=$RUNTIME_PATH/lib', '-landroid-shmem']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=$RUNTIME_PATH/lib', '-landroid-shmem']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      # [교정 완료] 런타임 환경변수 빌드 플래그에도 동일한 제어 플래그 전면 적용 및 -Dplatforms=x11 복귀
      - name: Configure Mesa
        run: |
          cd mesa-src

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_SYSROOT"

          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-shmem"
          
          export CFLAGS="-U__ANDROID__ --target=aarch64-linux-android30 -I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export CXXFLAGS="-U__ANDROID__ --target=aarch64-linux-android30 -I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export LDFLAGS="--target=aarch64-linux-android30 -L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dplatforms=x11 \
            --prefix=/data/data/com.termux/files/usr

      - name: Build
        run: |
          cd mesa-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Process ICD JSON for Termux
        run: |
          mkdir -p output
          cp mesa-src/install/data/data/com.termux/files/usr/lib/libvulkan_wrapper.so output/ 2>/dev/null || cp $(find mesa-src/install -name "libvulkan_wrapper.so") output/
          
          ORIGINAL_JSON=$(find mesa-src/install -name "*.json" | head -n 1)
          if [ -f "$ORIGINAL_JSON" ]; then
            sed 's|"library_path": ".*"|"library_path": "/data/data/com.termux/files/usr/lib/libvulkan_wrapper.so"|g' "$ORIGINAL_JSON" > output/wrapper_icd.aarch64.json
          else
            cat > output/wrapper_icd.aarch64.json << 'EOF'
          {
              "file_format_version": "1.0.0",
              "ICD": {
                  "library_path": "/data/data/com.termux/files/usr/lib/libvulkan_wrapper.so",
                  "api_version": "1.3.255"
              }
          }
          EOF
          fi

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f
          echo "=== Output Folder ==="
          ls -l output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            output/
