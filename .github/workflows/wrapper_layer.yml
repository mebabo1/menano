name: Build Android Vulkan Wrapper on macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    # 1. macOS 14 (Apple Silicon M1 러너) 사용으로 속도 최적화
    runs-on: macos-latest

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      # ------------------------------------------------------------
      # [변경] apt를 무시하고 Homebrew를 사용해 필수 도구 다운로드
      # ------------------------------------------------------------
      - name: Install System Dependencies (macOS)
        run: |
          brew update
          brew install bison flex pkg-config ninja glslang


      # ------------------------------------------------------------
      # [최신 패치] .dmg 파일을 다운로드하고 가상 디스크를 마운트하여 추출합니다.
      # ------------------------------------------------------------
      - name: Download and Extract Android NDK (.dmg)
        run: |
          cd /tmp
          
          # 1. 구글 저장소에서 .dmg 파일 다운로드 (r27c도 .dmg 포맷 제공)
          curl -L -O https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-darwin.dmg
          
          # 2. macOS 시스템 명령어로 dmg 파일 조용히 마운트 (마운트된 경로 추출)
          MOUNT_DIR=$(hdiutil attach -nobrowse -readonly android-ndk-${ANDROID_NDK_VERSION}-darwin.dmg | grep -o '/Volumes/.*')
          echo "NDK 마운트 경로: $MOUNT_DIR"
          
          # 3. 마운트된 볼륨 안의 NDK 폴더를 /tmp/android-ndk-r27c 위치로 통째로 복사
          # (보통 볼륨 내부에 폴더 형태로 들어있으므로 전체를 이관합니다)
          cp -R "$MOUNT_DIR"/android-ndk-${ANDROID_NDK_VERSION} /tmp/android-ndk-${ANDROID_NDK_VERSION}
          
          # 4. 사용이 끝난 dmg 디스크 언마운트(추출) 및 가상파일 삭제
          hdiutil detach "$MOUNT_DIR"
          rm android-ndk-${ANDROID_NDK_VERSION}-darwin.dmg
          
          # 5. 다음 단계에서 사용할 수 있도록 환경 변수 주입
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # [변경] 크로스 파일 내의 툴체인 경로를 linux에서 darwin으로 변경
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          # ★ 핵심: 맥 호스트에서는 toolchains 경로가 darwin-x86_64 입니다.
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/darwin-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-DANDROID']
          cpp_args = ['-DANDROID']
          EOF

      # ------------------------------------------------------------
      # Configure Step (Vulkan Wrapper 구조 유지)
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src
          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=/ \
            -Dplatforms=android \
            -Dandroid-stub=true \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dlibdrm=disabled \
            -Dintel-clc=disabled \
            -Dshared-glapi=enabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dzstd=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper

      # ------------------------------------------------------------
      # [변경] 빌드 코어를 활용하기 위해 sysctl 명령어 사용
      # ------------------------------------------------------------
      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(sysctl -n hw.logicalcpu) -v

      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      - name: Show Output
        run: |
          cd mesa-src
          echo "=== 생성된 라이브러리 파일 확인 ==="
          find install-output -type f || echo "No files installed."

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build-macos
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
