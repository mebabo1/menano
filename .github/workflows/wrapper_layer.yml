name: Build Wrapper Layer (Termux/Bionic Style)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      ANDROID_NDK_VERSION: r27c
      API_LEVEL: 26

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout Workspace
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Clone wrapper-25 branch
      # ------------------------------------------------------------
      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      # ------------------------------------------------------------
      # Python
      # ------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      # ------------------------------------------------------------
      # Android NDK
      # ------------------------------------------------------------
      - name: Setup Android NDK
        run: |
          cd /tmp

          wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Linux build deps
      # ------------------------------------------------------------
      - name: Install Build Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            bison \
            flex \
            cmake \
            python3-dev \
            libdrm-dev \
            libexpat1-dev \
            libelf-dev \
            libzstd-dev \
            zlib1g-dev \
            libxcb1-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-shm0-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libxshmfence-dev \
            wayland-protocols \
            libwayland-dev \
            glslang-tools

      # ------------------------------------------------------------
      # Android cross file
      # ------------------------------------------------------------
      - name: Create Meson Android Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          c_args = [
            '-DANDROID',
            '-D__ANDROID_API__=${API_LEVEL}'
          ]

          cpp_args = [
            '-DANDROID',
            '-D__ANDROID_API__=${API_LEVEL}'
          ]
          EOF

      # ------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src

          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=$PWD/install-root \
            -Dplatforms=android \
            -Dplatform-sdk-version=${API_LEVEL} \
            -Dandroid-stub=false \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Degl=enabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=freedreno \
            -Dbuild-tests=false

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(nproc)

      # ------------------------------------------------------------
      # Install
      # ------------------------------------------------------------
      - name: Install Build Output
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      # ------------------------------------------------------------
      # Show output
      # ------------------------------------------------------------
      - name: Show Wrapper Files
        run: |
          cd mesa-src

          echo "=== Wrapper libraries ==="
          find build -iname "*wrapper*" || true

          echo "=== Vulkan libraries ==="
          find install-output -iname "*.so" || true

          echo "=== Vulkan ICD json ==="
          find install-output -iname "*.json" || true

      # ------------------------------------------------------------
      # Upload
      # ------------------------------------------------------------
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-android-aarch64
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
