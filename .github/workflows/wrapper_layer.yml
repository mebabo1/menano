name: macOS-CI

on: 
  push:
  workflow_dispatch: # 수동 실행 버튼 추가

permissions:
  contents: read

jobs:
  macOS-CI:
    strategy:
      matrix:
        glx_option: ['xlib']

    # macos-11은 더 이상 지원되지 않으므로 13(Intel)으로 변경
    runs-on: macos-latest

    steps:
    - name: Checkout wrapper-25
      uses: actions/checkout@v4 # v3 -> v4 업데이트
      with:
        ref: wrapper-25

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        # LLVM은 빌드에 필수적이므로 명시적으로 설치
        brew update
        brew install bison expat gettext libx11 libxcb libxdamage libxext llvm molten-vk ninja pkg-config mako

    - name: Install Meson and Mako
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja mako

    - name: Configure Mesa Wrapper Build
      run: |
        # LLVM 경로를 동적으로 확인하여 native_config 작성
        LLVM_PATH=$(brew --prefix llvm)
        cat > native_config <<EOL
        [binaries]
        llvm-config = '$LLVM_PATH/bin/llvm-config'
        EOL

        rm -rf build

        # meson 직접 실행 (경로 하드코딩 제거)
        meson setup build \
          --native-file=native_config \
          --buildtype=debugoptimized \
          -Dprefix=$PWD/install-root \
          -Dmoltenvk-dir=$(brew --prefix molten-vk) \
          -Dbuild-tests=false \
          -Dllvm=enabled \
          -Dosmesa=true \
          -Degl=enabled \
          -Dgbm=enabled \
          -Dshared-glapi=enabled \
          -Dglx=${{ matrix.glx_option }} \
          -Dplatforms=x11,android \
          -Dplatform-sdk-version=26 \
          -Dandroid-stub=true \
          -Dgallium-drivers=freedreno,zink,swrast \
          -Dvulkan-drivers=freedreno,swrast

    - name: Build
      run: |
        meson compile -C build -j$(sysctl -n hw.logicalcpu)

    - name: Install
      run: |
        # destdir는 절대경로로 지정하는 것이 안전합니다.
        meson install -C build --destdir $PWD/install-output

    - name: Show Results
      run: |
        echo "--- Libraries found ---"
        find build -name "*wrapper*" || true
        find install-output -name "*.so" || true
        find install-output -name "*.json" || true

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4 # v3 -> v4 업데이트
      with:
        name: macos-wrapper25-${{ matrix.glx_option }}
        path: |
          build/meson-logs/
          install-output/
        retention-days: 5
