name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config \
            ninja-build cmake bison flex \
            python3-dev libexpat1-dev libelf-dev libzstd-dev zlib1g-dev glslang-tools

      # ------------------------------------------------------------
      # [수정 반영 1] 컴파일러를 속일 가짜 DRM 헤더 껍데기 생성
      # ------------------------------------------------------------
      - name: Create Fake DRM Headers
        run: |
          # 컴파일러가 #include <xf86drm.h>를 만났을 때 읽어갈 빈 껍데기 파일들을 만듭니다.
          mkdir -p /tmp/fake-drm
          touch /tmp/fake-drm/xf86drm.h
          touch /tmp/fake-drm/xf86drmMode.h

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # [수정 반영 2] 크로스 파일 컴파일러 옵션에 가짜 경로 강제 주입
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          pkgconfig = 'pkg-config' # 순정 pkg-config 상태 유지 (wrapper 드라이버는 이를 무시함)

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          # 컴파일러가 소스 코드를 읽을 때 /tmp/fake-drm을 최우선으로 뒤지게 만듭니다.
          c_args = ['-DANDROID', '-I/tmp/fake-drm']
          cpp_args = ['-DANDROID', '-I/tmp/fake-drm']
          EOF

      # ------------------------------------------------------------
      # Configure Step (Vulkan Wrapper 전용 최적화)
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src
          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=/ \
            -Dplatforms=android \
            -Dandroid-stub=true \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dzstd=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper

      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(nproc) -v

      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      - name: Show Output
        run: |
          cd mesa-src
          echo "=== 생성된 라이브러리 파일 확인 ==="
          find install-output -type f || echo "No files installed."

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
