name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config \
            ninja-build cmake bison flex \
            python3-dev libexpat1-dev libelf-dev libzstd-dev zlib1g-dev glslang-tools

      # ------------------------------------------------------------
      # [핵심 패치 1] 가짜 pkg-config 도구 및 무해한 libdrm 헤더 스텁 생성
      # ------------------------------------------------------------
      - name: Create Fake Pkg-Config and Libdrm Stubs
        run: |
          # 1. 컴파일러가 낚여서 바라볼 가짜 헤더 폴더 및 빈 파일 생성
          mkdir -p /tmp/libdrm-stub
          touch /tmp/libdrm-stub/xf86drm.h
          touch /tmp/libdrm-stub/xf86drmMode.h

          # 2. Meson의 탐색 레이어를 속이기 위한 맞춤형 가짜 pkg-config 스크립트 작성
          cat > /tmp/fake-pkg-config <<'EOF'
          #!/bin/bash
          # Meson이 도구 버전 요구 시 정상 응답
          if [ "$1" == "--version" ]; then
              echo "0.29.2"
              exit 0
          fi
          # libdrm을 물어보면 호스트(/usr/include) 경로 대신 우리가 만든 가짜 경로를 던짐
          if echo "$*" | grep -q "libdrm"; then
              if echo "$*" | grep -q "--exists"; then
                  exit 0
              fi
              if echo "$*" | grep -q "--cflags"; then
                  echo "-I/tmp/libdrm-stub"
                  exit 0
              fi
              if echo "$*" | grep -q "--libs"; then
                  echo "" # 라이브러리 링크는 필요 없으므로 빈 값 리턴
                  exit 0
              fi
              if echo "$*" | grep -q "--modversion"; then
                  echo "2.4.125"
                  exit 0
              fi
          fi
          exit 1
          EOF
          
          chmod +x /tmp/fake-pkg-config

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # [핵심 패치 2] 크로스 파일의 pkgconfig 경로를 가짜 도구로 변경
      # ------------------------------------------------------------
      - name: Create Meson Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          # /bin/false 대신 커스텀 가짜 pkg-config를 강제 지정합니다.
          pkgconfig = '/tmp/fake-pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-DANDROID']
          cpp_args = ['-DANDROID']
          EOF

      # ------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------
      - name: Configure Mesa Wrapper
        run: |
          cd mesa-src
          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=/ \
            -Dplatforms=android \
            -Dandroid-stub=true \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dzstd=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper

      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(nproc) -v

      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      - name: Show Output
        run: |
          cd mesa-src
          echo "=== 생성된 라이브러리 목록 ==="
          find install-output -type f || echo "No files installed."

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
