name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      ANDROID_NDK_VERSION: r27c
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Mesa Wrapper
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools

          python -m pip install --upgrade pip

          python -m pip install \
            meson \
            mako \
            pyyaml \
            ninja

      - name: Download Android NDK
        run: |
          cd /tmp

          wget -q \
            https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip

          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Create Android Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          cat > /tmp/android-cross.ini <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = [
            '-D__TERMUX__',
            '-D__USE_GNU',
            '-fPIC'
          ]

          cpp_args = [
            '-D__TERMUX__',
            '-D__USE_GNU',
            '-fPIC'
          ]
          EOF

      - name: Configure Mesa
        run: |
          cd mesa-src

          export LDFLAGS="-landroid-shmem"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dcpp_rtti=false \
            -Dopengl=false \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dxmlconfig=disabled \
            -Dbuild-tests=false \
            -Dinstall-intel-gpu-tests=false \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper \
            -Dvulkan-layers= \
            -Dplatforms=x11 \
            -Dzstd=disabled \
            -Dvideo-codecs= \
            -Dbuildtype=release \
            --prefix=/usr

      - name: Build
        run: |
          cd mesa-src

          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd mesa-src

          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find mesa-src/install -type f

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper
          path: |
            mesa-src/build.log
            mesa-src/install
