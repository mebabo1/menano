name: macOS-CI

on: 
  push:
  workflow_dispatch: # 수동 실행 버튼 추가

permissions:
  contents: read

jobs:
  macOS-CI:
    strategy:
      matrix:
        glx_option: ['xlib']

    runs-on: macos-latest

    steps:
    # 1. 워크플로우 실행을 위해 기본 저장소 체크아웃 (기본 환경 설정용)
    - name: Initialize Workspace
      uses: actions/checkout@v4

    # 2. 외부 GitLab 저장소에서 wrapper-25 브랜치 직접 가져오기
    - name: Clone GitLab Repository
      run: |
        git clone --depth 1 --branch wrapper-25 https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git mesa-src

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        brew update
        brew install bison expat gettext libx11 libxcb libxdamage libxext llvm molten-vk ninja pkg-config mako

    - name: Install Meson and Mako
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja mako

    - name: Configure Mesa Wrapper Build
      run: |
        LLVM_PATH=$(brew --prefix llvm)
        
        cat > mesa-src/native_config <<EOL
        [binaries]
        llvm-config = '$LLVM_PATH/bin/llvm-config'
        EOL

        cd mesa-src
        rm -rf build

        meson setup build \
          --native-file=native_config \
          --buildtype=debugoptimized \
          -Dprefix=$PWD/install-root \
          -Dmoltenvk-dir=$(brew --prefix molten-vk) \
          -Dbuild-tests=false \
          -Dllvm=enabled \
          -Dosmesa=true \
          -Degl=enabled \
          -Dgbm=disabled \
          -Dshared-glapi=enabled \
          -Dglx=dri \
          -Dplatforms=x11,android \
          -Dplatform-sdk-version=26 \
          -Dandroid-stub=true \
          -Dgallium-drivers=freedreno,zink,swrast \
          -Dvulkan-drivers=freedreno,swrast

    - name: Build
      run: |
        cd mesa-src
        meson compile -C build -j$(sysctl -n hw.logicalcpu)

    - name: Install
      run: |
        cd mesa-src
        meson install -C build --destdir $PWD/install-output

    - name: Show Results
      run: |
        cd mesa-src
        echo "--- Libraries found ---"
        find build -name "*wrapper*" || true
        find install-output -name "*.so" || true
        find install-output -name "*.json" || true

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-wrapper25-${{ matrix.glx_option }}
        path: |
          mesa-src/build/meson-logs/
          mesa-src/install-output/
        retention-days: 5
