name: Build Android Vulkan Wrapper

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-24.04

    env:
      API_LEVEL: 26
      ANDROID_NDK_VERSION: r27c

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout Workspace
        uses: actions/checkout@v4

      # -----------------------------
      # Clone Mesa
      # -----------------------------
      - name: Clone Mesa Wrapper Source
        run: |
          git clone --depth 1 \
            --branch wrapper-25 \
            https://gitlab.freedesktop.org/Pipetto-crypto/mesa.git \
            mesa-src

      # -----------------------------
      # Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      # -----------------------------
      # System deps (X11 FULL)
      # -----------------------------
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config \
            ninja-build cmake bison flex \
            python3-dev libdrm-dev libexpat1-dev \
            libelf-dev libzstd-dev zlib1g-dev \
            libssl-dev glslang-tools \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-glx0-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-sync-dev libxcb-randr0-dev \
            libxcb-present-dev libxcb-dri3-dev \
            libxrandr-dev libxfixes-dev libxshmfence-dev

      # -----------------------------
      # Android NDK
      # -----------------------------
      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # -----------------------------
      # Cross file
      # -----------------------------
      - name: Create Meson Cross File
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64

          cat > mesa-src/android-aarch64.cross <<EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'

          [binaries]
          c = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang'
          cpp = '$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++'
          ar = '$TOOLCHAIN/bin/llvm-ar'
          strip = '$TOOLCHAIN/bin/llvm-strip'
          c_ld = '$TOOLCHAIN/bin/ld.lld'
          cpp_ld = '$TOOLCHAIN/bin/ld.lld'
          pkgconfig = 'pkg-config'

          [properties]
          needs_exe_wrapper = true

          [built-in options]
          c_args = ['-DANDROID']
          cpp_args = ['-DANDROID']
          EOF

      # -----------------------------
      # Configure
      # -----------------------------
      - name: Configure Mesa Wrapper (X11 + Vulkan wrapper)
        run: |
          cd mesa-src
          rm -rf build

          meson setup build \
            --cross-file android-aarch64.cross \
            --buildtype=release \
            -Dprefix=$PWD/install-root \
            -Dplatforms=android \
            -Dandroid-stub=true \
            -Dbuild-tests=false \
            -Dllvm=disabled \
            -Dshared-glapi=enabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dglx=disabled \
            -Dosmesa=false \
            -Dopengl=false \
            -Dzstd=disabled \
            -Dgallium-drivers= \
            -Dvulkan-drivers=wrapper

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build Vulkan Wrapper
        run: |
          cd mesa-src
          meson compile -C build -j$(nproc) -v

      # -----------------------------
      # Install
      # -----------------------------
      - name: Install Build
        run: |
          cd mesa-src
          meson install -C build --destdir $PWD/install-output

      # -----------------------------
      # Output check
      # -----------------------------
      - name: Show Output
        run: |
          cd mesa-src
          find install-output -type f | head -200

      # -----------------------------
      # Upload
      # -----------------------------
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-wrapper-build
          path: |
            mesa-src/build/meson-logs/
            mesa-src/install-output/
          retention-days: 5
