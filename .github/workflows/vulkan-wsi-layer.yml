name: Build Android Vulkan WSI Layer (Bionic Wrapper Style)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wsi-layer:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 대상 소스코드 클론
      - name: Clone vulkan-wsi-layer
        run: |
          git clone --depth 1 https://github.com/fish4terrisa-MSDSM/vulkan-wsi-layer.git wsi-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip pkg-config ninja-build cmake glslang-tools

      # 2. Android NDK 설정 (Mesa 래퍼 코드와 동일)
      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # 3. Termux 파일시스템 헤더/라이브러리 확보
      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      # 4. CMake 구성 및 질문자님의 Bionic 링커 인수 적용 (Vulkan 및 PKG_CONFIG 경로 보강)
      - name: Configure and Build
        run: |
          cd wsi-src
          mkdir build && cd build

          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          # NDK 내부에 포함된 Vulkan 헤더 절대 경로 지정
          export NDK_VULKAN_INCLUDE="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"

          # 💡 pkg-config가 termuxfs 내부의 libdrm 등을 찾을 수 있도록 경로 강제 주입
          export CPPFLAGS="-I$TERMUX_PREFIX/include --sysroot=$TOOLCHAIN/../sysroot"
          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_SYSROOT"

          export SYSTEM_LDFLAGS="--target=aarch64-linux-android30 -L$TERMUX_PREFIX/lib -Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:/apex/com.android.i18n/lib64:$RUNTIME_PATH/lib -Wl,--no-as-needed -lEGL -landroid-shmem -ldrm -lwayland-client -lvulkan"

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${API_LEVEL} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang \
            -DCMAKE_CXX_COMPILER=$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++ \
            -DCMAKE_C_FLAGS="-fPIC -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -I$TERMUX_PREFIX/include -idirafter$TERMUX_PREFIX/include -include fcntl.h -include unistd.h" \
            -DCMAKE_CXX_FLAGS="-fPIC -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -I$TERMUX_PREFIX/include -idirafter$TERMUX_PREFIX/include -include fcntl.h -include unistd.h" \
            -DCMAKE_SHARED_LINKER_FLAGS="$SYSTEM_LDFLAGS" \
            -DVULKAN_CXX_INCLUDE="$NDK_VULKAN_INCLUDE" \
            -DBUILD_WSI_X11=ON \
            -DBUILD_WSI_WAYLAND=OFF \
            -DCMAKE_INSTALL_PREFIX=$RUNTIME_PATH

          make -j$(nproc)
          make DESTDIR=$PWD/install install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find wsi-src/build/install -type f

      # 5. 아티팩트 업로드
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wsi-layer-bionic
          path: wsi-src/build/install/
