name: Build VkGHL (Fix Headers & Dependencies)

on:
  workflow_dispatch:

jobs:
  build-vkghl:
    runs-on: ubuntu-22.04
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake python3 git \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libvulkan-dev vulkan-validationlayers-dev

      # 1. Vulkan Headers 설치 (모든 의존성의 기초)
      - name: Build Vulkan Headers
        run: |
          git clone https://github.com/KhronosGroup/Vulkan-Headers.git
          cd Vulkan-Headers
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps
          make install

      # 2. Valijson 설치 (JSON 검증용 - 추가된 단계)
      - name: Build Valijson
        run: |
          git clone https://github.com/tristanpenman/valijson.git
          cd valijson
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps
          make install

      # 3. Vulkan Utility Libraries 설치 (VulkanTools 필수 의존성)
      - name: Build Vulkan Utility Libraries
        run: |
          git clone https://github.com/KhronosGroup/Vulkan-Utility-Libraries.git
          cd Vulkan-Utility-Libraries
          mkdir build && cd build
          # 크로스 컴파일러와 이전에 설치한 Headers 경로를 지정합니다.
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps \
            -DCMAKE_PREFIX_PATH=/tmp/vk_deps \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          make install

      - name: Prepare VulkanTools & VkGHL
        run: |
          git clone https://github.com/LunarG/VulkanTools
          cd VulkanTools
          rm -rf layer_factory/assistant_layer layer_factory/demo_layer layer_factory/starter_layer
          git clone https://github.com/pchome/VkGHL layer_factory/VkGHL

      - name: Build VkGHL for ARM64
        run: |
          cd VulkanTools
          mkdir build_arm64 && cd build_arm64
          
          cmake .. \
            -DCMAKE_PREFIX_PATH=/tmp/vk_deps \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_LAYERS=OFF \
            -DBUILD_LAYERSVT=OFF \
            -DBUILD_VKTRACE=OFF \
            -DBUILD_VIA=OFF \
            -DBUILD_LAYERMGR=OFF \
            -DBUILD_WSI_WAYLAND_SUPPORT=OFF \
            -DBUILD_WSI_XCB_SUPPORT=ON \
            -DBUILD_WSI_XLIB_SUPPORT=ON \
            -DVkLayer_VkGHL_INSTALL_DIR=/data/data/com.termux/files/usr/glibc/lib
          
          make

      - name: Locate and Prepare Artifacts
        run: |
          mkdir -p output
          find VulkanTools/build_arm64 -name "libVkLayer_VkGHL.so" -exec cp {} output/ \;
          cp VulkanTools/layer_factory/VkGHL/VkLayer_VkGHL.json output/

      - uses: actions/upload-artifact@v4
        with:
          name: vkghl-arm64-fixed
          path: output/
