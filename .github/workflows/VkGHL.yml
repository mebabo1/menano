name: Build VkGHL (Standalone Fix)

on:
  workflow_dispatch:

jobs:
  build-vkghl:
    runs-on: ubuntu-22.04
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake python3 git \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libvulkan-dev

      # 1. 의존성 통합 설치 (Headers, Valijson, Utility Libraries)
      - name: Build Common Dependencies
        run: |
          mkdir -p /tmp/vk_deps
          
          # Vulkan-Headers
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git
          cmake -S Vulkan-Headers -B Vulkan-Headers/build -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps
          cmake --build Vulkan-Headers/build --target install

          # Valijson (Header-only)
          git clone --depth 1 https://github.com/tristanpenman/valijson.git
          cmake -S valijson -B valijson/build -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps
          cmake --build valijson/build --target install

          # Vulkan-Utility-Libraries
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Utility-Libraries.git
          cmake -S Vulkan-Utility-Libraries -B Vulkan-Utility-Libraries/build \
            -DCMAKE_INSTALL_PREFIX=/tmp/vk_deps \
            -DCMAKE_PREFIX_PATH=/tmp/vk_deps \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          cmake --build Vulkan-Utility-Libraries/build --target install

      - name: Build VkGHL Standalone
        run: |
          git clone --depth 1 https://github.com/pchome/VkGHL.git
          cd VkGHL
          
          # 실제 CMakeLists.txt가 있는 폴더는 VkLayer_VkGHL입니다.
          # 빌드 디렉토리를 해당 폴더 내부에 생성합니다.
          cd VkLayer_VkGHL
          mkdir build && cd build
          
          # 크로스 컴파일 및 의존성 경로 지정
          cmake .. \
            -DCMAKE_PREFIX_PATH=/tmp/vk_deps \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DVkLayer_VkGHL_INSTALL_DIR=/data/data/com.termux/files/usr/glibc/lib
          
          make -j$(nproc)

      # 3. 결과물 수집 및 검증
      - name: Locate and Prepare Artifacts
        run: |
          mkdir -p output
          
          # VkGHL 전체 폴더에서 검색하여 복사
          find VkGHL -name "*.so" -exec cp {} output/ \;
          find VkGHL -name "*.json" -exec cp {} output/ \;
          
          echo "📂 Final output contents:"
          ls -l output/
          
          # 파일 존재 여부 확인
          if [ ! -f output/*.json ]; then
            echo "❌ Error: Artifacts not found!"
            # 어디에 파일이 생겼는지 확인하기 위한 디버깅 출력
            find VkGHL -type f
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: vkghl-arm64-final
          path: output/
