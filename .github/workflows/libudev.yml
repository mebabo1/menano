name: Build eudev (libudev) for Termux aarch64

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-eudev:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r26b
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone eudev
        run: |
          git clone --depth 1 https://github.com/eudev-project/eudev.git eudev-src

      - name: Install Host Dependencies
        run: |
          sudo apt update
          # autOCONF를 소문자 autoconf로 수정했습니다.
          sudo apt install -y git wget unzip pkg-config make autoconf automake libtool gperf

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Configure and Build eudev
        run: |
          cd eudev-src
          
          # NDK 크로스 컴파일러 경로 지정
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          export CC="$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang"
          export CXX="$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++"
          
          # 컴파일 및 링크 플래그 설정 (Termux 헤더/라이브러리 및 하드웨어 가속 바인딩 유지)
          export CFLAGS="-O2 -fPIE -fPIC --target=aarch64-linux-android${API_LEVEL} -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -isystem $TERMUX_PREFIX/include"
          export LDFLAGS="--target=aarch64-linux-android${API_LEVEL} -L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem"
          
          # pkg-config가 Termux 의존성을 정상 탐색하도록 설정
          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$HOME/termuxfs/aarch64"

          echo "🛠️ autotools 환경 빌드 스크립트 생성 중..."
          ./autogen.sh

          echo "🛠️ 안드로이드 타겟 맞춤형 configure 진행 중..."
          # 안드로이드에 없는 기능(구형 hwdb, man페이지, 셀프 인트로스펙션 등)은 비활성화하여 빌드 오류를 차단합니다.
          ./configure \
            --host=aarch64-linux-android \
            --prefix=$TERMUX_PREFIX \
            --disable-introspection \
            --disable-hwdb \
            --disable-manpages \
            --disable-selinux \
            --disable-blkid

          echo "🛠️ 컴파일 시작..."
          make -j$(nproc)

          echo "🛠️ 아티팩트 수집을 위한 임시 임베디드 설치..."
          make install DESTDIR=$(pwd)/output_dist

      - name: Packaging Clean Artifacts
        run: |
          cd eudev-src
          mkdir -p output/lib/pkgconfig
          mkdir -p output/include
          
          # 생성된 실제 바이너리와 개발 헤더/pc 파일을 패키징용 폴더로 추출합니다.
          cp -d output_dist/$TERMUX_PREFIX/lib/libudev.so* output/lib/
          cp -d output_dist/$TERMUX_PREFIX/lib/pkgconfig/libudev.pc output/lib/pkgconfig/ 2>/dev/null || true
          cp -r output_dist/$TERMUX_PREFIX/include/libudev.h output/include/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-libudev-aarch64
          path: eudev-src/output/
