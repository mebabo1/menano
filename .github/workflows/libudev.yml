name: build-termux-udev

on:
  push:
    branches: '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: install prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            gperf \
            wget \
            unzip

      - name: Download Android NDK (r26b)
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-r26b" >> $GITHUB_ENV

      - name: Download Termux Filesystem
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: checkout
        uses: actions/checkout@v4
        with:
          repository: eudev-project/eudev
          path: eudev-src

      - name: generate configure script
        run: |
          cd eudev-src
          
          # 1. 안드로이드 NDK 바이트 스왑 내장 함수 매크로 연결 패치 (__bswap_16 등)
          if [ -f "src/shared/sparse-endian.h" ]; then
            echo "🛠️ sparse-endian.h 안드로이드 바이트 스왑 매크로 보완 패치 중..."
            sed -i '1s/^/#ifndef __bswap_16\n#define __bswap_16 __builtin_bswap16\n#endif\n#ifndef __bswap_32\n#define __bswap_32 __builtin_bswap32\n#endif\n#ifndef __bswap_64\n#define __bswap_64 __builtin_bswap64\n#endif\n/' src/shared/sparse-endian.h
          fi

          # 2. 안드로이드 NDK에 없는 필수 시스템 매크로 강제 주입 (RLIMIT, IPTOS) (기존 유지)
          if [ -f "src/shared/missing.h" ]; then
            echo "🛠️ missing.h 안드로이드 시스템 매크로 보완 패치 중..."
            sed -i '1s/^/#ifndef RLIMIT_NLIMITS\n#define RLIMIT_NLIMITS 16\n#endif\n#ifndef IPTOS_LOWCOST\n#define IPTOS_LOWCOST 0x02\n#endif\n/' src/shared/missing.h
          fi

          # 3. 안드로이드에 없는 get_current_dir_name() 함수를 표준 getcwd(NULL, 0)으로 전역 치환 (기존 유지)
          echo "🛠️ get_current_dir_name() -> getcwd(NULL, 0) 안드로이드 호환성 치환 중..."
          find src/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/get_current_dir_name()/getcwd(NULL, 0)/g' {} +

          # 4. log.c 안드로이드 호환성 패치 (기존 유지)
          if [ -f "src/shared/log.c" ]; then
            echo "🛠️ log.c 안드로이드 호환성 패치 중..."
            sed -i '1s/^/#define program_invocation_short_name getprogname()\n/' src/shared/log.c
          fi
          
          # 5. man 페이지 빌드 제외 로직 (기존 유지)
          if [ -f "Makefile.am" ]; then
            sed -i "s/SUBDIRS = .*/SUBDIRS = src/g" Makefile.am
          fi
          if [ -f "man/make.sh" ]; then
            echo "exit 0" > man/make.sh
          fi

          ./autogen.sh

      - name: configure for android crosse-compile
        run: |
          cd eudev-src
          
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          export CC="$TOOLCHAIN/aarch64-linux-android30-clang"
          export CXX="$TOOLCHAIN/aarch64-linux-android30-clang++"
          export CFLAGS="-O2 -fPIE -fPIC --target=aarch64-linux-android30 -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -isystem $TERMUX_PREFIX/include"
          export LDFLAGS="--target=aarch64-linux-android30 -L$TERMUX_PREFIX/lib -landroid-shmem"

          ./configure \
            --host=aarch64-linux-android \
            --prefix=/data/data/com.termux/files/usr \
            --disable-introspection \
            --disable-hwdb \
            --disable-manpages \
            --disable-selinux \
            --disable-blkid

      - name: make
        run: |
          cd eudev-src
          make -j$(nproc)

      - name: package artifacts
        run: |
          cd eudev-src
          make install DESTDIR=$(pwd)/output_dist
          
          # 업로드할 핵심 파일 구조화
          mkdir -p output/lib/pkgconfig
          mkdir -p output/include
          cp -d output_dist/data/data/com.termux/files/usr/lib/libudev.so* output/lib/
          cp -d output_dist/data/data/com.termux/files/usr/lib/pkgconfig/libudev.pc output/lib/pkgconfig/ 2>/dev/null || true
          cp -r output_dist/data/data/com.termux/files/usr/include/libudev.h output/include/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-libudev-aarch64
          path: eudev-src/output/
