name: Wine arm64ec for Termux

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Wine repository
        uses: actions/checkout@v4

      - name: Install the required deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt install -y \
          build-essential \
          lzma \
          flex \
          bison \
          quilt \
          unzip \
          pkg-config \
          libx11-dev:i386 \
          libvulkan-dev:i386 \
          libfreetype6-dev:i386 \
          libxcursor-dev:i386 \
          libxi-dev:i386 \
          libxshmfence-dev:i386 \
          libxxf86vm-dev:i386 \
          libxrandr-dev:i386 \
          libxinerama-dev:i386 \
          libxcomposite-dev:i386 \
          libglu1-mesa-dev:i386 \
          libosmesa6-dev:i386 \
          libdbus-1-dev:i386 \
          libncurses5-dev:i386 \
          libsane-dev:i386 \
          libv4l-dev:i386 \
          libgphoto2-dev:i386 \
          liblcms2-dev:i386 \
          libcapi20-dev:i386 \
          libcups2-dev:i386 \
          libfontconfig1-dev:i386 \
          libgsm1-dev:i386 \
          libtiff5-dev:i386 \
          libmpg123-dev:i386 \
          libopenal-dev:i386 \
          libldap2-dev:i386 \
          libjpeg-dev:i386 \
          libdrm2:i386 \
          libdrm-dev:i386
          sudo apt-get purge -y llvm-18 clang-18
      - name: Downloading and preparing glibc deps
        run: |
          mkdir -p /data/data/com.termux/files/usr
          cd /tmp
          wget https://github.com/mebabo1/menano/releases/download/Box/glibc.tar.xz
          tar -xf glibc.tar.xz
          # 압축 해제된 내용물이 usr/glibc 형태라고 가정하고 이동
          sudo cp -r usr/glibc /data/data/com.termux/files/usr/
          sudo chown -R $(whoami):$(whoami) /data/data/com.termux/files/usr/glibc
      - name: Download Bylaws toolchain and extracting it
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          rm llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          sudo mv llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
         ndk-version: r28c
         add-to-path: false
         link-to-sdk: true
      - name: Building Wine tools
        run: |
          ./autogen.sh
          mkdir wine-tools
          mkdir wine-tools-build
          cd wine-tools-build
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all
          ls
          mv ./* ../wine-tools

      - name: Compiling Wine for glibc
        run: |
          # 크로스 컴파일러 경로 확인 (apt로 설치한 경우 보통 /usr/bin에 있음)
          export GLIBC_PATH="/data/data/com.termux/files/usr/glibc"
          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          
          # 컴파일러 명시
          export CC="aarch64-linux-gnu-gcc"
          export CXX="aarch64-linux-gnu-g++"
          
          # 환경 변수 강화
          export PKG_CONFIG_PATH="$GLIBC_PATH/lib/pkgconfig:$GLIBC_PATH/share/pkgconfig"
          export CFLAGS="-I$GLIBC_PATH/include -O3 -pipe"
          export LDFLAGS="-L$GLIBC_PATH/lib -Wl,--dynamic-linker=$GLIBC_PATH/lib/ld-linux-aarch64.so.1 -Wl,-rpath=$GLIBC_PATH/lib"
          
          # 빌드 폴더 생성 및 이동
          mkdir -p build-wine
          cd build-wine
          
          # Wine Tools 절대 경로 사용 추천
          WINE_TOOLS_PATH=$(realpath ../wine-tools)

          ../configure \
            --host=aarch64-linux-gnu \
            --build=x86_64-pc-linux-gnu \
            --prefix=/usr \
            --with-mingw=clang \
            --with-wine-tools="$WINE_TOOLS_PATH" \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-win64 \
            --enable-nls \
            --disable-tests \
            --without-x \
            --without-wayland \
            --enable-wineandroid_drv=no \
            --with-vulkan \
            --with-sdl

          make -j$(nproc)
          # DESTDIR은 절대 경로로 지정하는 것이 안전합니다.
          make install DESTDIR=$(realpath ../compiled-files)
        continue-on-error: true

      - name: Uploading Wine files
        uses: actions/upload-artifact@v4
        with:
          name: wine-build
          path: compiled-files/

      - name: Uploading Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: ./config.log
