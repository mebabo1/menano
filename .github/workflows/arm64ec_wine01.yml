name: Wine arm64ec for Termux

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Wine repository  
        uses: actions/checkout@v4  
        with:  
          repository: ziad9267/wine  
          ref: bleeding-edge  

      - name: Install the required deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt install -y \
          build-essential \
          lzma \
          flex \
          bison \
          quilt \
          unzip \
          pkg-config \
          libx11-dev:i386 \
          libvulkan-dev:i386 \
          libfreetype6-dev:i386 \
          libxcursor-dev:i386 \
          libxi-dev:i386 \
          libxshmfence-dev:i386 \
          libxxf86vm-dev:i386 \
          libxrandr-dev:i386 \
          libxinerama-dev:i386 \
          libxcomposite-dev:i386 \
          libglu1-mesa-dev:i386 \
          libosmesa6-dev:i386 \
          libdbus-1-dev:i386 \
          libncurses5-dev:i386 \
          libsane-dev:i386 \
          libv4l-dev:i386 \
          libgphoto2-dev:i386 \
          liblcms2-dev:i386 \
          libcapi20-dev:i386 \
          libcups2-dev:i386 \
          libfontconfig1-dev:i386 \
          libgsm1-dev:i386 \
          libtiff5-dev:i386 \
          libmpg123-dev:i386 \
          libopenal-dev:i386 \
          libldap2-dev:i386 \
          libjpeg-dev:i386 \
          libdrm2:i386 \
          libdrm-dev:i386
          sudo apt-get purge -y llvm-18 clang-18  
      - name: Downloading and preparing glibc deps  
        run: |  
          # 1. 대상 디렉토리 생성 (sudo 필요)
          sudo mkdir -p /data/data/com.termux/files/usr
          
          # 2. 임시 디렉토리에서 압축 해제
          cd /tmp
          wget -q https://github.com/mebabo1/menano/releases/download/Box/glibc.tar.xz  
          mkdir -p glibc_temp
          tar -xf glibc.tar.xz -C glibc_temp
          
          # 3. 경로 정규화 (압축 파일 안에 usr/glibc가 있든, 바로 glibc가 있든 대응)
          # 'glibc'라는 이름의 디렉토리를 찾아서 대상 경로로 이동시킵니다.
          TARGET_DIR="/data/data/com.termux/files/usr/glibc"
          sudo rm -rf "$TARGET_DIR"
          REAL_SOURCE=$(find glibc_temp -type d -name "glibc" | head -n 1)          
          if [ -z "$REAL_SOURCE" ]; then
            echo "Error: glibc directory not found in the archive!"
            exit 1
          fi          
          sudo cp -r "$REAL_SOURCE" /data/data/com.termux/files/usr/
          sudo chown -R $(whoami):$(whoami) "$TARGET_DIR"
          echo "Successfully prepared glibc at: $TARGET_DIR"
          ls -ld "$TARGET_DIR"
      - name: Download Bylaws toolchain  
        run: |  
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz  
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz  
          sudo mv llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw  

      - name: Building Wine tools (Native x86_64)  
        run: |  
          ./autogen.sh  
          mkdir wine-tools-build  
          cd wine-tools-build  
          # --enable-win64를 추가하여 32비트 필수 체크를 우회합니다.
          ../configure \
            --enable-win64 \
            --disable-win16 \
            --without-x \
            --without-gstreamer \
            --without-vulkan \
            --without-wayland \
            --without-freetype \
            --without-fontconfig
          make -j$(nproc) __tooldeps__  
          cd ..  
          mkdir wine-tools  
          cp -r wine-tools-build/* ./wine-tools/

      - name: Compiling Wine for glibc (ARM64EC)  
        run: |  
          sudo apt-get install -y clang llvm lld
          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export deps="/data/data/com.termux/files/usr/glibc"          
          # 2. 컴파일러 및 도구 설정
          # --target과 --sysroot 외에 -fuse-ld=lld를 추가하여 lld 링커를 사용하게 합니다.
          export CC="clang --target=aarch64-linux-gnu --sysroot=$deps -fuse-ld=lld"
          export CFLAGS="-O2 -march=armv8-a -I$deps/include -Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-L$deps/lib -march=armv8-a -Wl,-rpath-link,$deps/lib"
          export CXX="clang++ --target=aarch64-linux-gnu --sysroot=$deps -fuse-ld=lld"
          export STRIP="llvm-strip"
          export NM="llvm-nm"
          export RANLIB="llvm-ranlib"          
          # 3. 환경 변수 보강 (가장 중요)
          # -Wl,-z,nostartfiles 등을 피하기 위해 표준 라이브러리 경로를 명시합니다.
          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export PKG_CONFIG_PATH="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export FREETYPE_LIBS="-L$deps/lib -lfreetype"
          export CPPFLAGS="-I$deps/include"
          sed -i "s|/data/data/com.termux/files/usr/glibc/lib/||g" $deps/lib/libc.so
          sed -i "s|/usr/lib/aarch64-linux-gnu/||g" $deps/lib/libc.so || true          
          if [ -f "$deps/lib/libpthread.so" ]; then
            sed -i "s|/data/data/com.termux/files/usr/glibc/lib/||g" $deps/lib/libpthread.so
          fi

          mkdir -p build-wine  
          cd build-wine
          
          # 4. Configure 실행
          ../configure \
          --enable-archs=arm64ec,aarch64,i386 \
          --host=aarch64-linux-gnu \
          --with-mingw=clang \
          --with-wine-tools=../wine-tools \
          --prefix=/usr \
          --enable-win64 \
          --disable-tests \
          --without-wayland \
          --without-oss \
          --without-alsa \
          --enable-wineandroid_drv=no

          make -j$(nproc)  
          make install DESTDIR=$(pwd)/../compiled-files  

      - name: Uploading Wine files  
        uses: actions/upload-artifact@v4  
        with:  
          name: wine-bleeding-edge-build  
          path: compiled-files/
      - name: Upload Config Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wine-config-log
          path: build-wine/config.log
