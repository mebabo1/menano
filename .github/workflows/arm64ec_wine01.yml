name: Wine arm64ec for Termux

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Wine repository  
        uses: actions/checkout@v4  
        with:  
          repository: ziad9267/wine  
          ref: bleeding-edge  

      - name: Install the required deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt install -y \
          build-essential \
          lzma \
          flex \
          bison \
          quilt \
          unzip \
          pkg-config \
          libx11-dev:i386 \
          libvulkan-dev:i386 \
          libfreetype6-dev:i386 \
          libxcursor-dev:i386 \
          libxi-dev:i386 \
          libxshmfence-dev:i386 \
          libxxf86vm-dev:i386 \
          libxrandr-dev:i386 \
          libxinerama-dev:i386 \
          libxcomposite-dev:i386 \
          libglu1-mesa-dev:i386 \
          libosmesa6-dev:i386 \
          libdbus-1-dev:i386 \
          libncurses5-dev:i386 \
          libsane-dev:i386 \
          libv4l-dev:i386 \
          libgphoto2-dev:i386 \
          liblcms2-dev:i386 \
          libcapi20-dev:i386 \
          libcups2-dev:i386 \
          libfontconfig1-dev:i386 \
          libgsm1-dev:i386 \
          libtiff5-dev:i386 \
          libmpg123-dev:i386 \
          libopenal-dev:i386 \
          libldap2-dev:i386 \
          libjpeg-dev:i386 \
          libdrm2:i386 \
          libdrm-dev:i386
          sudo apt-get purge -y llvm-18 clang-18  
      - name: Downloading and preparing glibc deps  
        run: |  
          sudo mkdir -p /data/data/com.termux/files/usr  
          cd /tmp  
          wget https://github.com/mebabo1/menano/releases/download/Box/glibc.tar.xz  
          tar -xf glibc.tar.xz  
          # 경로가 usr/glibc 인지 확인 후 복사  
          sudo cp -r usr/glibc /data/data/com.termux/files/usr/  
          sudo chown -R $(whoami):$(whoami) /data/data/com.termux/files/usr/glibc  

      - name: Download Bylaws toolchain  
        run: |  
          wget https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz  
          tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz  
          sudo mv llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw  

      - name: Building Wine tools (Native x86_64)  
        run: |  
          ./autogen.sh  
          mkdir wine-tools-build  
          cd wine-tools-build  
          # --enable-win64를 추가하여 32비트 필수 체크를 우회합니다.
          ../configure \
            --enable-win64 \
            --disable-win16 \
            --without-x \
            --without-gstreamer \
            --without-vulkan \
            --without-wayland \
            --without-freetype \
            --without-fontconfig
          make -j$(nproc) __tooldeps__  
          cd ..  
          mkdir wine-tools  
          cp -r wine-tools-build/* ./wine-tools/

      - name: Compiling Wine for glibc (ARM64EC)  
        run: |  
          # 1. 크로스 컴파일러 설치 (시스템 clang이 ARM 타겟을 지원하게 함)
          sudo apt-get install -y clang llvm lld

          export LLVM_MINGW_TOOLCHAIN="/opt/llvm-mingw/bin"
          export PATH="$LLVM_MINGW_TOOLCHAIN:$PATH"
          export deps="/data/data/com.termux/files/usr/glibc"
          
          # 2. 컴파일러 설정: sysroot를 명시하여 $deps 내부의 헤더/라이브러리 사용 강제
          # --target과 --sysroot가 핵심입니다.
          export CC="clang --target=aarch64-linux-gnu --sysroot=$deps"
          export CXX="clang++ --target=aarch64-linux-gnu --sysroot=$deps"
          export STRIP="llvm-strip"
          export NM="llvm-nm"
          export RANLIB="llvm-ranlib"
          
          # 3. 플래그 최적화
          export PKG_CONFIG_LIBDIR="$deps/lib/pkgconfig:$deps/share/pkgconfig"
          export CPPFLAGS="-I$deps/include"
          export LDFLAGS="-L$deps/lib -Wl,-rpath-link,$deps/lib" 
          export CFLAGS="-O2 -Wno-implicit-function-declaration -Wno-int-conversion"
          
          mkdir -p build-wine  
          cd build-wine  
          
          # 4. Configure 실행
          ../configure \
          --enable-archs=arm64ec,aarch64,i386 \
          --host=aarch64-linux-gnu \
          --with-mingw=clang \
          --with-wine-tools=../wine-tools \
          --prefix=/usr \
          --enable-win64 \
          --disable-tests \
          --without-wayland \
          --without-oss \
          --without-alsa \
          --enable-wineandroid_drv=no

          make -j$(nproc)  
          make install DESTDIR=$(pwd)/../compiled-files  

      - name: Uploading Wine files  
        uses: actions/upload-artifact@v4  
        with:  
          name: wine-bleeding-edge-build  
          path: compiled-files/
