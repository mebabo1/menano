name: Build Wine ARM64 WOW64

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine'
        required: false
        default: 'proton'
        type: choice
        options:
        - proton
        - staging
        - winearm64ec
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file

      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64）
      # ------------------------------------------------------------
      - name: APT
        run: |
          echo "🧹 Freeing disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          if [ -f /etc/apt/sources.list ]; then
            cp /etc/apt/sources.list /etc/apt/sources.list.bak
          else
            echo "deb http://deb.debian.org/debian bookworm main contrib non-free" > /etc/apt/sources.list
            echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free" >> /etc/apt/sources.list
            echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
          fi

          grep -v '^#' /etc/apt/sources.list | sed 's/^deb /deb [arch=amd64] /g' > /tmp/amd64.list
          sed -e 's/\[arch=amd64\]/[arch=arm64]/g' /tmp/amd64.list > /tmp/arm64.list
          cat /tmp/amd64.list /tmp/arm64.list > /etc/apt/sources.list

          dpkg --add-architecture arm64
          apt-get update
          apt-get install -y --no-install-recommends hello:arm64 || { echo "arm64 源测试失败"; exit 1; }

      - name: Dockerfile
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential \
            git make cmake ninja-build autoconf automake \
            libtool pkg-config gettext flex bison nasm \
            python3 python3-setuptools ca-certificates wget \
            curl xz-utils file \
            clang llvm lld binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross \
            mingw-w64 \
            libglib2.0-dev libfreetype6-dev libltdl-dev libxcb1-dev \
            libx11-dev libvulkan-dev librsvg2-bin \
            libglib2.0-dev:arm64 libunwind-dev:arm64 libdbus-1-dev:arm64 libudev-dev:arm64 \
            libvulkan-dev:arm64 libgl-dev:arm64 libepoxy-dev:arm64 libxcb1-dev:arm64 \
            libx11-dev:arm64 libxext-dev:arm64 libxcursor-dev:arm64 libxi-dev:arm64 \
            libxrandr-dev:arm64 libxrender-dev:arm64 libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 libxinerama-dev:arm64 libxxf86vm-dev:arm64 \
            libwayland-dev:arm64 libxkbcommon-dev:arm64 libmpg123-dev:arm64 libopenal-dev:arm64 \
            libfontconfig1-dev:arm64 libfreetype6-dev:arm64 libsdl2-dev:arm64 libasound2-dev:arm64 \
            libpulse-dev:arm64 libgstreamer1.0-dev:arm64 libgstreamer-plugins-base1.0-dev:arm64 \
            dpkg-dev fakeroot debhelper dh-make screen nano \
            less


      - name: llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: locales
        run: |
          apt-get install -y locales
          sed -i '/ko_KR.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=ko_KR.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=ko_KR.UTF-8" >> $GITHUB_ENV
          echo "LANGUAGE=ko_KR:ko" >> $GITHUB_ENV
 
      - name: Wine
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            winearm64ec)
              echo "Processing protonarm64ec branch"

              git clone -b "experimental_9.0" https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            staging)
              echo " Staging "
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            proton)
              echo "Processing Proton branch"

              PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
              PROTON_COMMIT="${{ github.event.inputs.proton_commit || '' }}"

              git clone https://github.com/MaxsTechReview/proton-wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
          esac

          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "소스 코드 준비 완료, 빌드 이름: $BUILD_NAME"

      - name: configure
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: native wine64 NLS
        run: |
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          ../source/configure \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-vulkan \
            --without-wayland
          make __tooldeps__ -j$(nproc) > /dev/null
          echo "构建 NLS 目录..."
          make -C nls
          # 备份整个 nls 目录（跟随符号链接）
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          ls -la /opt/nls-backup/

      - name: 复制构建目录并验证 NLS（带恢复机制）
        run: |
          set -e
          mkdir -p /opt/wine64-native
          # 检查源文件，若不存在则从备份恢复（备份包含所有 nls 文件）
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          # 复制整个构建目录，使用 -aL 选项（归档且跟随符号链接）
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          # 验证复制后的文件是否为普通文件（不是符号链接）
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失或为无效符号链接，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      - name: Create SHM Utils Header
        run: |
          mkdir -p ${{ env.WINE_SOURCE_DIR }}/source/include
          cat <<'EOF' > ${{ env.WINE_SOURCE_DIR }}/source/include/shm_utils.h
          #ifndef __WINE_SHM_UTILS_H
          #define __WINE_SHM_UTILS_H

          #ifndef _GNU_SOURCE
          #define _GNU_SOURCE
          #endif

          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/stat.h>
          #include <sys/types.h>
          #include <sys/mman.h>
          #include <errno.h>
          #include <string.h>
          #include <stdarg.h>
          #include <sched.h>
          #include <sys/syscall.h>
          #include <linux/futex.h>
          #include <stdatomic.h>

          #define MAX_FUTEX 1024
          #define TERMUX_TMP_DIR "/data/data/com.termux/files/usr/tmp"

          typedef struct {
              unsigned long key;
              atomic_int flag;   // 0 = sleep, 1 = wake
          } shm_futex_t;

          static shm_futex_t *futex_table = NULL;

          static inline void init_futex_shm(void)
          {
              if (futex_table) return;

              int fd = open(TERMUX_TMP_DIR "/wine_futex_shm", O_CREAT | O_RDWR, 0600);
              if (fd < 0) return;

              ftruncate(fd, sizeof(shm_futex_t) * MAX_FUTEX);

              futex_table = mmap(NULL,
                                 sizeof(shm_futex_t) * MAX_FUTEX,
                                 PROT_READ | PROT_WRITE,
                                 MAP_SHARED,
                                 fd, 0);

              close(fd);

              if (futex_table)
                  memset(futex_table, 0, sizeof(shm_futex_t) * MAX_FUTEX);
          }

          static inline shm_futex_t *get_futex(void *uaddr)
          {
              if (!futex_table) init_futex_shm();
              if (!futex_table) return NULL;

              unsigned long key = ((unsigned long)uaddr) >> 4;

              for (int i = 0; i < MAX_FUTEX; i++)
              {
                  if (futex_table[i].key == key)
                      return &futex_table[i];
              }

              for (int i = 0; i < MAX_FUTEX; i++)
              {
                  unsigned long expected = 0;
                  if (__sync_bool_compare_and_swap(&futex_table[i].key, expected, key))
                      return &futex_table[i];
              }

              return NULL;
          }

          static inline long real_syscall(long number,
                                         unsigned long long a0,
                                         unsigned long long a1,
                                         unsigned long long a2,
                                         unsigned long long a3,
                                         unsigned long long a4,
                                         unsigned long long a5)
          {
              return syscall(number, a0, a1, a2, a3, a4, a5);
          }

          static inline long custom_syscall(long number, ...)
          {
              va_list args;
              unsigned long long a[6] = {0};

              va_start(args, number);
              for (int i = 0; i < 6; i++)
                  a[i] = va_arg(args, unsigned long long);
              va_end(args);

          #ifndef __NR_futex_waitv
          #define __NR_futex_waitv 449
          #endif

              if (number == __NR_futex)
              {
                  int *uaddr = (int *)a[0];
                  int op = (int)a[1] & 127;

                  shm_futex_t *f = get_futex(uaddr);
                  if (!f)
                      return real_syscall(number, a[0], a[1], a[2], a[3], a[4], a[5]);

                  if (op == FUTEX_WAIT)
                  {
                      int val = (int)a[2];

                      if (*uaddr != val)
                      {
                          errno = EAGAIN;
                          return -1;
                      }

                      atomic_exchange_explicit(&f->flag, 0, memory_order_acq_rel);

                      int spin = 150;  // 튜닝 포인트

                      while (spin--)
                      {
                          if (atomic_load_explicit(&f->flag, memory_order_acquire))
                              return 0;

                          if (*uaddr != val)
                              return 0;

                          sched_yield();
                      }

                      /* fallback to kernel futex */
                      return real_syscall(__NR_futex, a[0], a[1], a[2], a[3], a[4], a[5]);
                  }

                  if (op == FUTEX_WAKE)
                  {
                      atomic_store_explicit(&f->flag, 1, memory_order_release);

                      /* kernel wake도 같이 */
                      real_syscall(__NR_futex, a[0], a[1], 1, a[3], a[4], a[5]);

                      return 1;
                  }

                  return real_syscall(number, a[0], a[1], a[2], a[3], a[4], a[5]);
              }

              if (number == __NR_futex_waitv)
              {
                  struct futex_waitv {
                      uint64_t val;
                      uint64_t uaddr;
                      uint32_t flags;
                      uint32_t __reserved;
                  };

                  struct futex_waitv *waiters = (struct futex_waitv *)a[0];
                  unsigned int nr = (unsigned int)a[1];
                  struct timespec *ts = (struct timespec *)a[3];

                  if (!waiters || nr == 0 || nr > 128 || (uintptr_t)waiters < 0x1000)
                  {
                      errno = EINVAL;
                      return -1;
                  }
                  
                  for (unsigned int i = 0; i < nr; i++)
                  {
                      int *uaddr = (int *)(uintptr_t)waiters[i].uaddr;
                      int val = (int)waiters[i].val;

                      if (*uaddr != val)
                      {
                          errno = EAGAIN;
                          return -1;
                      }
                  }

                  long timeout_us = -1;
                  if (ts)
                      timeout_us = ts->tv_sec * 1000000 + ts->tv_nsec / 1000;

                  long waited = 0;
                  int spin = 200;

                  while (1)
                  {
                      for (unsigned int i = 0; i < nr; i++)
                      {
                          int *uaddr = (int *)(uintptr_t)waiters[i].uaddr;
                          int val = (int)waiters[i].val;

                          shm_futex_t *f = get_futex(uaddr);

                          if (f && atomic_load_explicit(&f->flag, memory_order_acquire))
                              return i;

                          if (*uaddr != val)
                              return i;
                      }

                      if (spin-- > 0)
                      {
                          sched_yield();
                      }
                      else
                      {
                          usleep(50);

                          if (timeout_us >= 0)
                          {
                              waited += 50;
                              if (waited >= timeout_us)
                              {
                                  errno = ETIMEDOUT;
                                  return -1;
                              }
                          }
                      }
                  }
              }
          
              return real_syscall(number, a[0], a[1], a[2], a[3], a[4], a[5]);
          }
          
          static inline int custom_shm_open(const char *name, int oflag, mode_t mode)
          {
              char path[256];
              const char *clean = (name[0] == '/') ? name + 1 : name;

              if (snprintf(path, sizeof(path), "%s/%s", TERMUX_TMP_DIR, clean) >= sizeof(path))
                  return -1;

              return open(path, oflag, mode ? mode : 0600);
          }

          static inline int custom_shm_unlink(const char *name)
          {
              char path[256];
              const char *clean = (name[0] == '/') ? name + 1 : name;

              if (snprintf(path, sizeof(path), "%s/%s", TERMUX_TMP_DIR, clean) >= sizeof(path))
                  return -1;

              return unlink(path);
          }

          static inline int custom_ftruncate(int fd, off_t len)
          {
              int ret = ftruncate(fd, len);
              __sync_synchronize();
              return ret;
          }

          #undef shm_open
          #define shm_open(...) GET_SHM_OPEN_MACRO(__VA_ARGS__, shm_open_3, shm_open_2)(__VA_ARGS__)
          #define GET_SHM_OPEN_MACRO(_1,_2,_3,NAME,...) NAME
          #define shm_open_3(name, flags, mode) custom_shm_open(name, flags, mode)
          #define shm_open_2(name, flags)       custom_shm_open(name, flags, 0)

          #undef shm_unlink
          #define shm_unlink custom_shm_unlink

          #undef ftruncate
          #define ftruncate custom_ftruncate

          #undef syscall
          #define syscall(...) custom_syscall(__VA_ARGS__)

          #endif
          EOF

      - name: Download shm.h
        run: |
          # 1. include 폴더와 winex11.drv 폴더 양쪽에 다운로드 (가장 확실한 방법)
          curl -L https://raw.githubusercontent.com/mebabo1/menano/main/path/shm.h -o ${{ env.WINE_SOURCE_DIR }}/source/include/shm.h

      - name: Termux
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          
          # 기존 /tmp 경로 수정 로직 (유지)
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          sed -i 's|#include <sys/shm.h>|#include "shm.h"|g' dlls/winex11.drv/bitblt.c

          FILE3="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE3" ]; then
            if grep -q '@ stub' "$FILE3"; then
              echo "Cleaning wdscore.spec stubs..."
              sed -i '/CDynamicArray/d' "$FILE3"
              echo "✔ wdscore stubs cleaned"
            else
              echo "✔ wdscore already cleaned or not found"
            fi
          fi

          FILE_INF="loader/wine.inf.in"
          if [ -f "$FILE_INF" ]; then
            echo "Patching $FILE_INF..."
            sed -i 's/"xtajit64.dll"/"libarm64ecfex.dll"/' "$FILE_INF"
            sed -i 's/"xtajit.dll"/"libwow64fex.dll"/' "$FILE_INF"
          fi

          FILE_LOADER="dlls/ntdll/loader.c"
          if [ -f "$FILE_LOADER" ]; then
            echo "Patching $FILE_LOADER..."
            sed -i 's|xtajit64.dll|libarm64ecfex.dll|' "$FILE_LOADER"
          fi

          FILE_VIRTUAL="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE_VIRTUAL" ]; then
                    echo "[FLOW] Patching virtual.c for compilation errors..."

                    # 1. HandleToULong 에러 수정: ULONG_PTR을 void*로 강제 형변환 (Error 7519 해결)
                    sed -i 's/HandleToULong( pbi.UniqueProcessId )/HandleToULong( (void *)(ULONG_PTR)pbi.UniqueProcessId )/g' "$FILE_VIRTUAL"

                    # 2. Userfaultfd 바이패스 및 커널 왓치 무력화 (기존 로직 유지)
                    sed -i 's/uffd_fd = syscall( __NR_userfaultfd/uffd_fd = -1; \/\/ bypassed/g' "$FILE_VIRTUAL"
                    sed -i '/static void kernel_writewatch_init(void)/{n;s/^{/{\n          return;/}' "$FILE_VIRTUAL"

                    echo "✔ [FLOW] virtual.c: Type conversion & bypass applied."
          fi
          find . -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/xtajit\.dll/libwow64fex.dll/g' {} +
          find dlls/ntdll -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|x86_64-windows|aarch64-windows|g' {} +

          TOTAL_TARGETS=" 
            dlls/ntdll/unix/fsync.c 
            dlls/ntdll/unix/esync.c  
            server/esync.c 
            server/fsync.c 
          "

          for FILE in $TOTAL_TARGETS; do
            if [ -f "$FILE" ]; then
              echo "Fixing SHM Hook for $FILE..."
              sed -i '/shm_utils.h/d' "$FILE"
              if grep -q "#include \"config.h\"" "$FILE"; then
                sed -i "/#include \"config.h\"/a #include <shm_utils.h>" "$FILE"
              else
                sed -i "1i #include <shm_utils.h>" "$FILE"
              fi            
              echo "Fixing SHM Hook for $FILE..."
            fi
          done

          export PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"

          PATCH_FILES="2.patch"
          echo "Applying external patches from $PATCH_BASE..."
          for FILE in $PATCH_FILES; do
            URL="${PATCH_BASE}/${FILE}"
            PATCH_FILE="$FILE"           
            echo "--------------------------------------------"
            echo "Downloading $PATCH_FILE..."
            wget -q -O "$PATCH_FILE" "$URL"
            
            if git apply --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "✔ $PATCH_FILE can be applied cleanly"
                git apply --whitespace=fix "$PATCH_FILE"
            elif git apply --3way --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "⚠ Applying $PATCH_FILE with 3-way merge"
                git apply --3way --whitespace=fix "$PATCH_FILE"
            else
                echo "❌ $PATCH_FILE failed, generating rejects"
                git apply --reject --whitespace=fix "$PATCH_FILE" || true
                find . -name "*.rej"
            fi
          done
          echo "--------------------------------------------"
          echo "✔ All patch processes completed"

      - name: configure
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64

          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export deps="/data/data/com.termux/files/usr"
          export depsg="/data/data/com.termux/files/usr/glibc"
          # export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          # export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig

          export CC="clang --target=aarch64-linux-gnu"
          export CXX="clang++ --target=aarch64-linux-gnu"
          export CROSSCC="arm64ec-w64-mingw32-clang"
          export CROSSCXX="arm64ec-w64-mingw32-clang++"
          export CFLAGS="-O2 -pipe -I$depsg/include $CFLAGS"
          export CXXFLAGS="-O2 -pipe"
          export CROSSCFLAGS="-O2 -pipe"
          export CROSSCXXFLAGS="-O2 -pipe"

          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export WINE_NLS_DIR=/opt/wine64-native/nls
          export LDFLAGS="-s -L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=$depsg/lib/ld-linux-aarch64.so.1 -Wl,-rpath=$depsg/lib -Wl,-O3,--sort-common,--as-needed"

          ../configure \
            --enable-win64 \
            --host=aarch64-linux-gnu \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --with-wine-tools=/opt/wine64-native \
            --disable-win16 \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            --enable-nls \
            --disable-winemenubuilder \
            --without-osmesa \
            --with-pulse \
            --without-ffmpeg \
            --disable-opencl \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --with-xshm \
            --without-xxf86vm
            
          make -j$(nproc) > /dev/null
          make install

          # 验证安装是否生成 bin 目录（若缺失则报错）
          if [ ! -d /tmp/wine-install-wow64/bin ]; then
            echo "错误: /tmp/wine-install-wow64/bin 目录不存在，安装可能不完整"
            exit 1
          fi

      - name: Shared Library Path Fix
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE64_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"

          WINE_ARCH="aarch64"

          echo "=== 1. 구조 생성 및 모든 라이브러리 수집 ==="
          mkdir -p "$TARGET_PREFIX/bin"
          mkdir -p "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix"
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          mkdir -p "$TARGET_PREFIX/share/wine/fonts"

          # [중요] 삭제 전 모든 .so를 먼저 수집 (원본 확보)
          find "$BUILD_DIR" -name "ntdll.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/dlls" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/programs" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;

          # 수집 완료 후 불필요한 폴더 제거 (이미 복사본이 있으므로 안전)
          if [ -d "$BUILD_DIR/dlls/ntdll/aarch64-windows" ]; then
              echo "✔ aarch64-windows 감지됨. x86_64-unix 찌꺼기 정리."
              rm -rf "$TARGET_PREFIX/lib/wine/x86_64-unix"
          fi

          echo "=== 2. 리소스 복사 (NLS, Fonts) ==="
          [ -d "$NATIVE_NLS_DIR" ] && cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          [ -d "$SOURCE_DIR/fonts" ] && cp -v "$SOURCE_DIR/fonts"/*.ttf "$SOURCE_DIR/fonts"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || true

          echo "=== 3. 로더 및 실행 파일 복사 ==="
          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              found=$(find "$BUILD_DIR" -type f -name "$prog" -executable | head -1)
              [ -n "$found" ] && cp -vL "$found" "$TARGET_PREFIX/bin/" || echo "⚠ $prog 찾지 못함"
          done

          echo "=== 4. 심볼릭 링크 재생성 (절대 경로 에러 방어) ==="
          # ntdll.so 링크가 실제로 존재하는지 확인 후 생성
          if [ -f "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/ntdll.so" ]; then
              cd "$TARGET_PREFIX/bin"
              # 상대 경로가 확실히 맞도록 해당 디렉토리로 이동 후 링크 생성
              ln -sf "../lib/wine/$WINE_ARCH-unix/ntdll.so" "ntdll.so"
              echo "✔ ntdll.so 심볼릭 링크 생성 완료"
          else
              echo "❌ 치명적 오류: ntdll.so 원본 파일이 없습니다!"
              exit 1
          fi
          if [ -f "wine" ]; then
              cp -r wine wine64
          fi
          echo "=== 최종 검증 ==="
          ls -l "$TARGET_PREFIX/bin/ntdll.so"
          # 링크가 가리키는 실제 파일의 존재 여부를 한 번 더 확인
          ls -L "$TARGET_PREFIX/bin/ntdll.so" || { echo "❌ 링크가 깨졌습니다!"; exit 1; }

      # ------------------------------------------------------------
      # 13. 验证安装目录内容（可选，便于调试）
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录 /tmp/wine-install-wow64 的内容："
          ls -la /tmp/wine-install-wow64/
          if [ -d /tmp/wine-install-wow64/bin ]; then
            echo "bin 目录内容："
            ls -la /tmp/wine-install-wow64/bin/
          fi
          if [ -d /tmp/wine-install-wow64/share ]; then
            echo "share 目录内容："
            ls -la /tmp/wine-install-wow64/share/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          mkdir -p wine-package/wine 
          cp -r /tmp/wine-install-wow64/* wine-package/wine/

      - name: 创建打包文件
        run: |
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C wine-package wine
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: Publish Wine to GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            - **Wine Branch**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine Version**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **Host Architecture**: ARM64
            - **Target Windows Architectures**: i386, aarch64, arm64ec (via WOW64 emulation)

            - Build Time: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
