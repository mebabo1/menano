name: Build DisplayX Layer for Termux aarch64

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-displayx:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r26b
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DisplayX
        run: |
          git clone --depth 1 https://github.com/Pipetto-crypto/DisplayX.git displayx-src

      - name: Install Host Dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip pkg-config make

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # [순서 변경] termuxfs 패키지를 먼저 추출하여 기본 베이스를 마련합니다.
      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      # [순서 변경] termuxfs가 완전히 풀린 상태에서 누락된 Vulkan XCB 헤더 3종을 정확히 주입합니다.
      - name: Download Missing Vulkan XCB Headers
        run: |
          TARGET_VULKAN_DIR="$HOME/termuxfs/aarch64/data/data/com.termux/files/usr/include/vulkan"
          mkdir -p "$TARGET_VULKAN_DIR"
          
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xcb.h -O "$TARGET_VULKAN_DIR/vulkan_xcb.h"
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xlib.h -O "$TARGET_VULKAN_DIR/vulkan_xlib.h"
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xlib_xrandr.h -O "$TARGET_VULKAN_DIR/vulkan_xlib_xrandr.h"
          
          echo "Vulkan XCB/Xlib headers injected successfully into $TARGET_VULKAN_DIR"

      - name: Patch DisplayX Source Codes
        run: |
          cd displayx-src
          sed -i 's/AHARDWAREBUFFER_USAGE_GPU_COLOR_OUTPUT;/AHARDWAREBUFFER_USAGE_GPU_COLOR_OUTPUT | AHARDWAREBUFFER_USAGE_CPU_READ_RARELY | AHARDWAREBUFFER_USAGE_CPU_WRITE_RARELY;/g' src/displayx_layer.cpp
          sed -i 's/dev->table.QueueSubmit(q->handle, 1, \&submitInfo, fence);/if(q \&\& q->handle) dev->table.QueueSubmit(q->handle, 1, \&submitInfo, fence);/g' src/displayx_layer.cpp        
          echo "DisplayX source level bugfixes applied successfully."

      - name: Build DisplayX Via Make Overrides
        run: |
          cd displayx-src
          
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          # 명시적인 크로스 컴파일을 위해 규격을 통일하고 소스파일들이 온전히 포함되도록 설정합니다.
          make \
            CXX="$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++" \
            CXXFLAGS="-std=c++17 -fPIC --target=aarch64-linux-android${API_LEVEL} -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -idirafter$TERMUX_PREFIX/include -include fcntl.h -include unistd.h" \
            LDFLAGS="-shared --target=aarch64-linux-android${API_LEVEL} -nostdlib++ -L$TERMUX_PREFIX/lib -Wl,-rpath=/system/lib64:$RUNTIME_PATH/lib -landroid-shmem -lc++_shared -lX11-xcb -lxcb -landroid" \
            all

      - name: Packaging Output
        run: |
          cd displayx-src
          mkdir -p output/lib
          mkdir -p output/json
          
          cp displayx_layer.so output/lib/
          cp displayx_layer.json output/json/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-displayx-layer
          path: displayx-src/output/
