name: Build DisplayX Layer for Termux aarch64

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-displayx:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r26b
      API_LEVEL: 34

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DisplayX
        run: |
          git clone --depth 1 https://github.com/Pipetto-crypto/DisplayX.git displayx-src

      - name: Download Modified Source Code
        run: |
          curl -L "https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path/displayx_layer.cpp" -o "displayx-src/src/displayx_layer.cpp"
          # curl -L "https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path/displayx_layer.hpp" -o "displayx-src/src/displayx_layer.hpp"
          echo "Modified displayx_layer.cpp has been successfully applied."

      - name: Install Host Dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip pkg-config make

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Download Missing Vulkan XCB Headers
        run: |
          TARGET_VULKAN_DIR="$HOME/termuxfs/aarch64/data/data/com.termux/files/usr/include/vulkan"
          mkdir -p "$TARGET_VULKAN_DIR"
          
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xcb.h -O "$TARGET_VULKAN_DIR/vulkan_xcb.h"
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xlib.h -O "$TARGET_VULKAN_DIR/vulkan_xlib.h"
          wget -q https://raw.githubusercontent.com/KhronosGroup/Vulkan-Headers/main/include/vulkan/vulkan_xlib_xrandr.h -O "$TARGET_VULKAN_DIR/vulkan_xlib_xrandr.h"
          
          echo "Vulkan XCB/Xlib headers injected successfully into $TARGET_VULKAN_DIR"

      - name: Build DisplayX Via Make Overrides
        run: |
          cd displayx-src
          
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          
          make \
            CXX="$TOOLCHAIN/aarch64-linux-android${{ env.API_LEVEL }}-clang++" \
            CXXFLAGS="-g -O0 -std=c++17 -fPIC --target=aarch64-linux-android${{ env.API_LEVEL }} -D__TERMUX__ -D__USE_GNU -U__ANDROID__ -idirafter$TERMUX_PREFIX/include -include fcntl.h -include unistd.h" \
            LDFLAGS="-shared --target=aarch64-linux-android${{ env.API_LEVEL }} -nostdlib++ -L$TERMUX_PREFIX/lib -Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:$RUNTIME_PATH/lib -Wl,--no-as-needed -landroid -lEGL -landroid-shmem -lc++_shared -lX11-xcb -lxcb" \
            all

      - name: Packaging Output
        run: |
          cd displayx-src
          mkdir -p output/lib
          mkdir -p output/json
          
          cp displayx_layer.so output/lib/
          cp displayx_layer.json output/json/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-displayx-layer
          path: displayx-src/output/
