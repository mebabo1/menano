name: Build Android Gamescope (Legacy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gamescope:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Gamescope
        run: |
          git clone --depth 1 \
            https://github.com/DadSchoorse/gamescope.git \
            gamescope-src
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools \
            libpixman-1-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxi-dev \
            libxmu-dev \
            libxrender-dev \
            libxres-dev \
            libxtst-dev \
            libvulkan-dev \
            libinput-dev \
            libudev-dev \
            libwayland-dev

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar

          cd $HOME/termuxfs/aarch64/data/data/com.termux/files
          wget -q https://github.com/mebabo1/menano/releases/download/Box/wayland_scanner.tar.gz
          tar xf wayland_scanner.tar.gz
          rm wayland_scanner.tar.gz
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Create Dummy libcap Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. Gamescope가 참조할 가짜 sys/capability.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include/sys
          cat << 'EOF' > $TERMUX_PREFIX/include/sys/capability.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // Gamescope 소스 컴파일에 필요한 최소한의 자료형 및 상수 정의
          typedef struct _cap_struct *cap_t;
          typedef int cap_value_t;
          typedef enum { CAP_EFFECTIVE=0, CAP_PERMITTED=1, CAP_INHERITABLE=2 } cap_flag_t;
          typedef enum { CAP_CLEAR=0, CAP_SET=1 } cap_flag_value_t;
          
          #define CAP_SYS_NICE 23

          // 데스크톱 libcap의 필수 함수 형태 선언
          cap_t cap_get_proc(void);
          int cap_set_proc(cap_t cap_p);
          cap_t cap_init(void);
          int cap_set_flag(cap_t cap_p, cap_flag_t flag, int ncap, const cap_value_t *caps, cap_flag_value_t value);
          int cap_free(void *obj_p);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커(Linker)를 속이기 위한 알맹이 없는 가짜 libcap.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_cap.c
          #include <stdlib.h>
          typedef struct _cap_struct *cap_t;
          
          // 호출되면 에러 없이 정상 작동한 것처럼 0이나 더미 포인터를 반환
          cap_t cap_get_proc(void) { return (cap_t)1; }
          int cap_set_proc(cap_t cap_p) { return 0; }
          cap_t cap_init(void) { return (cap_t)1; }
          int cap_set_flag(cap_t cap_p, int flag, int ncap, const int *caps, int value) { return 0; }
          int cap_free(void *obj_p) { return 0; }
          EOF

          # NDK 컴파일러로 가짜 안드로이드 aarch64용 libcap.so 생성
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_cap.c -o $TERMUX_PREFIX/lib/libcap.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libcap.pc
          prefix=$RUNTIME_PATH
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libcap
          Description: Dummy libcap Stub for Termux Porting
          Version: 2.66
          Libs: -L\${libdir} -lcap
          Cflags: -I\${includedir}
          EOF
          
      - name: Create Dummy libgbm Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 gbm.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/gbm.h
          #pragma once
          #include <stdint.h>

          #ifdef __cplusplus
          extern "C" {
          #endif

          struct gbm_device;
          struct gbm_bo;
          struct gbm_surface;

          union gbm_bo_handle {
             void *ptr;
             int32_t s32;
             uint32_t u32;
             int64_t s64;
             uint64_t u64;
          };

          #define GBM_BO_USE_SCANOUT      (1 << 0)
          #define GBM_BO_USE_CURSOR       (1 << 1)
          #define GBM_BO_USE_RENDERING    (1 << 2)
          #define GBM_BO_USE_WRITE        (1 << 3)
          #define GBM_BO_USE_LINEAR       (1 << 4)

          struct gbm_device *gbm_create_device(int fd);
          void gbm_device_destroy(struct gbm_device *gbm);
          
          // ⭐️ 이번 에러를 해결하기 위해 추가된 명세
          const char *gbm_device_get_backend_name(struct gbm_device *gbm);

          struct gbm_bo *gbm_bo_create(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, uint32_t flags);
          struct gbm_bo *gbm_bo_create_with_modifiers(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, const uint64_t *modifiers, const unsigned int count);
          void gbm_bo_destroy(struct gbm_bo *bo);
          int gbm_bo_get_fd(struct gbm_bo *bo);
          union gbm_bo_handle gbm_bo_get_handle(struct gbm_bo *bo);
          union gbm_bo_handle gbm_bo_get_handle_for_plane(struct gbm_bo *bo, int plane);
          uint64_t gbm_bo_get_modifier(struct gbm_bo *bo);
          int gbm_bo_get_plane_count(struct gbm_bo *bo);
          uint32_t gbm_bo_get_stride_for_plane(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_offset(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_stride(struct gbm_bo *bo);
          uint32_t gbm_bo_get_width(struct gbm_bo *bo);
          uint32_t gbm_bo_get_height(struct gbm_bo *bo);
          uint32_t gbm_bo_get_format(struct gbm_bo *bo);
          int gbm_device_is_format_supported(struct gbm_device *gbm, uint32_t format, uint32_t flags);

          struct gbm_surface *gbm_surface_create(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, uint32_t flags);
          void gbm_surface_destroy(struct gbm_surface *surface);
          struct gbm_bo *gbm_surface_lock_front_buffer(struct gbm_surface *surface);
          void gbm_surface_release_buffer(struct gbm_surface *surface, struct gbm_bo *bo);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libgbm.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_gbm.c
          #include <stdlib.h>
          #include <stdint.h>

          union gbm_bo_handle { void *ptr; int32_t s32; uint32_t u32; int64_t s64; uint64_t u64; };

          void *gbm_create_device(int fd) { return NULL; }
          void gbm_device_destroy(void *gbm) {}
          
          // ⭐️ 이번 에러를 해결하기 위해 추가된 가짜 깡통 함수
          const char *gbm_device_get_backend_name(void *gbm) { return "dummy_android"; }

          void *gbm_bo_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void *gbm_bo_create_with_modifiers(void *gbm, uint32_t w, uint32_t h, uint32_t f, const uint64_t *m, const unsigned int c) { return NULL; }
          void gbm_bo_destroy(void *bo) {}
          int gbm_bo_get_fd(void *bo) { return -1; }
          union gbm_bo_handle gbm_bo_get_handle(void *bo) { union gbm_bo_handle h = {0}; return h; }
          union gbm_bo_handle gbm_bo_get_handle_for_plane(void *bo, int p) { union gbm_bo_handle h = {0}; return h; }
          uint64_t gbm_bo_get_modifier(void *bo) { return 0; }
          int gbm_bo_get_plane_count(void *bo) { return 1; }
          uint32_t gbm_bo_get_stride_for_plane(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_offset(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_stride(void *bo) { return 0; }
          uint32_t gbm_bo_get_width(void *bo) { return 0; }
          uint32_t gbm_bo_get_height(void *bo) { return 0; }
          uint32_t gbm_bo_get_format(void *bo) { return 0; }
          int gbm_device_is_format_supported(void *gbm, uint32_t f, uint32_t fl) { return 0; }

          void *gbm_surface_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void gbm_surface_destroy(void *s) {}
          void *gbm_surface_lock_front_buffer(void *s) { return NULL; }
          void gbm_surface_release_buffer(void *s, void *bo) {}
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libgbm.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_gbm.c -o $TERMUX_PREFIX/lib/libgbm.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/gbm.pc
          prefix=$RUNTIME_PATH
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: gbm
          Description: Dummy gbm Stub for Termux Porting
          Version: 23.1.0
          Libs: -L\${libdir} -lgbm
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libseat Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일을 통과시키기 위한 가짜 libseat.h 헤더 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/libseat.h
          #pragma once
          #include <stdarg.h>
          #ifdef __cplusplus
          extern "C" {
          #endif

          struct libseat;

          struct libseat_seat_listener {
              void (*enable_seat)(struct libseat *seat, void *data);
              void (*disable_seat)(struct libseat *seat, void *data);
          };

          enum libseat_log_level {
              LIBSEAT_LOG_LEVEL_ERROR = 0,
              LIBSEAT_LOG_LEVEL_INFO,
              LIBSEAT_LOG_LEVEL_SILENT
          };

          // 🌟 [포인터 타입 에러 해결] va_list를 정교하게 수용하도록 타입 명세 변경
          typedef void (*libseat_log_func)(enum libseat_log_level level, const char *format, va_list args);

          inline struct libseat *libseat_open_seat(struct libseat_seat_listener *listener, void *data) { return (struct libseat*)1; }
          inline int libseat_close_seat(struct libseat *seat) { return 0; }
          inline int libseat_get_fd(struct libseat *seat) { return -1; }
          inline const char *libseat_seat_name(struct libseat *seat) { return "dummy_android"; }
          inline int libseat_disable_seat(struct libseat *seat) { return 0; }
          inline int libseat_dispatch(struct libseat *seat, int timeout) { return 0; }
          inline void libseat_set_log_handler(libseat_log_func handler) {}
          inline void libseat_set_log_level(enum libseat_log_level level) {}

          // 🌟 추가로 징징대던 디바이스 오픈/스위칭 가짜 스텁 선언 완료
          inline int libseat_open_device(struct libseat *seat, const char *path, int *fd) { return 1; }
          inline int libseat_close_device(struct libseat *seat, int device_id) { return 0; }
          inline int libseat_switch_session(struct libseat *seat, int vt) { return 0; }

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 가짜 libseat.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_seat.c
          #include <stdlib.h>
          void *libseat_open_seat(void *l, void *d) { return (void*)1; }
          int libseat_close_seat(void *s) { return 0; }
          int libseat_get_fd(void *s) { return -1; }
          const char *libseat_seat_name(void *s) { return "dummy_android"; }
          int libseat_disable_seat(void *s) { return 0; }
          int libseat_dispatch(void *s, int t) { return 0; }
          void libseat_set_log_handler(void *h) {}
          void libseat_set_log_level(int l) {}

          // 🌟 가짜 함수 바디 구현 완료
          int libseat_open_device(void *s, const char *p, int *f) { return 1; }
          int libseat_close_device(void *s, int id) { return 0; }
          int libseat_switch_session(void *s, int v) { return 0; }
          EOF

          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_seat.c -o $TERMUX_PREFIX/lib/libseat.so

          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libseat.pc
          prefix=$RUNTIME_PATH
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libseat
          Description: Dummy libseat Stub to bypass Android Gamescope build blocking
          Version: 0.8.0
          Libs: -L\${libdir} -lseat
          Cflags: -I\${includedir}
          EOF

      - name: Install wayland-protocols into Termux Sysroot
        run: |
          git clone --depth 1 --branch 1.36 https://gitlab.freedesktop.org/wayland/wayland-protocols.git
          
          cd wayland-protocols
          meson setup build --prefix=$TERMUX_PREFIX
          ninja -C build install
          
          echo "✅ wayland-protocols 진짜 명세서 주입 완료!"
          cd ..

      - name: Patch wayland-scanner.pc for wlroots Cross-Compilation
        run: |
          # 1. 우분투 호스트에 설치된 진짜 스캐너 경로를 알아냅니다. (예: /usr/bin/wayland-scanner)
          HOST_SCANNER=$(which wayland-scanner)
          echo "Real Host Scanner: $HOST_SCANNER"

          # 2. Termux의 pkgconfig 디렉토리가 없다면 생성합니다.
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          mkdir -p $TERMUX_PREFIX/share/pkgconfig

          # 3. wlroots가 가짜 변수($SCANNER_PATH) 대신 호스트 스캐너를 강제로 바라보도록 .pc 파일을 새로 작성합니다.
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc
          prefix=$RUNTIME_PATH
          exec_prefix=\${prefix}
          bindir=\${exec_prefix}/bin
          wayland_scanner=$HOST_SCANNER

          Name: Wayland Scanner
          Description: Wayland scanner stub redirecting to host for cross-compilation
          Version: 1.22.0
          EOF

          # 혹시 share/pkgconfig 폴더 쪽에 원본 찌꺼기가 남아있을 수 있으므로 양쪽 모두 덮어씌웁니다.
          cp $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc $TERMUX_PREFIX/share/pkgconfig/wayland-scanner.pc

      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          HOST_WAYLAND_SCANNER=$(which wayland-scanner)

          # 🔥 [강제 우회 해결책] 전역으로 주입할 Wine 스타일 SHM 에뮬레이션 헤더 파일 생성
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/android_shm_def.h
          #ifndef __ANDROID_SHM_DEF_H
          #define __ANDROID_SHM_DEF_H

          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/types.h>

          #ifdef __cplusplus
          extern "C" {
          #endif

          static inline int shm_open(const char *name, int oflag, mode_t mode) {
              char *tmpdir = getenv("TMPDIR");
              char *fname;
              if (!tmpdir) {
                  tmpdir = "/data/data/com.termux/files/usr/tmp";
              }
              if (name[0] == '/') {
                  name++;
              }
              if (asprintf(&fname, "%s/%s", tmpdir, name) == -1) {
                  return -1;
              }
              int fd = open(fname, oflag, mode);
              free(fname);
              return fd;
          }

          static inline int shm_unlink(const char *name) {
              char *tmpdir = getenv("TMPDIR");
              char *fname;
              if (!tmpdir) {
                  tmpdir = "/data/data/com.termux/files/usr/tmp";
              }
              if (name[0] == '/') {
                  name++;
              }
              if (asprintf(&fname, "%s/%s", tmpdir, name) == -1) {
                  return -1;
              }
              int res = unlink(fname);
              free(fname);
              return res;
          }

          #ifdef __cplusplus
          }
          #endif

          #endif /* __ANDROID_SHM_DEF_H */
          EOF

          # 🌟 c_args와 cpp_args 맨 뒤에 '-include', 'android_shm_def.h' 를 주입하여 컴파일러가 무조건 읽게 만듭니다.
          cat > /tmp/android-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang', '-D__TERMUX__', '-D__USE_GNU', '-D_GNU_SOURCE', '-U__ANDROID__', '--target=aarch64-linux-android30']
          cpp = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++', '-D__TERMUX__', '-D__USE_GNU', '-D_GNU_SOURCE', '-U__ANDROID__', '--target=aarch64-linux-android30']
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          wayland-scanner = '$HOST_WAYLAND_SCANNER'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h', '-include', 'android_shm_def.h']
          cpp_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h', '-include', 'android_shm_def.h']
          
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-ldrm', '-lwayland-client', '-lwayland-server']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-static-libstdc++', '-ldrm', '-lwayland-client', '-lwayland-server']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF
          
      - name: Configure Gamescope
        run: |
          cd gamescope-src

          # 구버전 내부에 포함된 내장 라이브러리(subprojects) 소스를 안전하게 수집합니다.
          meson subprojects download || true
          meson subprojects update || true

          sed -i "s/'backends=libinput'/'backends=auto'/g" meson.build
          sed -i "s/'xwayland', 'libinput_backend'/'xwayland'/g" meson.build
          
          sed -i "s/dependency('libdrm', version: '>= 2.4.105')/disabler()/g" meson.build
          sed -i "s/drm_dep,//g" meson.build
          sed -i "s/liftoff_dep,//g" meson.build
          find src/ -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) -exec sed -i "/#include <libliftoff.h>/d" {} +
          find src/ -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) -exec sed -i "/#include \"libliftoff.h\"/d" {} +

          echo "🛠️ android_shm_def.h 내부에 EGL 및 makedev 정의 병합 중..."
          cat << 'EOF' >> $TERMUX_PREFIX/include/android_shm_def.h

          #ifndef PFNEGLQUERYWAYLANDBUFFERWL
          #ifdef __cplusplus
          extern "C" {
          #endif
          struct wl_resource;
          typedef int ( *PFNEGLQUERYWAYLANDBUFFERWL) (void *dpy, struct wl_resource *buffer, int attribute, int *value);
          #ifdef __cplusplus
          }
          #endif
          #define PFNEGLQUERYWAYLANDBUFFERWL PFNEGLQUERYWAYLANDBUFFERWL
          #endif

          #ifndef makedev
          #define makedev(major, minor) ((((dev_t)(major) & 0xfffff000ULL) << 32) | \
                                         (((dev_t)(major) & 0x00000fffULL) << 8)  | \
                                         (((dev_t)(minor) & 0xffffff00ULL) << 12) | \
                                         (((dev_t)(minor) & 0x000000ffULL)))
          #endif
          EOF

          echo "🛠️ wlserver.cpp 내부에 dummy session 함수 강제 병합 (안드로이드 우회)..."
          cat << 'EOF' >> src/wlserver.cpp

          #include <sys/types.h>
          #include <stddef.h>
          #include <stdbool.h>

          struct wl_display;
          struct wlr_session;
          struct wlr_device;

          extern "C" {
              struct wlr_session *wlr_session_create(struct wl_display *disp) { return NULL; }
              void wlr_session_destroy(struct wlr_session *session) {}
              struct wlr_device *wlr_session_open_file(struct wlr_session *session, const char *path) { return NULL; }
              void wlr_session_close_file(struct wlr_session *session, struct wlr_device *dev) {}
              bool wlr_session_change_vt(struct wlr_session *session, unsigned int vt) { return false; }
              ssize_t wlr_session_find_gpus(struct wlr_session *session, size_t ret_len, struct wlr_device **ret) { return 0; }
              int session_open_if_kms(struct wlr_session *session, const char *path) { return -1; }
          }
          EOF

          echo "🛠️ 변수와 함수의 형식을 정확히 맞춘 완벽한 깡통 DRM 소스 주입 중..."
          
          cat << 'EOF' > src/drm.cpp
          #include <stdint.h>
          #include <stddef.h>
          #include <sys/types.h>

          typedef void* drm_t;
          struct wlr_buffer;
          struct wlr_dmabuf_attributes;
          struct Composite_t;
          struct VulkanPipeline_t;

          // 1. 전역 변수들은 main.cpp 등이 C++로 선언했으므로 그대로 둡니다.
          void* g_DRM = NULL;
          bool g_bRotated = false;
          uint32_t g_nDRMFormat = 0;
          const char* g_sOutputName = "Termux-X11";
          bool g_bUseLayers = false;
          bool g_bDebugLayers = false;
          int g_drmModeGeneration = 0;

          extern "C" {
              bool init_drm(drm_t* d, int w, int h, int r) { return true; }
              uint32_t drm_fbid_from_dmabuf(drm_t* d, wlr_buffer* b, wlr_dmabuf_attributes* a) { return 0; }
              void drm_drop_fbid(drm_t* d, unsigned int f) {}
              int find_drm_node_by_devid(unsigned long id) { return -1; }
              void drm_lock_fbid(drm_t* d, unsigned int f) {}
              void drm_poll_state(drm_t* d) {}
              int drm_get_default_refresh(drm_t* d) { return 60; }
              void drm_set_refresh(drm_t* d, int r) {}
              bool drm_prepare(drm_t* d, const Composite_t* c, const VulkanPipeline_t* v) { return false; }
              void drm_rollback(drm_t* d) {}
              bool drm_commit(drm_t* d, Composite_t* c, VulkanPipeline_t* v) { return false; }
              void finish_drm(drm_t* d) {}
              void drm_set_color_linear_gains(drm_t* d, float* f) {}
              void drm_set_color_gains(drm_t* d, float* f) {}
              void drm_set_color_gain_blend(drm_t* d, float f) {}
              void drm_set_color_matrix(drm_t* d, float* f) {}
          }
          EOF

          sed -i 's/cap_t caps = cap_get_proc();/void* caps = nullptr; \/\/ 안드로이드 우회/g' src/main.cpp
          sed -i 's/cap_flag_value_t nicecapvalue = CAP_CLEAR;/int nicecapvalue = 0;/g' src/main.cpp
          sed -i 's/cap_get_flag( caps, CAP_SYS_NICE, CAP_EFFECTIVE, \&nicecapvalue );/nicecapvalue = 1; \/\/ 항상 권한 있음으로 속임/g' src/main.cpp
          sed -i 's/if ( nicecapvalue == CAP_SET )/if ( nicecapvalue == 1 )/g' src/main.cpp
          sed -i 's/\.mask = XRES_CLIENT_ID_PID_MASK/ \/\/ .mask = XRES_CLIENT_ID_PID_MASK/g' src/steamcompmgr.cpp
          sed -i 's/\.client = id,/ \/\/ .client = id,/g' src/steamcompmgr.cpp
          sed -i 's/pid = XResGetClientPid(&client_ids\[i\]);/pid = 0; \/\/ 안드로이드 우회/g' src/steamcompmgr.cpp
          sed -i 's/XResClientIdsDestroy(num_ids, client_ids);/\/\/ XResClientIdsDestroy/g' src/steamcompmgr.cpp
          sed -i 's/if (!XResQueryVersion(ctx->dpy, \&xres_major, \&xres_minor))/if (false) \/\/ XResQueryVersion 스킵/g' src/steamcompmgr.cpp

          echo "🛠️ wlserver.cpp libinput 생성 심볼 에러 우회 패치 중..."
          sed -i 's/wlr_libinput_backend_create(.\+);/nullptr; \/\/ 안드로이드 libinput 미사용 우회/g' src/wlserver.cpp

          echo "🛠️ rendervulkan.cpp Vulkan 타임라인 세마포어 심볼 링크 에러 패치 중..."
          sed -i 's/vkGetSemaphoreCounterValue(/((PFN_vkGetSemaphoreCounterValue)vkGetDeviceProcAddr(device, "vkGetSemaphoreCounterValue"))(/g' src/rendervulkan.cpp

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_ROOT"
          export RUNTIME_PATH="/data/data/com.termux/files/usr"

          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-shmem"
          
          export CFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export CXXFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem -static-libstdc++"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dpipewire=disabled \
            --prefix=/data/data/com.termux/files/usr

          WL_BACKEND_MESON="subprojects/wlroots/backend/meson.build"
          if [ -f "$WL_BACKEND_MESON" ]; then
            echo "✅ subprojects/wlroots/backend/meson.build 강제 무력화 패치 중..."
            sed -i "s/subdir('libinput')/# subdir('libinput')/g" "$WL_BACKEND_MESON"
            sed -i "s/backends.contains('libinput')/false/g" "$WL_BACKEND_MESON"
            sed -i "s/subdir('session')/# subdir('session')/g" "$WL_BACKEND_MESON"
            sed -i "s/has_session = true/has_session = false/g" "$WL_BACKEND_MESON"
            sed -i "s/.*libinput_events.c.*/# /g" "$WL_BACKEND_MESON"
            sed -i "s/.*backend\/libinput.*/# /g" "$WL_BACKEND_MESON"
          fi

          find subprojects/wlroots/backend/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i "/#include <libinput.h>/d" {} +
          find subprojects/wlroots/include/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i "/#include <libinput.h>/d" {} +
          rm -f "subprojects/wlroots/include/backend/libinput.h"
          find subprojects/wlroots/backend/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i "/backend\/libinput\.h/d" {} +
          find subprojects/wlroots/include/ -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i "/backend\/libinput\.h/d" {} +

          WL_BACKEND_MESON="subprojects/wlroots/backend/meson.build"
          if [ -f "$WL_BACKEND_MESON" ]; then
            sed -i "s/subdir('libinput')/# subdir('libinput')/g" "$WL_BACKEND_MESON"
            sed -i "s/backends.contains('libinput')/false/g" "$WL_BACKEND_MESON"
            sed -i "s/subdir('session')/# subdir('session')/g" "$WL_BACKEND_MESON"
            sed -i "s/has_session = true/has_session = false/g" "$WL_BACKEND_MESON"
          fi

          # 🛠️ 여기에 아래 코드를 새로 추가합니다.
          LIFTOFF_MESON="subprojects/libliftoff/meson.build"
          if [ -f "$LIFTOFF_MESON" ]; then
            echo "🛠️ libliftoff 테스트 빌드 제외 패치 중..."
            sed -i "s/subdir('test')/# subdir('test')/g" "$LIFTOFF_MESON"
          fi

          if [ -f "subprojects/wlroots/backend/libinput/meson.build" ]; then
            echo "🔥 libinput 빌드 대상 빌드 스크립트 강제 비우기 완료"
            echo "# libinput disabled for termux" > "subprojects/wlroots/backend/libinput/meson.build"
          fi

      - name: Build
        run: |
          cd gamescope-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd gamescope-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Gamescope Files ==="
          find gamescope-src/install -type f

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-android-legacy
          path: |
            gamescope-src/build.log
            gamescope-src/install
