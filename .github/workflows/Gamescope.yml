name: Build Android Gamescope (Legacy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gamescope:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Gamescope
        run: |
          git clone --depth 1 \
            https://github.com/DadSchoorse/gamescope.git \
            gamescope-src
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools \
            libpixman-1-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxi-dev \
            libxmu-dev \
            libxrender-dev \
            libxres-dev \
            libxtst-dev \
            libvulkan-dev \
            libwayland-dev

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar

          cd $HOME/termuxfs/aarch64/data/data/com.termux/files
          wget -q https://github.com/mebabo1/menano/releases/download/Box/wayland_scanner.tar.gz
          tar xf wayland_scanner.tar.gz
          rm wayland_scanner.tar.gz
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Create Dummy XRes Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "=== 1. Gamescope가 참조할 가짜 XRes.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include/X11/extensions
          cat << 'EOF' > $TERMUX_PREFIX/include/X11/extensions/XRes.h
          #pragma once
          #include <X11/Xlib.h>
          #include <X11/Xfuncproto.h>
          
          // Gamescope 소스 내부에서 에러가 나지 않도록 최소한의 구조체 선언
          typedef struct { XID resource; unsigned long type; } XResClientIdSpec;
          typedef struct { XResClientIdSpec spec; long length; void *value; } XResClientIdValue;
          
          _XFUNCPROTOBEGIN
          Status XResQueryExtension(Display *dpy, int *event_basep, int *error_basep);
          Status XResQueryClientIds(Display *dpy, long num_specs, XResClientIdSpec *specs, long *num_ids, XResClientIdValue **ids);
          _XFUNCPROTOEND
          EOF

          echo "=== 2. 링커(Linker)를 속이기 위한 알맹이 없는 가짜 64비트 .so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_xres.c
          // 호출되어도 아무 일도 안 하고 0만 반환하는 가짜 함수들
          int XResQueryExtension(void* dpy, int* ev, int* err) { return 0; }
          int XResQueryClientIds(void* dpy, long num, void* specs, long* num_ids, void* ids) { return 0; }
          EOF

          # NDK 안드로이드 크로스 컴파일러를 사용해 가짜 aarch64용 libXres.so를 생성합니다.
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_xres.c -o $TERMUX_PREFIX/lib/libXres.so

          echo "=== 3. Meson 빌드 시스템을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/xres.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: XRes
          Description: Dummy X Resource Extension Library Stub for Termux Porting
          Version: 1.2.2
          Requires: x11
          Libs: -L\${libdir} -lXres
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libcap Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. Gamescope가 참조할 가짜 sys/capability.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include/sys
          cat << 'EOF' > $TERMUX_PREFIX/include/sys/capability.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // Gamescope 소스 컴파일에 필요한 최소한의 자료형 및 상수 정의
          typedef struct _cap_struct *cap_t;
          typedef int cap_value_t;
          typedef enum { CAP_EFFECTIVE=0, CAP_PERMITTED=1, CAP_INHERITABLE=2 } cap_flag_t;
          typedef enum { CAP_CLEAR=0, CAP_SET=1 } cap_flag_value_t;
          
          #define CAP_SYS_NICE 23

          // 데스크톱 libcap의 필수 함수 형태 선언
          cap_t cap_get_proc(void);
          int cap_set_proc(cap_t cap_p);
          cap_t cap_init(void);
          int cap_set_flag(cap_t cap_p, cap_flag_t flag, int ncap, const cap_value_t *caps, cap_flag_value_t value);
          int cap_free(void *obj_p);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커(Linker)를 속이기 위한 알맹이 없는 가짜 libcap.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_cap.c
          #include <stdlib.h>
          typedef struct _cap_struct *cap_t;
          
          // 호출되면 에러 없이 정상 작동한 것처럼 0이나 더미 포인터를 반환
          cap_t cap_get_proc(void) { return (cap_t)1; }
          int cap_set_proc(cap_t cap_p) { return 0; }
          cap_t cap_init(void) { return (cap_t)1; }
          int cap_set_flag(cap_t cap_p, int flag, int ncap, const int *caps, int value) { return 0; }
          int cap_free(void *obj_p) { return 0; }
          EOF

          # NDK 컴파일러로 가짜 안드로이드 aarch64용 libcap.so 생성
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_cap.c -o $TERMUX_PREFIX/lib/libcap.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libcap.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libcap
          Description: Dummy libcap Stub for Termux Porting
          Version: 2.66
          Libs: -L\${libdir} -lcap
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libudev Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 libudev.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/libudev.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // wlroots가 내부적으로 사용하는 핵심 udev 구조체 선언
          struct udev;
          struct udev_monitor;
          struct udev_device;
          struct udev_enumerate;
          struct udev_list_entry;

          // wlroots 빌드 패스를 위해 필요한 최소한의 함수 형태 정의
          struct udev *udev_new(void);
          struct udev *udev_unref(struct udev *udev);
          struct udev_monitor *udev_monitor_new_from_netlink(struct udev *udev, const char *name);
          int udev_monitor_filter_add_match_subsystem_devtype(struct udev_monitor *udev_monitor, const char *subsystem, const char *devtype);
          int udev_monitor_enable_receiving(struct udev_monitor *udev_monitor);
          int udev_monitor_get_fd(struct udev_monitor *udev_monitor);
          struct udev_device *udev_monitor_receive_device(struct udev_monitor *udev_monitor);
          struct udev_device *udev_device_unref(struct udev_device *udev_device);
          const char *udev_device_get_syspath(struct udev_device *udev_device);
          const char *udev_device_get_devnode(struct udev_device *udev_device);
          const char *udev_device_get_subsystem(struct udev_device *udev_device);
          const char *udev_device_get_property_value(struct udev_device *udev_device, const char *key);
          
          struct udev_enumerate *udev_enumerate_new(struct udev *udev);
          int udev_enumerate_add_match_subsystem(struct udev_enumerate *udev_enumerate, const char *subsystem);
          int udev_enumerate_scan_devices(struct udev_enumerate *udev_enumerate);
          struct udev_list_entry *udev_enumerate_get_list_entry(struct udev_enumerate *udev_enumerate);
          struct udev_enumerate *udev_enumerate_unref(struct udev_enumerate *udev_enumerate);
          struct udev_list_entry *udev_list_entry_get_next(struct udev_list_entry *list_entry);
          const char *udev_list_entry_get_name(struct udev_list_entry *list_entry);
          struct udev_device *udev_device_new_from_syspath(struct udev *udev, const char *syspath);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libudev.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_udev.c
          #include <stdlib.h>
          
          // 호출되면 크래시 없이 안전하게 NULL(0)이나 기본값만 반환하는 깡통 함수들
          void *udev_new(void) { return (void*)1; }
          void *udev_unref(void *udev) { return NULL; }
          void *udev_monitor_new_from_netlink(void *udev, const char *name) { return (void*)1; }
          int udev_monitor_filter_add_match_subsystem_devtype(void *m, const char *s, const char *d) { return 0; }
          int udev_monitor_enable_receiving(void *m) { return 0; }
          int udev_monitor_get_fd(void *m) { return -1; } // 유효하지 않은 파일 디스크립터 반환
          void *udev_monitor_receive_device(void *m) { return NULL; }
          void *udev_device_unref(void *d) { return NULL; }
          const char *udev_device_get_syspath(void *d) { return ""; }
          const char *udev_device_get_devnode(void *d) { return NULL; }
          const char *udev_device_get_subsystem(void *d) { return ""; }
          const char *udev_device_get_property_value(void *d, const char *k) { return NULL; }
          
          void *udev_enumerate_new(void *udev) { return (void*)1; }
          int udev_enumerate_add_match_subsystem(void *e, const char *s) { return 0; }
          int udev_enumerate_scan_devices(void *e) { return 0; }
          void *udev_enumerate_get_list_entry(void *e) { return NULL; }
          void *udev_enumerate_unref(void *e) { return NULL; }
          void *udev_list_entry_get_next(void *l) { return NULL; }
          const char *udev_list_entry_get_name(void *l) { return ""; }
          void *udev_device_new_from_syspath(void *u, const char *s) { return NULL; }
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libudev.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_udev.c -o $TERMUX_PREFIX/lib/libudev.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libudev.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libudev
          Description: Dummy libudev Stub for Termux Porting
          Version: 251
          Libs: -L\${libdir} -ludev
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libinput, libseat, and libudev Stubs for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          mkdir -p $TERMUX_PREFIX/include

          echo "=== 1. wlroots 입력 백엔드를 속이는 무결점 libinput.h 생성 ==="
          cat << 'EOF' > $TERMUX_PREFIX/include/libinput.h
          #pragma once
          #include <stdint.h>
          #ifdef __cplusplus
          extern "C" {
          #endif

          struct libinput;
          struct libinput_event;
          struct libinput_device;
          struct udev;
          struct udev_device;
          struct libinput_event_switch;
          struct libinput_event_keyboard;
          struct libinput_event_pointer;
          struct libinput_event_touch;
          struct libinput_event_tablet_tool;
          struct libinput_event_tablet_pad;
          struct libinput_event_gesture;
          struct libinput_tablet_tool;
          struct libinput_tablet_pad_mode_group;

          struct libinput_interface {
              int (*open_restricted)(const char *path, int flags, void *user_data);
              void (*close_restricted)(int fd, void *user_data);
          };

          enum libinput_event_type {
              LIBINPUT_EVENT_NONE = 0, LIBINPUT_EVENT_DEVICE_ADDED, LIBINPUT_EVENT_DEVICE_REMOVED,
              LIBINPUT_EVENT_KEYBOARD_KEY, LIBINPUT_EVENT_POINTER_MOTION, LIBINPUT_EVENT_POINTER_MOTION_ABSOLUTE,
              LIBINPUT_EVENT_POINTER_BUTTON, LIBINPUT_EVENT_POINTER_AXIS, LIBINPUT_EVENT_TOUCH_DOWN,
              LIBINPUT_EVENT_TOUCH_UP, LIBINPUT_EVENT_TOUCH_MOTION, LIBINPUT_EVENT_TOUCH_CANCEL,
              LIBINPUT_EVENT_TOUCH_FRAME, LIBINPUT_EVENT_TABLET_TOOL_AXIS, LIBINPUT_EVENT_TABLET_TOOL_PROXIMITY,
              LIBINPUT_EVENT_TABLET_TOOL_TIP, LIBINPUT_EVENT_TABLET_TOOL_BUTTON, LIBINPUT_EVENT_TABLET_PAD_BUTTON,
              LIBINPUT_EVENT_TABLET_PAD_RING, LIBINPUT_EVENT_TABLET_PAD_STRIP, LIBINPUT_EVENT_SWITCH_TOGGLE,
              LIBINPUT_EVENT_GESTURE_SWIPE_BEGIN, LIBINPUT_EVENT_GESTURE_SWIPE_UPDATE, LIBINPUT_EVENT_GESTURE_SWIPE_END,
              LIBINPUT_EVENT_GESTURE_PINCH_BEGIN, LIBINPUT_EVENT_GESTURE_PINCH_UPDATE, LIBINPUT_EVENT_GESTURE_PINCH_END,
              LIBINPUT_EVENT_GESTURE_HOLD_BEGIN, LIBINPUT_EVENT_GESTURE_HOLD_END
          };

          enum libinput_tablet_pad_ring_source { LIBINPUT_TABLET_PAD_RING_SOURCE_UNKNOWN = 0, LIBINPUT_TABLET_PAD_RING_SOURCE_FINGER };
          enum libinput_tablet_pad_strip_source { LIBINPUT_TABLET_PAD_STRIP_SOURCE_UNKNOWN = 0, LIBINPUT_TABLET_PAD_STRIP_SOURCE_FINGER };
          enum libinput_tablet_tool_type { LIBINPUT_TABLET_TOOL_TYPE_PEN = 1, LIBINPUT_TABLET_TOOL_TYPE_ERASER, LIBINPUT_TABLET_TOOL_TYPE_BRUSH, LIBINPUT_TABLET_TOOL_TYPE_PENCIL, LIBINPUT_TABLET_TOOL_TYPE_AIRBRUSH, LIBINPUT_TABLET_TOOL_TYPE_MOUSE, LIBINPUT_TABLET_TOOL_TYPE_LENS, LIBINPUT_TABLET_TOOL_TYPE_TOTEM };
          enum libinput_log_priority { LIBINPUT_LOG_PRIORITY_ERROR = 0, LIBINPUT_LOG_PRIORITY_INFO = 1 };
          enum libinput_key_state { LIBINPUT_KEY_STATE_RELEASED = 0, LIBINPUT_KEY_STATE_PRESSED = 1 };
          enum libinput_button_state { LIBINPUT_BUTTON_STATE_RELEASED = 0, LIBINPUT_BUTTON_STATE_PRESSED = 1 };
          enum libinput_pointer_axis { LIBINPUT_POINTER_AXIS_SCROLL_VERTICAL = 0, LIBINPUT_POINTER_AXIS_SCROLL_HORIZONTAL = 1 };
          enum libinput_pointer_axis_source { LIBINPUT_POINTER_AXIS_SOURCE_WHEEL = 1, LIBINPUT_POINTER_AXIS_SOURCE_FINGER, LIBINPUT_POINTER_AXIS_SOURCE_CONTINUOUS, LIBINPUT_POINTER_AXIS_SOURCE_WHEEL_TILT };
          enum libinput_device_capability { LIBINPUT_DEVICE_CAP_KEYBOARD = 0, LIBINPUT_DEVICE_CAP_POINTER = 1, LIBINPUT_DEVICE_CAP_TOUCH = 2, LIBINPUT_DEVICE_CAP_TABLET_TOOL = 3, LIBINPUT_DEVICE_CAP_TABLET_PAD = 4, LIBINPUT_DEVICE_CAP_GESTURE = 5, LIBINPUT_DEVICE_CAP_SWITCH = 6 };
          enum libinput_tablet_pad_button_state { LIBINPUT_TABLET_PAD_BUTTON_STATE_RELEASED = 0, LIBINPUT_TABLET_PAD_BUTTON_STATE_PRESSED = 1 };
          enum libinput_tablet_tool_proximity_state { LIBINPUT_TABLET_TOOL_PROXIMITY_STATE_OUT = 0, LIBINPUT_TABLET_TOOL_PROXIMITY_STATE_IN = 1 };
          enum libinput_tablet_tool_tip_state { LIBINPUT_TABLET_TOOL_TIP_UP = 0, LIBINPUT_TABLET_TOOL_TIP_DOWN = 1 };

          #define LIBINPUT_SWITCH_LID 1
          #define LIBINPUT_SWITCH_TABLET_MODE 2
          #define LIBINPUT_SWITCH_STATE_OFF 0
          #define LIBINPUT_SWITCH_STATE_ON 1

          struct libinput *libinput_udev_create_context(const struct libinput_interface *interface, void *user_data, struct udev *udev);
          struct libinput *libinput_path_create_context(const struct libinput_interface *interface, void *user_data);
          int libinput_udev_assign_seat(struct libinput *libinput, const char *seat_id);
          int libinput_dispatch(struct libinput *libinput);
          struct libinput_event *libinput_get_event(struct libinput *libinput);
          int libinput_event_get_type(struct libinput_event *event);
          void libinput_event_destroy(struct libinput_event *event);
          struct libinput *libinput_unref(struct libinput *libinput);
          void *libinput_get_user_data(struct libinput *libinput);
          int libinput_get_fd(struct libinput *libinput);
          void libinput_log_set_handler(struct libinput *libinput, void *handler);
          void libinput_log_set_priority(struct libinput *libinput, enum libinput_log_priority priority);
          int libinput_resume(struct libinput *libinput);
          void libinput_suspend(struct libinput *libinput);
          struct libinput_device *libinput_event_get_device(struct libinput_event *event);
          void *libinput_device_get_user_data(struct libinput_device *device);
          void libinput_device_set_user_data(struct libinput_device *device, void *user_data);
          const char *libinput_device_get_name(struct libinput_device *device);
          struct libinput_device *libinput_device_ref(struct libinput_device *device);
          void libinput_device_unref(struct libinput_device *device);
          uint32_t libinput_device_get_id_vendor(struct libinput_device *device);
          uint32_t libinput_device_get_id_product(struct libinput_device *device);
          int libinput_device_get_size(struct libinput_device *device, double *width, double *height);
          const char *libinput_device_get_output_name(struct libinput_device *device);
          int libinput_device_has_capability(struct libinput_device *device, enum libinput_device_capability capability);
          void libinput_device_led_update(struct libinput_device *device, uint32_t leds);
          struct udev_device *libinput_device_get_udev_device(struct libinput_device *device);

          struct libinput_event_keyboard *libinput_event_get_keyboard_event(struct libinput_event *event);
          uint64_t libinput_event_keyboard_get_time_usec(struct libinput_event_keyboard *event);
          uint32_t libinput_event_keyboard_get_key(struct libinput_event_keyboard *event);
          enum libinput_key_state libinput_event_keyboard_get_key_state(struct libinput_event_keyboard *event);
          struct libinput_event_switch *libinput_event_get_switch_event(struct libinput_event *event);
          int libinput_event_switch_get_switch(struct libinput_event_switch *event);
          int libinput_event_switch_get_switch_state(struct libinput_event_switch *event);
          uint64_t libinput_event_switch_get_time_usec(struct libinput_event_switch *event);

          struct libinput_event_pointer *libinput_event_get_pointer_event(struct libinput_event *event);
          uint64_t libinput_event_pointer_get_time_usec(struct libinput_event_pointer *event);
          double libinput_event_pointer_get_dx(struct libinput_event_pointer *event);
          double libinput_event_pointer_get_dy(struct libinput_event_pointer *event);
          double libinput_event_pointer_get_dx_unaccelerated(struct libinput_event_pointer *event);
          double libinput_event_pointer_get_dy_unaccelerated(struct libinput_event_pointer *event);
          uint32_t libinput_event_pointer_get_button(struct libinput_event_pointer *event);
          enum libinput_button_state libinput_event_pointer_get_button_state(struct libinput_event_pointer *event);
          int libinput_event_pointer_has_axis(struct libinput_event_pointer *event, enum libinput_pointer_axis axis);
          double libinput_event_pointer_get_axis_value(struct libinput_event_pointer *event, enum libinput_pointer_axis axis);
          enum libinput_pointer_axis_source libinput_event_pointer_get_axis_source(struct libinput_event_pointer *event);
          double libinput_event_pointer_get_absolute_x_transformed(struct libinput_event_pointer *event, uint32_t width);
          double libinput_event_pointer_get_absolute_y_transformed(struct libinput_event_pointer *event, uint32_t height);
          double libinput_event_pointer_get_axis_value_discrete(struct libinput_event_pointer *event, enum libinput_pointer_axis axis);

          struct libinput_event_touch *libinput_event_get_touch_event(struct libinput_event *event);
          uint64_t libinput_event_touch_get_time_usec(struct libinput_event_touch *event);
          int libinput_event_touch_get_slot(struct libinput_event_touch *event);
          int libinput_event_touch_get_seat_slot(struct libinput_event_touch *event);
          double libinput_event_touch_get_x_transformed(struct libinput_event_touch *event, uint32_t width);
          double libinput_event_touch_get_y_transformed(struct libinput_event_touch *event, uint32_t height);

          struct libinput_event_gesture *libinput_event_get_gesture_event(struct libinput_event *event);
          uint64_t libinput_event_gesture_get_time_usec(struct libinput_event_gesture *event);
          int libinput_event_gesture_get_finger_count(struct libinput_event_gesture *event);
          double libinput_event_gesture_get_dx(struct libinput_event_gesture *event);
          double libinput_event_gesture_get_dy(struct libinput_event_gesture *event);
          int libinput_event_gesture_get_cancelled(struct libinput_event_gesture *event);
          double libinput_event_gesture_get_scale(struct libinput_event_gesture *event);
          double libinput_event_gesture_get_angle_delta(struct libinput_event_gesture *event);

