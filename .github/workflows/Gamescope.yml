name: Build Gamescope (Native arm64 Ubuntu with Termux glibc Linker)

on:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Gamescope inside Native arm64 Ubuntu Container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/ubuntu:24.04 /bin/bash -c "
              set -e
              echo '🚀 arm64 네이티브 컨테이너 진입 (Architecture: '\$(uname -m)')'

              # 1. 우분투 arm64 순정 최신 개발 패키지들 깔끔하게 설치 (헤더/프로토콜 에러 원천 차단)
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential git cmake ninja-build python3 python3-pip pkg-config \
                meson libwayland-dev wayland-protocols libvulkan-dev libx11-dev \
                libx11-xcb-dev libxcb-xdgoutput0-dev libxcb-icccm4-dev libxcb-ewmh-dev \
                libxcb-res0-dev libxcomposite-dev libxext-dev libxfixes-dev libxrender-dev \
                libxrandr-dev libxinerama-dev libxkbcommon-dev libxxf86vm-dev \
                libinput-dev libudev-dev libpixman-1-dev libdrm-dev libseat-dev \
                libluajit-5.1-dev libgl-dev libegl-dev libgles-dev libepoxy-dev \
                hwdata glslang-tools libcap-dev libbenchmark-dev libpulse-dev \
                libpipewire-0.3-dev libavutil-dev libavcodec-dev libswscale-dev \
                libdecor-0-dev libliftoff-dev

              # 2. Gamescope 소스 다운로드
              git clone --recursive https://github.com/ValveSoftware/gamescope.git gamescope-src
              cd gamescope-src

              # 🌟 3. [누락 교정 완료] Termux 순정 경로($deps)와 glibc 경로($depsg) 선언
              export deps=\"/data/data/com.termux/files/usr\"
              export depsg=\"/data/data/com.termux/files/usr/glibc\"
              
              # 🌟 4. [누락 교정 완료] Meson이 호스트 패키지를 정상 조화하도록 pkg-config 타겟 강제 지정
              export PKG_CONFIG_SYSROOT_DIR=\"/\"
              export PKG_CONFIG_LIBDIR=\"/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig\"
              export PKG_CONFIG_PATH=\"/usr/lib/aarch64-linux-gnu/pkgconfig\"

              # 5. 컴파일러 강제 설정
              export CC=\"clang\"
              export CXX=\"clang++\"
              export CFLAGS=\"-O2 -pipe -I\$depsg/include\"
              export CXXFLAGS=\"-O2 -pipe -I\$depsg/include\"        
              # 7. Termux glibc용 핵심 실행 파일 링커 고정 플래그
              export TERMUX_LDFLAGS=\"-s -L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=\$depsg/lib/ld-linux-aarch64.so.1 -Wl,-rpath=\$depsg/lib -Wl,-O3,--sort-common,--as-needed\"

              echo '⚙️ Termux glibc 환경 및 오디오 설정을 메손 빌더에 주입하는 중...'
              
              # 🌟 8. Meson 내장 인자 시스템으로 CFLAGS와 LDFLAGS를 누락 없이 완전 투입합니다.
              meson setup build \
                -Dinput_emulation=disabled \
                -Denable_openvr_support=false \
                -Drt_cap=disabled \
                -Denable_tests=false \
                -Dc_args=\"\$CFLAGS \$PULSE_CFLAGS\" \
                -Dcpp_args=\"\$CXXFLAGS \$PULSE_CFLAGS\" \
                -Dc_link_args=\"\$TERMUX_LDFLAGS \$PULSE_LIBS\" \
                -Dcpp_link_args=\"\$TERMUX_LDFLAGS \$PULSE_LIBS\" \
                --prefix=/data/data/com.termux/files/usr/glibc

              echo '🛠️ Gamescope 컴파일 시작...'
              meson compile -C build --verbose

              echo '📦 빌드 완료품 아티팩트 추출 중...'
              mkdir -p /workspace/gamescope-dist
              DESTDIR=/workspace/gamescope-dist meson install -C build
            "

      - name: Package Native arm64 Artifacts
        run: |
          cd ${{ github.workspace }}/gamescope-dist
          tar -cJf ${{ github.workspace }}/gamescope-native-arm64.tar.xz .
          echo "✔ Termux glibc용 패키징 완료!"

      - name: Upload Gamescope Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-native-arm64
          path: gamescope-native-arm64.tar.xz
