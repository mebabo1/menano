name: Build Gamescope (Native arm64 Ubuntu with Termux glibc Linker)

on:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # 1. 호스트 단에서 깨끗한 배포용 폴더 확보
      - name: Pre-create output directory
        run: |
          rm -rf ${{ github.workspace }}/gamescope-dist
          mkdir -p ${{ github.workspace }}/gamescope-dist

      - name: Build Gamescope inside Native arm64 Ubuntu Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/ubuntu:24.04 /bin/bash -c "
              set -e
              echo '🚀 arm64 네이티브 컨테이너 진입 (Architecture: '\$(uname -m)')'

              # 패키지 설치 단계
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential git cmake ninja-build python3 python3-pip python3-setuptools pkg-config \
                meson libwayland-dev wayland-protocols libvulkan-dev libx11-dev \
                libx11-xcb-dev libxcb-icccm4-dev libxcb-ewmh-dev xcb-proto \
                libxcb-res0-dev libxcomposite-dev libxext-dev libxfixes-dev libxrender-dev \
                libxrandr-dev libxinerama-dev libxkbcommon-dev libxxf86vm-dev \
                libinput-dev libudev-dev libpixman-1-dev libdrm-dev libseat-dev \
                libluajit-5.1-dev libgl-dev libegl-dev libgles-dev libepoxy-dev \
                hwdata glslang-tools libcap-dev libbenchmark-dev libpulse-dev \
                libpipewire-0.3-dev libavutil-dev libavcodec-dev libswscale-dev \
                libdecor-0-dev libliftoff-dev \
                autoconf automake libtool gettext flex bison nasm ca-certificates wget curl xz-utils file \
                clang llvm lld libglib2.0-dev libfreetype6-dev libltdl-dev libxcb1-dev librsvg2-bin \
                libunwind-dev libdbus-1-dev libxcursor-dev libxi-dev libmpg123-dev libopenal-dev \
                libfontconfig1-dev libsdl2-dev libasound2-dev libgstreamer1.0-dev \
                libgstreamer-plugins-base1.0-dev dpkg-dev fakeroot debhelper dh-make screen nano less

              if [ ! -d \"gamescope-src\" ]; then
                git clone --recursive https://github.com/ValveSoftware/gamescope.git gamescope-src
              fi
              cd gamescope-src

              export deps=\"/data/data/com.termux/files/usr\"
              export depsg=\"/data/data/com.termux/files/usr/glibc\"
              
              export PKG_CONFIG_SYSROOT_DIR=\"/\"
              export PKG_CONFIG_LIBDIR=\"/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig\"
              export PKG_CONFIG_PATH=\"/usr/lib/aarch64-linux-gnu/pkgconfig\"

              echo '📝 Creating Meson Cross File for Termux glibc...'
              cat << 'EOF' > /tmp/termux-glibc.ini
              [binaries]
              c = 'clang'
              cpp = 'clang++'
              pkgconfig = 'pkg-config'

              [built-in options]
              c_args = ['-O2', '-pipe', '-I/data/data/com.termux/files/usr/glibc/include', '-I/data/data/com.termux/files/usr/include/pulse']
              cpp_args = ['-O2', '-pipe', '-I/data/data/com.termux/files/usr/glibc/include', '-I/data/data/com.termux/files/usr/include/pulse']
              c_link_args = ['-s', '-L/usr/lib/aarch64-linux-gnu', '-Wl,--dynamic-linker=/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1', '-Wl,-rpath=/data/data/com.termux/files/usr/glibc/lib', '-Wl,-O3,--sort-common,--as-needed', '-L/data/data/com.termux/files/usr/lib/pulseaudio', '-lpulse']
              cpp_link_args = ['-s', '-L/usr/lib/aarch64-linux-gnu', '-Wl,--dynamic-linker=/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1', '-Wl,-rpath=/data/data/com.termux/files/usr/glibc/lib', '-Wl,-O3,--sort-common,--as-needed', '-L/data/data/com.termux/files/usr/lib/pulseaudio', '-lpulse']

              [properties]
              needs_exe_wrapper = true

              [host_machine]
              system = 'linux'
              cpu_family = 'aarch64'
              cpu = 'armv8-a'
              endian = 'little'
              EOF

              echo '⚙️ Running Meson Setup with Cross File...'
              rm -rf build
              meson setup build \
                --cross-file /tmp/termux-glibc.ini \
                -Dinput_emulation=disabled \
                -Denable_openvr_support=false \
                -Drt_cap=disabled \
                -Denable_tests=false \
                --prefix=/data/data/com.termux/files/usr/glibc

              echo '🛠️ Gamescope 컴파일 시작...'
              meson compile -C build --verbose

              echo '📦 빌드 완료품 아티팩트 가공 중...'
              # 임시 설치 폴더를 따로 지정해서 결과물을 수집합니다.
              rm -rf /tmp/gamescope-stage
              DESTDIR=/tmp/gamescope-stage meson install -C build

              # 🌟 [에러 해결 핵심 핵심] 
              # 깊숙하게 처박힌 Termux용 폴더 구조 안에서 알맹이들(bin, lib, share 등)만 쏙 빼내어 
              # 공유 볼륨인 /workspace/gamescope-dist 직속 루트로 복사합니다.
              echo '🚚 복잡한 하위 경로에서 결과물 구출 중...'
              if [ -d \"/tmp/gamescope-stage/data/data/com.termux/files/usr/glibc\" ]; then
                cp -r /tmp/gamescope-stage/data/data/com.termux/files/usr/glibc/* /workspace/gamescope-dist/
                echo \"✔ 아티팩트 구출 성공!\"
              else
                echo \"❌ 에러: 빌드 설치 파일 경로가 올바르지 않습니다.\"
                exit 1
              fi
              
              # 권한 전면 해제
              chmod -R 777 /workspace/gamescope-dist
            "
            
      # 2. 결과물 압축 및 확인 안전장치 추가
      - name: Package Native arm64 Artifacts
        run: |
          cd ${{ github.workspace }}/gamescope-dist
          # 압축 전 파일 목록 로그 디버깅용 출력
          echo "=== 아티팩트 목록 확인 ==="
          ls -la
          
          # 파일이 정말 존재할 때만 정상 패키징
          if [ -n "$(ls -A .)" ]; then
            tar -cJf ${{ github.workspace }}/gamescope-native-arm64.tar.xz .
            echo "✔ Termux glibc용 완벽 패키징 완료!"
          else
            echo "❌ 에러: 여전히 압축 대상 폴더가 비어 있습니다."
            exit 1
          fi

      - name: Upload Gamescope Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-native-arm64
          path: ${{ github.workspace }}/gamescope-native-arm64.tar.xz
