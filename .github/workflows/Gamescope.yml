          uint64_t gbm_bo_get_modifier(struct gbm_bo *bo);
          int gbm_bo_get_plane_count(struct gbm_bo *bo);
          uint32_t gbm_bo_get_stride_for_plane(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_offset(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_stride(struct gbm_bo *bo);
          uint32_t gbm_bo_get_width(struct gbm_bo *bo);
          uint32_t gbm_bo_get_height(struct gbm_bo *bo);
          uint32_t gbm_bo_get_format(struct gbm_bo *bo);
          int gbm_device_is_format_supported(struct gbm_device *gbm, uint32_t format, uint32_t flags);

          struct gbm_surface *gbm_surface_create(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, uint32_t flags);
          void gbm_surface_destroy(struct gbm_surface *surface);
          struct gbm_bo *gbm_surface_lock_front_buffer(struct gbm_surface *surface);
          void gbm_surface_release_buffer(struct gbm_surface *surface, struct gbm_bo *bo);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libgbm.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_gbm.c
          #include <stdlib.h>
          #include <stdint.h>

          union gbm_bo_handle { void *ptr; int32_t s32; uint32_t u32; int64_t s64; uint64_t u64; };

          void *gbm_create_device(int fd) { return NULL; }
          void gbm_device_destroy(void *gbm) {}
          
          // ⭐️ 이번 에러를 해결하기 위해 추가된 가짜 깡통 함수
          const char *gbm_device_get_backend_name(void *gbm) { return "dummy_android"; }

          void *gbm_bo_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void *gbm_bo_create_with_modifiers(void *gbm, uint32_t w, uint32_t h, uint32_t f, const uint64_t *m, const unsigned int c) { return NULL; }
          void gbm_bo_destroy(void *bo) {}
          int gbm_bo_get_fd(void *bo) { return -1; }
          union gbm_bo_handle gbm_bo_get_handle(void *bo) { union gbm_bo_handle h = {0}; return h; }
          union gbm_bo_handle gbm_bo_get_handle_for_plane(void *bo, int p) { union gbm_bo_handle h = {0}; return h; }
          uint64_t gbm_bo_get_modifier(void *bo) { return 0; }
          int gbm_bo_get_plane_count(void *bo) { return 1; }
          uint32_t gbm_bo_get_stride_for_plane(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_offset(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_stride(void *bo) { return 0; }
          uint32_t gbm_bo_get_width(void *bo) { return 0; }
          uint32_t gbm_bo_get_height(void *bo) { return 0; }
          uint32_t gbm_bo_get_format(void *bo) { return 0; }
          int gbm_device_is_format_supported(void *gbm, uint32_t f, uint32_t fl) { return 0; }

          void *gbm_surface_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void gbm_surface_destroy(void *s) {}
          void *gbm_surface_lock_front_buffer(void *s) { return NULL; }
          void gbm_surface_release_buffer(void *s, void *bo) {}
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libgbm.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_gbm.c -o $TERMUX_PREFIX/lib/libgbm.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/gbm.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: gbm
          Description: Dummy gbm Stub for Termux Porting
          Version: 23.1.0
          Libs: -L\${libdir} -lgbm
          Cflags: -I\${includedir}
          EOF

      - name: Install wayland-protocols into Termux Sysroot
        run: |
          git clone --depth 1 --branch 1.36 https://gitlab.freedesktop.org/wayland/wayland-protocols.git
          
          cd wayland-protocols
          meson setup build --prefix=$TERMUX_PREFIX
          ninja -C build install
          
          echo "✅ wayland-protocols 진짜 명세서 주입 완료!"
          cd ..

      - name: Patch wayland-scanner.pc for wlroots Cross-Compilation
        run: |
          # 1. 우분투 호스트에 설치된 진짜 스캐너 경로를 알아냅니다. (예: /usr/bin/wayland-scanner)
          HOST_SCANNER=$(which wayland-scanner)
          echo "Real Host Scanner: $HOST_SCANNER"

          # 2. Termux의 pkgconfig 디렉토리가 없다면 생성합니다.
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          mkdir -p $TERMUX_PREFIX/share/pkgconfig

          # 3. wlroots가 가짜 변수($SCANNER_PATH) 대신 호스트 스캐너를 강제로 바라보도록 .pc 파일을 새로 작성합니다.
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          bindir=\${exec_prefix}/bin
          wayland_scanner=$HOST_SCANNER

          Name: Wayland Scanner
          Description: Wayland scanner stub redirecting to host for cross-compilation
          Version: 1.22.0
          EOF

          # 혹시 share/pkgconfig 폴더 쪽에 원본 찌꺼기가 남아있을 수 있으므로 양쪽 모두 덮어씌웁니다.
          cp $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc $TERMUX_PREFIX/share/pkgconfig/wayland-scanner.pc

      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          HOST_WAYLAND_SCANNER=$(which wayland-scanner)

          cat > /tmp/android-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          cpp = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          wayland-scanner = '$HOST_WAYLAND_SCANNER'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h']
          
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:/apex/com.android.i18n/lib64:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-ldrm', '-lwayland-client', '-lwayland-server']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:/apex/com.android.i18n/lib64:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-static-libstdc++', '-ldrm', '-lwayland-client', '-lwayland-server']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      # 💡 변경된 핵심 구간: 불필요한 최신 옵션을 모두 빼고 깔끔하게 정리했습니다.
      - name: Configure Gamescope
        run: |
          cd gamescope-src

          # 구버전 내부에 포함된 내장 라이브러리(subprojects) 소스를 안전하게 수집합니다.
          meson subprojects download || true

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_ROOT"

          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-shmem"
          
          export CFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export CXXFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem -static-libstdc++"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dpipewire=disabled \
            --prefix=/data/data/com.termux/files/usr

      - name: Build
        run: |
          cd gamescope-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd gamescope-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Gamescope Files ==="
          find gamescope-src/install -type f

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-android-legacy
          path: |
            gamescope-src/build.log
            gamescope-src/install
