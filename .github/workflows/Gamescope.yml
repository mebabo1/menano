name: Build Android Gamescope (Legacy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gamescope:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Gamescope
        run: |
          git clone --depth 1 \
            https://github.com/DadSchoorse/gamescope.git \
            gamescope-src
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            wget \
            unzip \
            pkg-config \
            ninja-build \
            cmake \
            bison \
            flex \
            python3-dev \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxshmfence-dev \
            libdrm-dev \
            zlib1g-dev \
            libzstd-dev \
            glslang-tools \
            libpixman-1-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxi-dev \
            libxmu-dev \
            libxrender-dev \
            libxres-dev \
            libxtst-dev \
            libvulkan-dev \
            libwayland-dev

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar

          cd $HOME/termuxfs/aarch64/data/data/com.termux/files
          wget -q https://github.com/mebabo1/menano/releases/download/Box/wayland_scanner.tar.gz
          tar xf wayland_scanner.tar.gz
          rm wayland_scanner.tar.gz
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Create Dummy XRes Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "=== 1. Gamescope가 참조할 가짜 XRes.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include/X11/extensions
          cat << 'EOF' > $TERMUX_PREFIX/include/X11/extensions/XRes.h
          #pragma once
          #include <X11/Xlib.h>
          #include <X11/Xfuncproto.h>
          
          // Gamescope 소스 내부에서 에러가 나지 않도록 최소한의 구조체 선언
          typedef struct { XID resource; unsigned long type; } XResClientIdSpec;
          typedef struct { XResClientIdSpec spec; long length; void *value; } XResClientIdValue;
          
          _XFUNCPROTOBEGIN
          Status XResQueryExtension(Display *dpy, int *event_basep, int *error_basep);
          Status XResQueryClientIds(Display *dpy, long num_specs, XResClientIdSpec *specs, long *num_ids, XResClientIdValue **ids);
          _XFUNCPROTOEND
          EOF

          echo "=== 2. 링커(Linker)를 속이기 위한 알맹이 없는 가짜 64비트 .so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_xres.c
          // 호출되어도 아무 일도 안 하고 0만 반환하는 가짜 함수들
          int XResQueryExtension(void* dpy, int* ev, int* err) { return 0; }
          int XResQueryClientIds(void* dpy, long num, void* specs, long* num_ids, void* ids) { return 0; }
          EOF

          # NDK 안드로이드 크로스 컴파일러를 사용해 가짜 aarch64용 libXres.so를 생성합니다.
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_xres.c -o $TERMUX_PREFIX/lib/libXres.so

          echo "=== 3. Meson 빌드 시스템을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/xres.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: XRes
          Description: Dummy X Resource Extension Library Stub for Termux Porting
          Version: 1.2.2
          Requires: x11
          Libs: -L\${libdir} -lXres
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libcap Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. Gamescope가 참조할 가짜 sys/capability.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include/sys
          cat << 'EOF' > $TERMUX_PREFIX/include/sys/capability.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // Gamescope 소스 컴파일에 필요한 최소한의 자료형 및 상수 정의
          typedef struct _cap_struct *cap_t;
          typedef int cap_value_t;
          typedef enum { CAP_EFFECTIVE=0, CAP_PERMITTED=1, CAP_INHERITABLE=2 } cap_flag_t;
          typedef enum { CAP_CLEAR=0, CAP_SET=1 } cap_flag_value_t;
          
          #define CAP_SYS_NICE 23

          // 데스크톱 libcap의 필수 함수 형태 선언
          cap_t cap_get_proc(void);
          int cap_set_proc(cap_t cap_p);
          cap_t cap_init(void);
          int cap_set_flag(cap_t cap_p, cap_flag_t flag, int ncap, const cap_value_t *caps, cap_flag_value_t value);
          int cap_free(void *obj_p);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커(Linker)를 속이기 위한 알맹이 없는 가짜 libcap.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_cap.c
          #include <stdlib.h>
          typedef struct _cap_struct *cap_t;
          
          // 호출되면 에러 없이 정상 작동한 것처럼 0이나 더미 포인터를 반환
          cap_t cap_get_proc(void) { return (cap_t)1; }
          int cap_set_proc(cap_t cap_p) { return 0; }
          cap_t cap_init(void) { return (cap_t)1; }
          int cap_set_flag(cap_t cap_p, int flag, int ncap, const int *caps, int value) { return 0; }
          int cap_free(void *obj_p) { return 0; }
          EOF

          # NDK 컴파일러로 가짜 안드로이드 aarch64용 libcap.so 생성
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_cap.c -o $TERMUX_PREFIX/lib/libcap.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libcap.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libcap
          Description: Dummy libcap Stub for Termux Porting
          Version: 2.66
          Libs: -L\${libdir} -lcap
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libudev Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 libudev.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/libudev.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // wlroots가 내부적으로 사용하는 핵심 udev 구조체 선언
          struct udev;
          struct udev_monitor;
          struct udev_device;
          struct udev_enumerate;
          struct udev_list_entry;

          // wlroots 빌드 패스를 위해 필요한 최소한의 함수 형태 정의
          struct udev *udev_new(void);
          struct udev *udev_unref(struct udev *udev);
          struct udev_monitor *udev_monitor_new_from_netlink(struct udev *udev, const char *name);
          int udev_monitor_filter_add_match_subsystem_devtype(struct udev_monitor *udev_monitor, const char *subsystem, const char *devtype);
          int udev_monitor_enable_receiving(struct udev_monitor *udev_monitor);
          int udev_monitor_get_fd(struct udev_monitor *udev_monitor);
          struct udev_device *udev_monitor_receive_device(struct udev_monitor *udev_monitor);
          struct udev_device *udev_device_unref(struct udev_device *udev_device);
          const char *udev_device_get_syspath(struct udev_device *udev_device);
          const char *udev_device_get_devnode(struct udev_device *udev_device);
          const char *udev_device_get_subsystem(struct udev_device *udev_device);
          const char *udev_device_get_property_value(struct udev_device *udev_device, const char *key);
          
          struct udev_enumerate *udev_enumerate_new(struct udev *udev);
          int udev_enumerate_add_match_subsystem(struct udev_enumerate *udev_enumerate, const char *subsystem);
          int udev_enumerate_scan_devices(struct udev_enumerate *udev_enumerate);
          struct udev_list_entry *udev_enumerate_get_list_entry(struct udev_enumerate *udev_enumerate);
          struct udev_enumerate *udev_enumerate_unref(struct udev_enumerate *udev_enumerate);
          struct udev_list_entry *udev_list_entry_get_next(struct udev_list_entry *list_entry);
          const char *udev_list_entry_get_name(struct udev_list_entry *list_entry);
          struct udev_device *udev_device_new_from_syspath(struct udev *udev, const char *syspath);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libudev.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_udev.c
          #include <stdlib.h>
          
          // 호출되면 크래시 없이 안전하게 NULL(0)이나 기본값만 반환하는 깡통 함수들
          void *udev_new(void) { return (void*)1; }
          void *udev_unref(void *udev) { return NULL; }
          void *udev_monitor_new_from_netlink(void *udev, const char *name) { return (void*)1; }
          int udev_monitor_filter_add_match_subsystem_devtype(void *m, const char *s, const char *d) { return 0; }
          int udev_monitor_enable_receiving(void *m) { return 0; }
          int udev_monitor_get_fd(void *m) { return -1; } // 유효하지 않은 파일 디스크립터 반환
          void *udev_monitor_receive_device(void *m) { return NULL; }
          void *udev_device_unref(void *d) { return NULL; }
          const char *udev_device_get_syspath(void *d) { return ""; }
          const char *udev_device_get_devnode(void *d) { return NULL; }
          const char *udev_device_get_subsystem(void *d) { return ""; }
          const char *udev_device_get_property_value(void *d, const char *k) { return NULL; }
          
          void *udev_enumerate_new(void *udev) { return (void*)1; }
          int udev_enumerate_add_match_subsystem(void *e, const char *s) { return 0; }
          int udev_enumerate_scan_devices(void *e) { return 0; }
          void *udev_enumerate_get_list_entry(void *e) { return NULL; }
          void *udev_enumerate_unref(void *e) { return NULL; }
          void *udev_list_entry_get_next(void *l) { return NULL; }
          const char *udev_list_entry_get_name(void *l) { return ""; }
          void *udev_device_new_from_syspath(void *u, const char *s) { return NULL; }
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libudev.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_udev.c -o $TERMUX_PREFIX/lib/libudev.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libudev.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libudev
          Description: Dummy libudev Stub for Termux Porting
          Version: 251
          Libs: -L\${libdir} -ludev
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libinput Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 libinput.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/libinput.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          // 빌드 통과를 위한 더미 구조체 선언
          struct libinput;
          struct libinput_event;
          struct libinput_device;
          struct libinput_interface;
          struct udev;

          // wlroots 내부 열거형 에러 방지용 기본값
          enum libinput_event_type {
              LIBINPUT_EVENT_NONE = 0
          };

          // wlroots가 요구하는 최소한의 핵심 함수 형태 선언
          struct libinput *libinput_udev_create_context(const struct libinput_interface *interface, void *user_data, struct udev *udev);
          struct libinput *libinput_path_create_context(const struct libinput_interface *interface, void *user_data);
          int libinput_udev_assign_seat(struct libinput *libinput, const char *seat_id);
          void libinput_dispatch(struct libinput *libinput);
          struct libinput_event *libinput_get_event(struct libinput *libinput);
          int libinput_event_get_type(struct libinput_event *event);
          void libinput_event_destroy(struct libinput_event *event);
          struct libinput *libinput_unref(struct libinput *libinput);
          struct libinput_device *libinput_event_get_device(struct libinput_event *event);
          void *libinput_get_user_data(struct libinput *libinput);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libinput.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_input.c
          #include <stdlib.h>
          
          // 호출되면 팅기지 않고 무조건 안전하게 NULL이나 0만 반환하는 깡통 함수들
          void *libinput_udev_create_context(const void *i, void *u, void *ud) { return NULL; }
          void *libinput_path_create_context(const void *i, void *u) { return NULL; }
          int libinput_udev_assign_seat(void *l, const char *s) { return -1; }
          void libinput_dispatch(void *l) {}
          void *libinput_get_event(void *l) { return NULL; }
          int libinput_event_get_type(void *e) { return 0; }
          void libinput_event_destroy(void *e) {}
          void *libinput_unref(void *l) { return NULL; }
          void *libinput_event_get_device(void *e) { return NULL; }
          void *libinput_get_user_data(void *l) { return NULL; }
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libinput.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_input.c -o $TERMUX_PREFIX/lib/libinput.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libinput.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libinput
          Description: Dummy libinput Stub for Termux Porting
          Version: 1.23.0
          Libs: -L\${libdir} -linput
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libseat Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 libseat.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/libseat.h
          #pragma once
          #ifdef __cplusplus
          extern "C" {
          #endif

          struct libseat;
          
          // wlroots가 내부적으로 콜백 처리를 위해 요구하는 가짜 vtable 구조체
          struct libseat_vtable {
              void (*enable_seat)(struct libseat *seat, void *user_data);
              void (*disable_seat)(struct libseat *seat, void *user_data);
          };

          // wlroots 빌드를 위해 필요한 최소한의 함수 형태 선언
          struct libseat *libseat_open_seat(struct libseat_vtable *vtable, void *user_data);
          int libseat_close_seat(struct libseat *seat);
          int libseat_dispatch(struct libseat *seat, int timeout);
          int libseat_get_fd(struct libseat *seat);
          int libseat_open_device(struct libseat *seat, const char *path, int *fd);
          int libseat_close_device(struct libseat *seat, int device_id);
          const char *libseat_seat_name(struct libseat *seat);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libseat.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_seat.c
          #include <stdlib.h>
          
          // 호출되면 에러 없이 무조건 안전한 기본값만 반환하는 깡통 함수들
          void *libseat_open_seat(void *vtable, void *user_data) { return (void*)1; }
          int libseat_close_seat(void *seat) { return 0; }
          int libseat_dispatch(void *seat, int timeout) { return 0; }
          int libseat_get_fd(void *seat) { return -1; } // 유효하지 않은 파일 디스크립터 반환
          int libseat_open_device(void *seat, const char *path, int *fd) { if(fd) *fd = -1; return -1; }
          int libseat_close_device(void *seat, int device_id) { return 0; }
          const char *libseat_seat_name(void *seat) { return "termux"; }
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libseat.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_seat.c -o $TERMUX_PREFIX/lib/libseat.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/libseat.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libseat
          Description: Dummy libseat Stub for Termux Porting
          Version: 0.8.0
          Libs: -L\${libdir} -lseat
          Cflags: -I\${includedir}
          EOF

      - name: Create Dummy libgbm Stub for Termux
        run: |
          TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          echo "=== 1. wlroots 컴파일용 가짜 gbm.h 헤더 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/include
          cat << 'EOF' > $TERMUX_PREFIX/include/gbm.h
          #pragma once
          #include <stdint.h>

          #ifdef __cplusplus
          extern "C" {
          #endif

          struct gbm_device;
          struct gbm_bo;
          struct gbm_surface;

          union gbm_bo_handle {
             void *ptr;
             int32_t s32;
             uint32_t u32;
             int64_t s64;
             uint64_t u64;
          };

          #define GBM_BO_USE_SCANOUT      (1 << 0)
          #define GBM_BO_USE_CURSOR       (1 << 1)
          #define GBM_BO_USE_RENDERING    (1 << 2)
          #define GBM_BO_USE_WRITE        (1 << 3)
          #define GBM_BO_USE_LINEAR       (1 << 4)

          struct gbm_device *gbm_create_device(int fd);
          void gbm_device_destroy(struct gbm_device *gbm);
          
          // ⭐️ 이번 에러를 해결하기 위해 추가된 명세
          const char *gbm_device_get_backend_name(struct gbm_device *gbm);

          struct gbm_bo *gbm_bo_create(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, uint32_t flags);
          struct gbm_bo *gbm_bo_create_with_modifiers(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, const uint64_t *modifiers, const unsigned int count);
          void gbm_bo_destroy(struct gbm_bo *bo);
          int gbm_bo_get_fd(struct gbm_bo *bo);
          union gbm_bo_handle gbm_bo_get_handle(struct gbm_bo *bo);
          union gbm_bo_handle gbm_bo_get_handle_for_plane(struct gbm_bo *bo, int plane);
          uint64_t gbm_bo_get_modifier(struct gbm_bo *bo);
          int gbm_bo_get_plane_count(struct gbm_bo *bo);
          uint32_t gbm_bo_get_stride_for_plane(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_offset(struct gbm_bo *bo, int plane);
          uint32_t gbm_bo_get_stride(struct gbm_bo *bo);
          uint32_t gbm_bo_get_width(struct gbm_bo *bo);
          uint32_t gbm_bo_get_height(struct gbm_bo *bo);
          uint32_t gbm_bo_get_format(struct gbm_bo *bo);
          int gbm_device_is_format_supported(struct gbm_device *gbm, uint32_t format, uint32_t flags);

          struct gbm_surface *gbm_surface_create(struct gbm_device *gbm, uint32_t width, uint32_t height, uint32_t format, uint32_t flags);
          void gbm_surface_destroy(struct gbm_surface *surface);
          struct gbm_bo *gbm_surface_lock_front_buffer(struct gbm_surface *surface);
          void gbm_surface_release_buffer(struct gbm_surface *surface, struct gbm_bo *bo);

          #ifdef __cplusplus
          }
          #endif
          EOF

          echo "=== 2. 링커를 속이기 위한 알맹이 없는 가짜 libgbm.so 빌드 ==="
          cat << 'EOF' > /tmp/dummy_gbm.c
          #include <stdlib.h>
          #include <stdint.h>

          union gbm_bo_handle { void *ptr; int32_t s32; uint32_t u32; int64_t s64; uint64_t u64; };

          void *gbm_create_device(int fd) { return NULL; }
          void gbm_device_destroy(void *gbm) {}
          
          // ⭐️ 이번 에러를 해결하기 위해 추가된 가짜 깡통 함수
          const char *gbm_device_get_backend_name(void *gbm) { return "dummy_android"; }

          void *gbm_bo_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void *gbm_bo_create_with_modifiers(void *gbm, uint32_t w, uint32_t h, uint32_t f, const uint64_t *m, const unsigned int c) { return NULL; }
          void gbm_bo_destroy(void *bo) {}
          int gbm_bo_get_fd(void *bo) { return -1; }
          union gbm_bo_handle gbm_bo_get_handle(void *bo) { union gbm_bo_handle h = {0}; return h; }
          union gbm_bo_handle gbm_bo_get_handle_for_plane(void *bo, int p) { union gbm_bo_handle h = {0}; return h; }
          uint64_t gbm_bo_get_modifier(void *bo) { return 0; }
          int gbm_bo_get_plane_count(void *bo) { return 1; }
          uint32_t gbm_bo_get_stride_for_plane(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_offset(void *bo, int p) { return 0; }
          uint32_t gbm_bo_get_stride(void *bo) { return 0; }
          uint32_t gbm_bo_get_width(void *bo) { return 0; }
          uint32_t gbm_bo_get_height(void *bo) { return 0; }
          uint32_t gbm_bo_get_format(void *bo) { return 0; }
          int gbm_device_is_format_supported(void *gbm, uint32_t f, uint32_t fl) { return 0; }

          void *gbm_surface_create(void *gbm, uint32_t w, uint32_t h, uint32_t f, uint32_t fl) { return NULL; }
          void gbm_surface_destroy(void *s) {}
          void *gbm_surface_lock_front_buffer(void *s) { return NULL; }
          void gbm_surface_release_buffer(void *s, void *bo) {}
          EOF

          # NDK 컴파일러를 이용해 안드로이드 aarch64 전용 가짜 libgbm.so 추출
          $TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang -shared -fPIC /tmp/dummy_gbm.c -o $TERMUX_PREFIX/lib/libgbm.so

          echo "=== 3. Meson을 속이기 위한 가짜 pkg-config (.pc) 파일 생성 ==="
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/gbm.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: gbm
          Description: Dummy gbm Stub for Termux Porting
          Version: 23.1.0
          Libs: -L\${libdir} -lgbm
          Cflags: -I\${includedir}
          EOF

      - name: Install wayland-protocols into Termux Sysroot
        run: |
          git clone --depth 1 --branch 1.36 https://gitlab.freedesktop.org/wayland/wayland-protocols.git
          
          cd wayland-protocols
          meson setup build --prefix=$TERMUX_PREFIX
          ninja -C build install
          
          echo "✅ wayland-protocols 진짜 명세서 주입 완료!"
          cd ..

      - name: Patch wayland-scanner.pc for wlroots Cross-Compilation
        run: |
          # 1. 우분투 호스트에 설치된 진짜 스캐너 경로를 알아냅니다. (예: /usr/bin/wayland-scanner)
          HOST_SCANNER=$(which wayland-scanner)
          echo "Real Host Scanner: $HOST_SCANNER"

          # 2. Termux의 pkgconfig 디렉토리가 없다면 생성합니다.
          mkdir -p $TERMUX_PREFIX/lib/pkgconfig
          mkdir -p $TERMUX_PREFIX/share/pkgconfig

          # 3. wlroots가 가짜 변수($SCANNER_PATH) 대신 호스트 스캐너를 강제로 바라보도록 .pc 파일을 새로 작성합니다.
          cat << EOF > $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc
          prefix=$TERMUX_PREFIX
          exec_prefix=\${prefix}
          bindir=\${exec_prefix}/bin
          wayland_scanner=$HOST_SCANNER

          Name: Wayland Scanner
          Description: Wayland scanner stub redirecting to host for cross-compilation
          Version: 1.22.0
          EOF

          # 혹시 share/pkgconfig 폴더 쪽에 원본 찌꺼기가 남아있을 수 있으므로 양쪽 모두 덮어씌웁니다.
          cp $TERMUX_PREFIX/lib/pkgconfig/wayland-scanner.pc $TERMUX_PREFIX/share/pkgconfig/wayland-scanner.pc

      - name: Force Disable libinput in wlroots Source
        run: |
          cat << 'EOF' > disable_libinput.py
          import os

          for root, dirs, files in os.walk('subprojects/wlroots'):
              for file in files:
                  if file == 'meson.build':
                      path = os.path.join(root, file)
                      with open(path, 'r') as f:
                          content = f.read()
                      
                      original = content
                      # 싱글/더블 쿼테이션 모두 대응
                      for target in ["dependency('libinput'", 'dependency("libinput"']:
                          start_idx = 0
                          while True:
                              idx = content.find(target, start_idx)
                              if idx == -1:
                                  break
                              
                              # dependency 호출의 시작 괄호 '(' 위치 확인
                              open_paren = content.find('(', idx)
                              if open_paren != -1:
                                  paren_count = 1
                                  current_idx = open_paren + 1
                                  # 중첩된 괄호가 완전히 닫힐 때까지 추적 (멀티라인/함수 중첩 완벽 대응)
                                  while paren_count > 0 and current_idx < len(content):
                                      if content[current_idx] == '(':
                                          paren_count += 1
                                      elif content[current_idx] == ')':
                                          paren_count -= 1
                                      current_idx += 1
                                  
                                  # 찾아낸 dependency(...) 구문 전체를 깡통 의존성으로 변경
                                  full_call = content[idx:current_idx]
                                  content = content.replace(full_call, "dependency('', required: false)")
                              
                              start_idx = idx + 1
                      
                      if content != original:
                          with open(path, 'w') as f:
                              f.write(content)
                          print(f"✅ 성공적으로 libinput 디텍션 차단됨: {path}")
          EOF
          python3 disable_libinput.py
                
      - name: Create Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          HOST_WAYLAND_SCANNER=$(which wayland-scanner)

          cat > /tmp/android-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          cpp = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'

          wayland-scanner = '$HOST_WAYLAND_SCANNER'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-fPIC', '-idirafter$TERMUX_PREFIX/include', '-idirafter$TERMUX_PREFIX/include/libdrm', '-idirafter$TERMUX_PREFIX/include/pixman-1', '-include', 'fcntl.h', '-include', 'unistd.h']
          
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:/apex/com.android.i18n/lib64:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-ldrm', '-lwayland-client', '-lwayland-server']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:/apex/com.android.i18n/lib64:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-static-libstdc++', '-ldrm', '-lwayland-client', '-lwayland-server']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      # 💡 변경된 핵심 구간: 불필요한 최신 옵션을 모두 빼고 깔끔하게 정리했습니다.
      - name: Configure Gamescope
        run: |
          cd gamescope-src

          # 구버전 내부에 포함된 내장 라이브러리(subprojects) 소스를 안전하게 수집합니다.
          meson subprojects download || true

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_ROOT"

          export X_CFLAGS="-I$TERMUX_PREFIX/include"
          export X_LIBS="-L$TERMUX_PREFIX/lib -landroid-shmem"
          
          export CFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export CXXFLAGS="-I$TERMUX_PREFIX/include -include fcntl.h -include unistd.h"
          export LDFLAGS="-L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem -static-libstdc++"

          meson setup build \
            --cross-file /tmp/android-cross.ini \
            -Dpipewire=disabled \
            --prefix=/data/data/com.termux/files/usr

      - name: Build
        run: |
          cd gamescope-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd gamescope-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Show Files
        run: |
          echo "=== Installed Gamescope Files ==="
          find gamescope-src/install -type f

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-android-legacy
          path: |
            gamescope-src/build.log
            gamescope-src/install
