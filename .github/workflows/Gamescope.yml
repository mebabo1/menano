name: Build Gamescope for Termux aarch64

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gamescope:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone Gamescope Source
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/ValveSoftware/gamescope.git gamescope-src
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Host Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config ninja-build cmake bison flex \
            glslang-tools wayland-protocols libwayland-dev libwayland-bin
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Inject Target Assets (Scanner, Protocols, XWayland)
        run: |
          # 1. XWayland 실물이 통합 패키징된 tar.gz 다운로드 및 해제
          wget -qL https://github.com/mebabo1/menano/releases/download/Box/wayland_scanner.tar.gz -O /tmp/wayland_scanner.tar.gz
          tar -xf /tmp/wayland_scanner.tar.gz -C $TERMUX_PREFIX/../
          
          # 2. 실행 파일들 권한 부여
          chmod +x $TERMUX_PREFIX/bin/wayland-scanner
          chmod +x $TERMUX_PREFIX/bin/Xwayland || chmod +x $TERMUX_PREFIX/bin/Xxwayland || true
          
          echo "=== Injected Files & Protocols Check ==="
          ls -la $TERMUX_PREFIX/bin/wayland-scanner
          ls -la $TERMUX_PREFIX/bin/Xwayland || echo "⚠️ Xwayland 바이너리가 usr/bin에 없습니다!"
          ls -la $TERMUX_PREFIX/share/pkgconfig/wayland-protocols.pc
          ls -la $TERMUX_PREFIX/lib/pkgconfig/xwayland.pc || ls -la $TERMUX_PREFIX/share/pkgconfig/xwayland.pc || echo "⚠️ xwayland.pc 파일이 없습니다!"

      - name: Inject Real ARM64 Linux Assets (Instead of Mocking)
        run: |
          set -e  # 👈 이제 하나라도 다운로드 실패하면 여기서 빌드가 멈추므로 원인 파악이 쉽습니다.
          mkdir -p /tmp/deps-extract
          cd /tmp/deps-extract

          echo "📦 Downloading Real ARM64 Linux Packages for Gamescope..."
          
          # 1. libudev-dev (데비안 공식 영구 아카이브 주소로 고정)
          wget -q https://snapshot.debian.org/archive/debian/20240325T210344Z/pool/main/s/systemd/libudev-dev_255.4-1_arm64.deb
          
          # 2. libinput-dev
          wget -q https://snapshot.debian.org/archive/debian/20240325T210344Z/pool/main/libi/libinput/libinput-dev_1.25.0-1_arm64.deb
          
          # 3. libxres-dev (대소문자 에러의 주범, 진짜 파일 확보)
          wget -q https://snapshot.debian.org/archive/debian/20240325T210344Z/pool/main/libx/libxres/libxres-dev_1.2.2-1_arm64.deb
          
          # 4. libluajit-5.1-dev (Gamescope 오버레이 스크립트용)
          wget -q https://snapshot.debian.org/archive/debian/20240325T210344Z/pool/main/l/luajit/libluajit-5.1-dev_2.1.0~beta3+dfsg-1_arm64.deb

          echo "📂 Extracting and Injecting into Sysroot ($TERMUX_PREFIX) ..."
          for deb in *.deb; do
            echo "Extracting: $deb"
            dpkg-deb -x "$deb" .
          done

          # 추출된 진짜 헤더 파일들 복사
          if [ -d "./usr/include" ]; then
            cp -r ./usr/include/* $TERMUX_PREFIX/include/
          fi
          
          # XRes 대소문자 매핑 우회 안전장치
          if [ -d "$TERMUX_PREFIX/include/X11/extensions" ]; then
            cp -v $TERMUX_PREFIX/include/X11/extensions/XRes.h $TERMUX_PREFIX/include/X11/extensions/Xres.h 2>/dev/null || true
          fi

          # LuaJIT 헤더 경로 매핑 (이제 진짜 폴더가 생성됩니다)
          if [ -d "./usr/include/luajit-2.1" ]; then
            mkdir -p $TERMUX_PREFIX/include/luajit-2.1
            cp -r ./usr/include/luajit-2.1/* $TERMUX_PREFIX/include/luajit-2.1/
          fi

          # 추출된 진짜 .so 라이브러리 파일들을 Termux lib 폴더에 강제 투입
          if [ -d "./usr/lib/aarch64-linux-gnu" ]; then
            cp -r ./usr/lib/aarch64-linux-gnu/* $TERMUX_PREFIX/lib/
          fi

          echo "=== 🚀 Real ARM64 Linux Assets Deployment Verified ==="
          ls -la $TERMUX_PREFIX/lib/libudev.so*
          ls -la $TERMUX_PREFIX/include/libinput.h
          ls -la $TERMUX_PREFIX/include/luajit-2.1/lua.h
          
      - name: Create Gamescope Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/gamescope-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          cpp = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'
          
          wayland-scanner = '/usr/bin/wayland-scanner'
          wayland-scanner_for_build = '/usr/bin/wayland-scanner'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-fPIC', '-isystem$TERMUX_PREFIX/include', '-idirafter$SYSROOT/usr/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-fPIC', '-isystem$TERMUX_PREFIX/include', '-idirafter$SYSROOT/usr/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-static-libstdc++']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      - name: Configure Gamescope
        run: |
          cd gamescope-src

          export TERMUX_SHARE_PC="$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_PATH="$TERMUX_SHARE_PC:$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_SYSROOT"

          # 🌟 [완벽 교정] 호스트 시스템과 크로스 환경 경로 세팅
          # 안드로이드용 arm64 웨일랜드 스캐너는 우분투에서 실행할 수 없으므로 잠시 이름을 바꿉니다.
          mv $TERMUX_PREFIX/bin/wayland-scanner $TERMUX_PREFIX/bin/wayland-scanner-android || true
          
          # 호스트 우분투 빌드 서버 전용 가상 디렉토리 생성 및 순정 x86_64 스캐너 배치
          sudo mkdir -p /data/data/com.termux/files/usr/bin
          sudo ln -sf /usr/bin/wayland-scanner /data/data/com.termux/files/usr/bin/wayland-scanner
          
          # Xwayland는 빌드 중 직접 실행하는 것이 아니라 위치만 체크하므로 기존 셋팅 유지
          sudo ln -sf $TERMUX_PREFIX/bin/Xwayland /data/data/com.termux/files/usr/bin/Xwayland || true

          meson setup build \
            --cross-file /tmp/gamescope-cross.ini \
            -Dinput_emulation=disabled \
            -Denable_openvr_support=false \
            -Dpipewire=disabled \
            -Drt_cap=disabled \
            -Dbenchmark=disabled \
            -Denable_tests=false \
            --prefix=/data/data/com.termux/files/usr

      - name: Build Gamescope
        run: |
          cd gamescope-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install Gamescope
        run: |
          cd gamescope-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Upload Gamescope Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-termux-aarch64
          path: |
            gamescope-src/build.log
            gamescope-src/install
