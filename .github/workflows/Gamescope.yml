name: Build Gamescope for Termux aarch64

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gamescope:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 🌟 Gamescope 내부의 의존성 서브모듈(예: stb, dxvk-headers 등)을 전부 긁어옵니다.

      - name: Clone Gamescope Source
        run: |
          # Valve의 순정 Gamescope 또는 Termux 지원 커스텀 브랜치를 받아옵니다.
          git clone --depth 1 --recursive https://github.com/ValveSoftware/gamescope.git gamescope-src
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Host Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config ninja-build cmake bison flex \
            glslang-tools wayland-protocols libwayland-dev libwayland-bin
          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      - name: Create Gamescope Android Cross File
        run: |
          NDK_ROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
          TOOLCHAIN=$NDK_ROOT/bin
          SYSROOT=$NDK_ROOT/sysroot

          cat > /tmp/gamescope-cross.ini << EOF
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'

          [binaries]
          c = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          cpp = ['$TOOLCHAIN/aarch64-linux-android${API_LEVEL}-clang++', '-D__TERMUX__', '-D__USE_GNU', '-U__ANDROID__', '--target=aarch64-linux-android30']
          ar = '$TOOLCHAIN/llvm-ar'
          strip = '$TOOLCHAIN/llvm-strip'
          pkgconfig = 'pkg-config'
          wayland-scanner = '/usr/bin/wayland-scanner'

          [properties]
          needs_exe_wrapper = true
          sysroot = '$SYSROOT'

          [built-in options]
          c_args = ['-fPIC', '-isystem$TERMUX_PREFIX/include', '-idirafter$SYSROOT/usr/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          cpp_args = ['-fPIC', '-isystem$TERMUX_PREFIX/include', '-idirafter$SYSROOT/usr/include', '-include', 'fcntl.h', '-include', 'unistd.h']
          c_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem']
          cpp_link_args = ['--target=aarch64-linux-android30', '-L$TERMUX_PREFIX/lib', '-Wl,-rpath=/system/lib64:/vendor/lib64:/vendor/lib64/egl:$RUNTIME_PATH/lib', '-Wl,--no-as-needed', '-lEGL', '-landroid-shmem', '-static-libstdc++']

          [env]
          PKG_CONFIG_PATH = '$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig'
          PKG_CONFIG_LIBDIR = '$TERMUX_PREFIX/lib/pkgconfig'
          PKG_CONFIG_SYSROOT_DIR = '$TERMUX_SYSROOT'
          EOF

      - name: Configure Gamescope
        run: |
          cd gamescope-src

          export PKG_CONFIG_PATH="$TERMUX_PREFIX/lib/pkgconfig:$TERMUX_PREFIX/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$TERMUX_PREFIX/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$TERMUX_SYSROOT"

          meson setup build \
            --cross-file /tmp/gamescope-cross.ini \
            -Dinput_emulation=disabled \
            -Denable_openvr_support=false \
            -Dpipewire=disabled \
            -Drt_cap=disabled \
            --prefix=/data/data/com.termux/files/usr

      - name: Build Gamescope
        run: |
          cd gamescope-src
          ninja -C build -v 2>&1 | tee build.log

      - name: Install Gamescope
        run: |
          cd gamescope-src
          DESTDIR=$PWD/install ninja -C build install

      - name: Upload Gamescope Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-termux-aarch64
          path: |
            gamescope-src/build.log
            gamescope-src/install
