name: Build libbcn_layer Cross-Compile (ARM64)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-cross:
    # 24.04(latest) 대신 패키지가 안정적인 22.04를 사용합니다.
    runs-on: ubuntu-22.04
    name: Cross-build libbcn_layer for ARM64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          # 22.04에서 glslc를 포함하는 패키지는 shaderc입니다.
          sudo apt-get install -y \
            build-essential \
            git \
            make \
            shaderc \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libvulkan-dev

      - name: Build libbcn_layer
        run: |
          git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git
          cd bcn_layer

          # [패치 1] 소스 헤더 누락 수정
          sed -i '1i #include <cmath>' src/bcn_layer.cpp
          sed -i '1i #include <cstring>' src/logger.cpp

          # [패치 2] Makefile 수정
          # 1. 크로스 컴파일 방해 요소 제거
          sed -i 's|-L/lib/x86_64-linux-gnu||g' Makefile
          
          # 2. glslc 경로를 시스템 절대 경로로 강제 고정
          # Makefile 내의 GLSLC ?= glslc 부분을 /usr/bin/glslc로 바꿉니다.
          sed -i 's|glslc|/usr/bin/glslc|g' Makefile

          # [패치 3] 빌드 실행
          # CC와 CXX를 ARM64용 크로스 컴파일러로 지정합니다.
          make -j"$(nproc)" \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++

          # [패치 4] 결과물 정리
          OUTPUT_DIR="../final_output"
          TERMUX_INSTALL_PATH="/data/data/com.termux/files/usr/glibc/lib"

          mkdir -p "$OUTPUT_DIR/lib"
          mkdir -p "$OUTPUT_DIR/manifest"
          mkdir -p "$OUTPUT_DIR/shaders"

          cp libbcn_layer.so "$OUTPUT_DIR/lib/"
          cp libbcn_layer.json "$OUTPUT_DIR/manifest/"
          
          # JSON 내의 library_path를 Termux 환경에 맞게 수정
          sed -i "s|\"./libbcn_layer.so\"|\"$TERMUX_INSTALL_PATH/libbcn_layer.so\"|g" "$OUTPUT_DIR/manifest/libbcn_layer.json"

          # 컴파일 완료된 쉐이더 복사
          if ls src/*.spv >/dev/null 2>&1; then
            cp src/*.spv "$OUTPUT_DIR/shaders/"
          fi

          echo "===== 빌드 결과 확인 ====="
          file "$OUTPUT_DIR/lib/libbcn_layer.so"
          ls -l "$OUTPUT_DIR/shaders/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbcn_layer-arm64-cross
          path: final_output/
