name: Build libbcn_layer ARM64

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build libbcn_layer on Ubuntu 22.04 (ARM64)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ARM64 libbcn_layer
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04

          dockerRunArgs: |
            --volume "${PWD}:/workspace"

          install: |
            apt-get update
            apt-get install -y \
              build-essential \
              git \
              make \
              gcc \
              g++ \
              cpp \
              glslang-tools \
              spirv-tools \
              spirv-headers \
              libvulkan-dev \
              vulkan-tools \
              xxd \
              file \
              binutils

          run: |
            set -eux

            echo "===== TOOLCHAIN CHECK ====="
            which glslangValidator || true
            glslangValidator --version || true
            cpp --version || true

            cd /workspace

            echo "===== CLONE REPOSITORY ====="
            rm -rf bcn_layer
            git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git
            cd bcn_layer

            echo "===== PATCH MAKEFILE ====="
            # 1. 라이브러리 경로 수정
            sed -i 's|/lib/x86_64-linux-gnu|/usr/lib/aarch64-linux-gnu|g' Makefile

            # 2. 기존 glslc 규칙 제거
            sed -i '/glslc \$< -o \$@/d' Makefile

            # 3. 새로운 Shader 컴파일 규칙 추가
            # 수정 포인트: cpp 명령에 '-x assembler-with-cpp' 옵션 추가
            printf "src/%%.spv : src/%%.comp\n\tcpp -x assembler-with-cpp -P \$< > \$<.tmp.comp\n\tglslangValidator -V -S comp \$<.tmp.comp -o \$@\n\trm -f \$<.tmp.comp\n" >> Makefile

            echo "===== VERIFY MAKEFILE ====="
            cat Makefile

            echo "===== BUILD ====="
            make -j"$(nproc)"

            echo "===== INSTALL & ORGANIZE ====="
            mkdir -p /workspace/output
            make install \
              PREFIX=/data/data/com.termux/files/usr/glibc \
              DESTDIR=/workspace/output

            mkdir -p /workspace/output/shaders
            mkdir -p /workspace/output/disasm

            # .spv 파일이 생성되었는지 확인 후 작업
            if ls src/*.spv >/dev/null 2>&1; then
              cp src/*.spv /workspace/output/shaders/
              for f in src/*.spv; do
                spirv-dis "$f" -o "/workspace/output/disasm/$(basename "$f").txt" || true
              done
            fi

            echo "===== BINARY ANALYSIS ====="
            if [ -f libbcn_layer.so ]; then
              file libbcn_layer.so
              readelf -h libbcn_layer.so
            else
              echo "Build Failed: libbcn_layer.so not found"
              exit 1
            fi

            echo "===== FINAL OUTPUT LIST ====="
            find /workspace/output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbcn_layer-arm64
          path: output/
