name: Build libbcn_layer ARM64

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build libbcn_layer on Ubuntu 22.04 (ARM64)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ARM64 libbcn_layer
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          dockerRunArgs: |
            --volume "${PWD}:/workspace"

          install: |
            apt-get update
            apt-get install -y build-essential git make gcc g++ cpp glslang-tools \
              spirv-tools spirv-headers libvulkan-dev vulkan-tools xxd file binutils

          run: |
            set -eux
            cd /workspace

            # 1. 클론 및 이동
            rm -rf bcn_layer
            git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git
            cd bcn_layer

            # 2. 소스 및 Makefile 패치 (기존과 동일)
            sed -i '1i #include <cmath>' src/bcn_layer.cpp
            sed -i '1i #include <cstring>' src/logger.cpp
            sed -i 's|/lib/x86_64-linux-gnu|/usr/lib/aarch64-linux-gnu|g' Makefile
            sed -i '/glslc \$< -o \$@/d' Makefile
            printf "src/%%.spv : src/%%.comp\n\tcpp -x assembler-with-cpp -P \$< > \$<.tmp.comp\n\tglslangValidator -V -S comp \$<.tmp.comp -o \$@\n\trm -f \$<.tmp.comp\n" >> Makefile

            # 3. 빌드
            make -j"$(nproc)"

            # 4. 설치 (중요: /workspace/final_output에 직접 쌓기)
            # 이렇게 해야 호스트의 ${PWD}/final_output 에서 바로 접근 가능합니다.
            mkdir -p /workspace/final_output
            make install \
              PREFIX=/data/data/com.termux/files/usr/glibc \
              DESTDIR=/workspace/final_output

            # 쉐이더 및 추가 파일 정리
            mkdir -p /workspace/final_output/shaders
            mkdir -p /workspace/final_output/disasm
            if ls src/*.spv >/dev/null 2>&1; then
              cp src/*.spv /workspace/final_output/shaders/
              for f in src/*.spv; do
                spirv-dis "$f" -o "/workspace/final_output/disasm/$(basename "$f").txt" || true
              done
            fi
            
            # .so 파일도 최상단에 복사 (확인용)
            cp libbcn_layer.so /workspace/final_output/

            echo "===== CHECK OUTPUT CONTENT ====="
            ls -R /workspace/final_output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbcn_layer-arm64
          # /workspace가 호스트의 현재 디렉토리이므로, 
          # 컨테이너 안에서 /workspace/final_output에 담은 것은 
          # 밖에서는 final_output/ 경로가 됩니다.
          path: final_output/
          if-no-files-found: error # 파일이 없으면 에러를 내도록 설정하여 확인 용이하게 변경
