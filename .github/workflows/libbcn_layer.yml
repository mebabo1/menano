name: Build libbcn_layer Cross-Compile (ARM64)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-cross:
    runs-on: ubuntu-latest
    name: Cross-build libbcn_layer for ARM64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          # glslc를 확보하기 위해 libshaderc-dev를 설치합니다.
          # glslang-tools는 glslangValidator를 제공합니다.
          sudo apt-get install -y \
            build-essential \
            git \
            make \
            libshaderc-dev \
            glslang-tools \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libvulkan-dev

      - name: Build libbcn_layer
        run: |
          git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git
          cd bcn_layer

          # [패치 1] 소스 헤더 누락 수정
          sed -i '1i #include <cmath>' src/bcn_layer.cpp
          sed -i '1i #include <cstring>' src/logger.cpp

          # [패치 2] Makefile 수정
          # 크로스 컴파일 방해 요 소 제거
          sed -i 's|-L/lib/x86_64-linux-gnu||g' Makefile
          
          # [패치 3] 쉐이더 컴파일 규칙 강제 교정
          # glslangValidator를 쓸 경우 #include를 위해 전처리기를 거치도록 수정하거나,
          # glslc가 있으면 glslc를 우선 사용하도록 합니다.
          # 여기서는 glslc가 없을 경우를 대비해 glslangValidator에 include 옵션을 넣습니다.
          if command -v glslc &> /dev/null; then
            GL_COMPILER="glslc"
          else
            GL_COMPILER="glslangValidator -V -S comp --std 450"
          fi

          # [패치 4] 빌드 실행
          # -Isrc 옵션을 추가하여 쉐이더 include 경로를 명시합니다.
          make -j"$(nproc)" \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            GLSLC="$GL_COMPILER" \
            CFLAGS="-Isrc" \
            CXXFLAGS="-Isrc"

          # [패치 5] 결과물 정리
          OUTPUT_DIR="../final_output"
          TERMUX_INSTALL_PATH="/data/data/com.termux/files/usr/glibc/lib"

          mkdir -p "$OUTPUT_DIR/lib"
          mkdir -p "$OUTPUT_DIR/manifest"
          mkdir -p "$OUTPUT_DIR/shaders"

          cp libbcn_layer.so "$OUTPUT_DIR/lib/"
          cp libbcn_layer.json "$OUTPUT_DIR/manifest/"
          
          # JSON 내의 경로 패치
          sed -i "s|\"./libbcn_layer.so\"|\"$TERMUX_INSTALL_PATH/libbcn_layer.so\"|g" "$OUTPUT_DIR/manifest/libbcn_layer.json"

          if ls src/*.spv >/dev/null 2>&1; then
            cp src/*.spv "$OUTPUT_DIR/shaders/"
          fi

          echo "===== 아키텍처 및 파일 확인 ====="
          file "$OUTPUT_DIR/lib/libbcn_layer.so"
          ls -l "$OUTPUT_DIR/shaders/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbcn_layer-arm64-cross
          path: final_output/
