name: Build libbcn_layer ARM64

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build libbcn_layer on Ubuntu 22.04 (ARM64)

    steps:
      - uses: actions/checkout@v4

      - name: Run ARM64 Build
        uses: uraimo/run-on-arch-action@v2

        with:
          arch: aarch64
          distro: ubuntu22.04

          dockerRunArgs: |
            --volume "${PWD}:/workspace"

          install: |
            apt-get update

            apt-get install -y \
              build-essential \
              git \
              wget \
              tar \
              make \
              gcc \
              g++ \
              spirv-tools \
              spirv-headers \
              libvulkan-dev \
              vulkan-tools \
              xxd \
              file \
              binutils

          run: |
            set -e

            echo "===== INSTALL GLSLC ====="

            cd /tmp

            wget -O shaderc.tgz \
              https://storage.googleapis.com/shaderc/artifacts/prod/graphics_shader_compiler/shaderc/linux/continuous_clang_release/linux/install.tgz

            tar xf shaderc.tgz

            cp bin/glslc /usr/local/bin/

            chmod +x /usr/local/bin/glslc

            echo "===== TOOLCHAIN ====="

            which glslc

            glslc --version || true

            cd /workspace

            echo "===== CLONE ====="

            git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git

            cd bcn_layer

            echo "===== PATCH MAKEFILE ====="

            # ARM64 전용 lib 경로 수정
            sed -i 's|/lib/x86_64-linux-gnu|/lib|g' Makefile

            echo "===== PATCHED MAKEFILE ====="

            cat Makefile

            echo "===== BUILD ====="

            make -j$(nproc)

            echo "===== PREPARE OUTPUT ====="

            mkdir -p /workspace/output

            echo "===== INSTALL ====="

            make install \
              PREFIX=/data/data/com.termux/files/usr/glibc \
              DESTDIR=/workspace/output

            echo "===== COPY SHADERS ====="

            mkdir -p /workspace/output/shaders

            cp src/*.spv /workspace/output/shaders/ || true

            echo "===== ELF INFO ====="

            file libbcn_layer.so

            readelf -h libbcn_layer.so || true

            echo "===== SYMBOLS ====="

            nm -D libbcn_layer.so | grep BCn || true

            echo "===== OUTPUT TREE ====="

            find /workspace/output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4

        with:
          name: libbcn_layer-arm64
          path: output/
