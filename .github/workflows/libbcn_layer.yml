name: Build libbcn_layer ARM64

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build libbcn_layer on Ubuntu 22.04 (ARM64)

    steps:
      - uses: actions/checkout@v4

      - name: Run ARM64 Build
        uses: uraimo/run-on-arch-action@v2

        with:
          arch: aarch64
          distro: ubuntu22.04

          dockerRunArgs: |
            --volume "${PWD}:/workspace"

          install: |
            apt-get update

            apt-get install -y \
              build-essential \
              git \
              make \
              gcc \
              g++ \
              glslang-tools \
              spirv-tools \
              spirv-headers \
              libvulkan-dev \
              vulkan-tools \
              xxd \
              file

          run: |
            set -e

            # glslc 없으면 glslangValidator로 대체
            if ! command -v glslc >/dev/null 2>&1; then
              ln -sf $(which glslangValidator) /usr/bin/glslc
            fi

            echo "===== TOOLCHAIN ====="
            which glslc
            glslc --version || true

            cd /workspace

            echo "===== CLONE ====="
            git clone --depth 1 https://github.com/Pipetto-crypto/bcn_layer.git

            cd bcn_layer

            echo "===== PATCH MAKEFILE ====="

            # x86_64 전용 경로 제거
            sed -i 's|/lib/x86_64-linux-gnu|/lib|g' Makefile

            cat Makefile

            echo "===== BUILD ====="

            make -j$(nproc)

            echo "===== PREPARE OUTPUT ====="

            mkdir -p /workspace/output

            echo "===== INSTALL ====="

            make install \
              PREFIX=/data/data/com.termux/files/usr/glibc \
              DESTDIR=/workspace/output

            echo "===== ELF INFO ====="

            file libbcn_layer.so

            readelf -h libbcn_layer.so || true

            echo "===== OUTPUT TREE ====="

            find /workspace/output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4

        with:
          name: libbcn_layer-arm64
          path: output/
