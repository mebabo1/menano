name: Build libbcn_layer ARM64

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build ARM64 libbcn_layer
        uses: uraimo/run-on-arch-action@v2

        with:
          arch: aarch64
          distro: ubuntu22.04

          dockerRunArgs: |
            --volume "${PWD}:/workspace"

          install: |
            apt-get update

            apt-get install -y \
              build-essential \
              git \
              make \
              gcc \
              g++ \
              cpp \
              glslang-tools \
              spirv-tools \
              spirv-headers \
              libvulkan-dev \
              vulkan-tools \
              xxd \
              file \
              binutils

          run: |
            set -eux

            cd /workspace

            echo "===== CLONE ====="

            git clone --depth 1 \
              https://github.com/Pipetto-crypto/bcn_layer.git

            cd bcn_layer

            echo "===== PATCH MAKEFILE ====="

            # ARM64 lib path 수정
            sed -i \
              's|/lib/x86_64-linux-gnu|/lib|g' \
              Makefile

            # glslc -> cpp + glslangValidator
            sed -i \
              '/glslc \$< -o \$@/c\
            	cpp -P $< > $<.tmp && \
            	glslangValidator -V -S comp $<.tmp -o $@ && \
            	rm -f $<.tmp' \
              Makefile

            echo "===== BUILD ====="

            make -j"$(nproc)"

            echo "===== INSTALL ====="

            mkdir -p /workspace/output

            make install \
              PREFIX=/data/data/com.termux/files/usr/glibc \
              DESTDIR=/workspace/output

            echo "===== COPY EXTRA FILES ====="

            mkdir -p /workspace/output/shaders
            mkdir -p /workspace/output/disasm

            cp src/*.spv \
              /workspace/output/shaders/ || true

            for f in src/*.spv; do
              spirv-dis "$f" \
                -o "/workspace/output/disasm/$(basename "$f").txt" || true
            done

            echo "===== ELF INFO ====="

            file libbcn_layer.so

            readelf -h libbcn_layer.so || true

            echo "===== SYMBOLS ====="

            nm -D libbcn_layer.so | grep BCn || true

            echo "===== OUTPUT ====="

            find /workspace/output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4

        with:
          name: libbcn_layer-arm64
          path: output/
