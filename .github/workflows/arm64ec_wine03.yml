name: Build Wine ARM64 WOW64 02

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'proton'
        type: choice
        options:
        - proton
        - staging
        - protonec
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file

      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64）
      # ------------------------------------------------------------
      - name: APT
        run: |
          echo "🧹 Freeing disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Dockerfile (Optimized for Sysroot)
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential git make cmake ninja-build autoconf automake \
            libtool pkg-config gettext flex bison nasm \
            python3 python3-setuptools ca-certificates wget \
            curl xz-utils file libfreetype6-dev \
            clang llvm lld unzip \
            binutils-aarch64-linux-gnu \
            mingw-w64 gradle \
            librsvg2-bin \
            dpkg-dev \
            fakeroot \
            less

      - name: Download and extract termuxfs for ${{ matrix.arch }}
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-aarch64.tar
          tar -xf termuxfs-aarch64.tar
          ls -la $HOME/termuxfs/aarch64/

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/27.3.13750724
          key: android-ndk-r27d
      
      - name: Set up Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/Android/Sdk/ndk
          cd $HOME/Android/Sdk/ndk
          wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          mv android-ndk-r27d 27.3.13750724

      - name: llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: locales
        run: |
          apt-get install -y locales
          sed -i '/ko_KR.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=ko_KR.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=ko_KR.UTF-8" >> $GITHUB_ENV
          echo "LANGUAGE=ko_KR:ko" >> $GITHUB_ENV
 
      - name: Wine
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            protonec)
              echo "Processing protonarm64ec branch"

              git clone -b "experimental_10.0" https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            staging)
              echo " Staging "
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            proton)
              echo "Processing Proton branch"

              git clone -b "proton-9.0-arm64ec" https://github.com/StevenMXZ/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
          esac

          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      - name: configure
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: native wine64 NLS
        run: |
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          ../source/configure \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-vulkan \
            --without-wayland
          make __tooldeps__ -j$(nproc) > /dev/null
          echo "构建 NLS 目录..."
          make -C nls
          # 备份整个 nls 目录（跟随符号链接）
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          ls -la /opt/nls-backup/

      - name: 复制构建目录并验证 NLS（带恢复机制）
        run: |
          set -e
          mkdir -p /opt/wine64-native
          # 检查源文件，若不存在则从备份恢复（备份包含所有 nls 文件）
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          # 复制整个构建目录，使用 -aL 选项（归档且跟随符号链接）
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          # 验证复制后的文件是否为普通文件（不是符号链接）
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失或为无效符号链接，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      - name: vkd3d
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          wget https://github.com/mebabo1/menano/releases/download/Box/vkd3d.tar.gz
          rm -rf libs/vkd3d
          tar xf vkd3d.tar.gz
          rm -rf vkd3d.tar.gz
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: Termux
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          wget https://github.com/mebabo1/menano/releases/download/Box/vkd3d.tar.gz
          rm -rf libs/vkd3d
          tar xf vkd3d.tar.gz
          rm -rf vkd3d.tar.gz
          
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true

          FILE3="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE3" ]; then
            if grep -q '@ stub' "$FILE3"; then
              echo "Cleaning wdscore.spec stubs..."
              sed -i '/CDynamicArray/d' "$FILE3"
              echo "✔ wdscore stubs cleaned"
            else
              echo "✔ wdscore already cleaned or not found"
            fi
          fi

          FILE_VIRTUAL="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE_VIRTUAL" ]; then
            sed -i 's/uffd_fd = syscall( __NR_userfaultfd/uffd_fd = -1; \/\/ bypassed/g' "$FILE_VIRTUAL"
            sed -i '/static void kernel_writewatch_init(void)/{n;s/^{/{\n    return;/}' "$FILE_VIRTUAL"
            echo "✔ virtual.c: SHM redirection & safe bypass applied."
          fi

          FILE="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE" ]; then
            if grep -q 'unsigned int vprot, sec_flags;' "$FILE"; then
              echo "Fixing uninitialized vprot in virtual.c..."
              sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"
            fi
            if grep -q '0x7fffffff0000' "$FILE"; then
              echo "Patching address_space_limit in virtual.c..."
              sed -i 's/_limit.*0x7fffffff0000/_limit = (void *)0x7fffff0000/g' "$FILE"
            fi
            if grep -q 'use_kernel_writewatch = 1;' "$FILE"; then
              echo "Disabling kernel writewatch for Android compatibility..."
              sed -i 's/use_kernel_writewatch = 1;/use_kernel_writewatch = 0;/g' "$FILE"
            fi
          fi

          FILE_LOADER="dlls/ntdll/unix/loader.c"
          if [ -f "$FILE_LOADER" ]; then
            echo "Removing M_PERTURB calls from $FILE_LOADER..."
            # mallopt( M_PERTURB, ... ) 로 시작하는 모든 줄을 주석 처리 (// 추가)
            sed -i 's/^[[:space:]]*mallopt( M_PERTURB,/\/\/ mallopt( M_PERTURB,/g' "$FILE_LOADER"
          fi

          FILE_PULSE_MK="dlls/winepulse.drv/Makefile.in"
          if [ -f "$FILE_PULSE_MK" ]; then
            echo "Adding -lpulse to $FILE_PULSE_MK..."
            sed -i 's/UNIX_LIBS    = $(PULSE_LIBS) $(PTHREAD_LIBS) -lm/UNIX_LIBS    = $(PULSE_LIBS) $(PTHREAD_LIBS) -lm -lpulse/' "$FILE_PULSE_MK"
          fi

          INF="loader/wine.inf.in"
          if [ -f "$INF" ] && ! grep -q 'libarm64ecfex.dll' "$INF"; then
              echo "Patching wine.inf for FEX libraries..."
              sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"
              sed -i 's/xtajit\.dll/libwow64fex.dll/g' "$INF"    
              echo "✔ wine.inf integrated patch applied."
          fi

          FILE_LOADER="dlls/ntdll/loader.c"
          if [ -f "$FILE_LOADER" ]; then
            echo "Applying combined patches to loader.c..."
            if grep -q 'ULONG buffer\[16\];' "$FILE_LOADER"; then
              echo "  - Increasing loader buffer size to 32"
              sed -i 's/ULONG buffer\[16\];/ULONG buffer\[32\];/g' "$FILE_LOADER"
            fi
            if grep -q 'base = (char \*)nt->OptionalHeader.ImageBase;' "$FILE_LOADER"; then
              echo "  - Patching ImageBase logic for WOW64 (with UINT_PTR cast)"
              sed -i 's/base = (char \*)nt->OptionalHeader.ImageBase;/if (nt->OptionalHeader.Magic == IMAGE_NT_OPTIONAL_HDR64_MAGIC) base = (char *)((const IMAGE_NT_HEADERS64 *)nt)->OptionalHeader.ImageBase; else base = (char *)(UINT_PTR)((const IMAGE_NT_HEADERS32 *)nt)->OptionalHeader.ImageBase;/g' "$FILE_LOADER"
            fi                      
            echo "✔ All loader.c patches applied."
          fi

          find . -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/xtajit\.dll/libwow64fex.dll/g' {} +
          find dlls/ntdll -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|x86_64-windows|aarch64-windows|g' {} +


      - name: ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64

          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export deps="$HOME/termuxfs/aarch64/data/data/com.termux/files/usr"
          export RUNTIME_PATH="/data/data/com.termux/files/usr"
          export TOOLCHAIN="$HOME/Android/Sdk/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export TARGET=aarch64-linux-android28
          export CC=$TOOLCHAIN/$TARGET-clang
          # export AS=$CC
          export CXX=$TOOLCHAIN/$TARGET-clang++      
          
          export PKG_CONFIG_LIBDIR=$deps/lib/pkgconfig:$deps/share/pkgconfig
          export ACLOCAL_PATH=$deps/lib/aclocal:$deps/share/aclocal
          export CPPFLAGS="-I$deps/include --sysroot=$TOOLCHAIN/../sysroot"
          
          export LDFLAGS="-L$deps/lib -Wl,-rpath=$RUNTIME_PATH/lib"

          export CFLAGS="-O2 -pipe -mtune=generic -Wno-declaration-after-statement -Wno-implicit-function-declaration -Wno-int-conversion"
          export CXXFLAGS="-O2 -pipe"
          export CROSSCFLAGS="-O2 -pipe"
          export CROSSCXXFLAGS="-O2 -pipe"
          
          export FREETYPE_CFLAGS="-I$deps/include/freetype2"
          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          export SDL2_CFLAGS="-I$deps/include/SDL2"
          export SDL2_LIBS="-L$deps/lib -lSDL2"
          export X_CFLAGS="-I$deps/include"
          export X_LIBS="-L$deps/lib -landroid-shmem"
          export GSTREAMER_CFLAGS="-I$deps/include/gstreamer-1.0 -I$deps/include/glib-2.0 -I$deps/lib/glib-2.0/include -I$deps/glib-2.0/include -I$deps/lib/gstreamer-1.0/include"
          export GSTREAMER_LIBS="-L$deps/lib -lgstgl-1.0 -lgstapp-1.0 -lgstvideo-1.0 -lgstaudio-1.0 -lglib-2.0 -lgobject-2.0 -lgio-2.0 -lgsttag-1.0 -lgstbase-1.0 -lgstreamer-1.0"
          export FFMPEG_CFLAGS="-I$deps/include/libavutil -I$deps/include/libavcodec -I$deps/include/libavformat"
          export FFMPEG_LIBS="-L$deps/lib -lavutil -lavcodec -lavformat"

          export WINE_NLS_DIR=/opt/wine64-native/nls

          echo "使用 Wine64 构建目录（作为工具目录）: /opt/wine64-native"
          echo "WINE_NLS_DIR=$WINE_NLS_DIR"

          ../configure \
            --host=$TARGET \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --with-wine-tools=/opt/wine64-native \
            --enable-wineandroid_drv=no \
            --enable-win64 \
            --disable-win16 \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            --enable-nls \
            --with-pulse \
            --without-ffmpeg \
            --disable-winemenubuilder \
            --disable-amd_ags_x64 \
            --without-osmesa \
            --disable-opencl \
            --without-unwind \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-alsa \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --with-xshm \
            --without-xxf86vm
            
          make -j$(nproc) > build.log 2>&1 || (tail -n 100 build.log && exit 1)
          mkdir -p /tmp/wine-install-wow64
          make install

          echo "설치된 파일 목록 확인:"
          find /tmp/wine-install-wow64 -maxdepth 2

      - name: Shared Library Path Fix
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE64_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          
          # Termux는 무조건 aarch64 환경임
          WINE_ARCH="aarch64"

          echo "=== 1. 구조 생성 및 모든 라이브러리 수집 ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          mkdir -p "$TARGET_PREFIX/share/wine/fonts"

          # [중요] 삭제 전 모든 .so를 먼저 수집 (원본 확보)
          find "$BUILD_DIR" -name "ntdll.so" -exec cp -vL {} "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/dlls" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/programs" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/" \;

          # 수집 완료 후 불필요한 폴더 제거 (이미 복사본이 있으므로 안전)
          if [ -d "$BUILD_DIR/dlls/ntdll/aarch64-windows" ]; then
              echo "✔ aarch64-windows 감지됨. x86_64-unix 찌꺼기 정리."
              rm -rf "$TARGET_PREFIX/lib/wine/x86_64-unix"
          fi

          echo "=== 2. 리소스 복사 (NLS, Fonts) ==="
          [ -d "$NATIVE_NLS_DIR" ] && cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          [ -d "$SOURCE_DIR/fonts" ] && cp -v "$SOURCE_DIR/fonts"/*.ttf "$SOURCE_DIR/fonts"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || true

          echo "=== 3. 로더 및 실행 파일 복사 ==="
          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              found=$(find "$BUILD_DIR" -type f -name "$prog" -executable | head -1)
              [ -n "$found" ] && cp -vL "$found" "$TARGET_PREFIX/arm64-v8a/bin/" || echo "⚠ $prog 찾지 못함"
          done

          echo "=== 4. 심볼릭 링크 재생성 (절대 경로 에러 방어) ==="
          # ntdll.so 링크가 실제로 존재하는지 확인 후 생성
          if [ -f "$TARGET_PREFIX/arm64-v8a/lib/wine/$WINE_ARCH-unix/ntdll.so" ]; then
              cd "$TARGET_PREFIX/arm64-v8a/bin"
              # 상대 경로가 확실히 맞도록 해당 디렉토리로 이동 후 링크 생성
              ln -sf "../lib/wine/$WINE_ARCH-unix/ntdll.so" "ntdll.so"
              echo "✔ ntdll.so 심볼릭 링크 생성 완료"
          else
              echo "❌ 치명적 오류: ntdll.so 원본 파일이 없습니다!"
              exit 1
          fi
          if [ -f "wine" ]; then
              cp -r wine wine64
          fi
          echo "=== 최종 검증 ==="
          ls -l "$TARGET_PREFIX/arm64-v8a/bin/ntdll.so"
          # 링크가 가리키는 실제 파일의 존재 여부를 한 번 더 확인
          ls -L "$TARGET_PREFIX/arm64-v8a/bin/ntdll.so" || { echo "❌ 링크가 깨졌습니다!"; exit 1; }

      # ------------------------------------------------------------
      # 13. 验证安装目录内容（可选，便于调试）
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录 /tmp/wine-install-wow64 的内容："
          ls -la /tmp/wine-install-wow64/
          if [ -d /tmp/wine-install-wow64/bin ]; then
            echo "bin 目录内容："
            ls -la /tmp/wine-install-wow64/bin/
          fi
          if [ -d /tmp/wine-install-wow64/share ]; then
            echo "share 目录内容："
            ls -la /tmp/wine-install-wow64/share/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          mkdir -p wine-package/wine 
          cp -r /tmp/wine-install-wow64/* wine-package/wine/

      - name: 创建打包文件
        run: |
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C wine-package wine
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: Publish Wine to GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            - **Wine Branch**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine Version**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **Host Architecture**: ARM64
            - **Target Windows Architectures**: i386, aarch64, arm64ec (via WOW64 emulation)

            - Build Time: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
