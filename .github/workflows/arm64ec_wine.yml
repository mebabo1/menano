name: Build Wine AMD64 WOW64

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'proton'
        type: choice
        options:
        - proton
        - staging
        - protonec
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update

      - name: apt-amd64
        run: |
          apt-get install -y python3 python3-minimal \
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            gettext curl \
            libvulkan-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgettextpo-dev

      - name: llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: locales
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Wine 源码（分支处理与原工作流一致）
      # ------------------------------------------------------------
      - name: Wine
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            protonec)
              echo "Processing protonarm64ec branch"

              git clone -b "proton_11.0" https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            staging)
              echo " Staging "
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            proton)
              echo "Processing Proton branch"

              PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
              PROTON_COMMIT="${{ github.event.inputs.proton_commit || '' }}"

              git clone -b "$PROTON_BRANCH" https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
          esac

          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      - name: configure
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: native wine64 NLS
        run: |
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          ../source/configure \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-gstreamer \
            --without-wayland
          make __tooldeps__ -j$(nproc) > /dev/null
          echo "构建 NLS 目录..."
          make -C nls
          # 备份整个 nls 目录（跟随符号链接）
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          ls -la /opt/nls-backup/

      - name: 复制构建目录并验证 NLS（带恢复机制）
        run: |
          set -e
          mkdir -p /opt/wine64-native
          # 检查源文件，若不存在则从备份恢复（备份包含所有 nls 文件）
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          # 复制整个构建目录，使用 -aL 选项（归档且跟随符号链接）
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          # 验证复制后的文件是否为普通文件（不是符号链接）
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失或为无效符号链接，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      - name: Create SHM Header
        run: |
          mkdir -p ${{ env.WINE_SOURCE_DIR }}/source/include
          cat <<'EOF' > ${{ env.WINE_SOURCE_DIR }}/source/include/shm_utils.h
          #ifndef __WINE_SHM_UTILS_H
          #define __WINE_SHM_UTILS_H

          #ifndef _GNU_SOURCE
          #define _GNU_SOURCE
          #endif

          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/stat.h>
          #include <sys/types.h>
          #include <errno.h>
          #include <time.h>
          #include <string.h>
          #include <stdarg.h>
          #include <sched.h>
          #include <sys/syscall.h>

          static inline int custom_shm_open(const char *name, int oflag, mode_t mode) {
              char *full_path = NULL;
              const char *tmpdir = getenv("TMPDIR");
              if (!tmpdir) tmpdir = "/data/data/com.termux/files/usr/tmp";

              const char *clean_name = (name[0] == '/') ? name + 1 : name;
              if (asprintf(&full_path, "%s/%s", tmpdir, clean_name) == -1) return -1;

              char *dname = strdup(full_path);
              if (dname) {
                  char *slash = strrchr(dname, '/');
                  if (slash) {
                      *slash = '\0';
                      struct stat st;
                      if (stat(dname, &st) == -1) mkdir(dname, 0700);
                  }
                  free(dname);
              }

              int fd = open(full_path, oflag, mode ? mode : 0600);
              free(full_path);
              return fd;
          }

          static inline int custom_shm_unlink(const char *name) {
              char *full_path = NULL;
              const char *tmpdir = getenv("TMPDIR");
              if (!tmpdir) tmpdir = "/data/data/com.termux/files/usr/tmp";
              const char *clean_name = (name[0] == '/') ? name + 1 : name;
              if (asprintf(&full_path, "%s/%s", tmpdir, clean_name) != -1) {
                  unlink(full_path);
                  free(full_path);
              }
              return 0;
          }

          /* [2] 파일 크기 동기화 가속: ftruncate 직후 배리어 추가 */
          static inline int custom_ftruncate(int fd, off_t length) {
              int ret = ftruncate(fd, length);
              __sync_synchronize(); // 파일 크기 할당 정보를 즉시 가시화
              return ret;
          }

          /* [3] 시스템 콜 가로채기: 449번 지연 및 Futex Wake 배리어 */
          static inline long custom_syscall(long number, ...) {
              va_list args;
              unsigned long long a[6] = {0,}; 

              va_start(args, number);
              for (int i = 0; i < 6; i++) {
                  a[i] = va_arg(args, unsigned long long);
              }
              va_end(args);

              // 신호를 보내는 Futex 작업(Wake)일 경우 메모리 쓰기 완료 보장
              if (number == __NR_futex) {
                  long op = a[1] & 127; // FUTEX_OP_MASK
                  if (op == 1) { // FUTEX_WAKE
                      __sync_synchronize();
                  }
              }

              if (number == 449) { // futex_waitv
                  if (a[0] == 0) return 0;
                  __sync_synchronize();
                  sched_yield();
                  struct timespec ts = {0, 350000}; // 지연 시간을 0.15ms로 최적화
                  nanosleep(&ts, NULL);
                  __sync_synchronize();
                  return 0; 
              }

              __sync_synchronize();
              sched_yield(); 
              // 일반 콜은 너무 길면 안 되므로 449번보다 훨씬 짧은 지연(약 0.05ms)을 줍니다.
              struct timespec general_ts = {0, 350000}; 
              nanosleep(&general_ts, NULL);
              long ret = syscall(number, a[0], a[1], a[2], a[3], a[4], a[5]);
              __sync_synchronize(); // 콜 직후에도 메모리 일관성 보장
              return ret;
          }

          /* [4] 매크로 리디렉션 */
          #undef shm_open
          #define shm_open(...) GET_SHM_OPEN_MACRO(__VA_ARGS__, shm_open_3, shm_open_2)(__VA_ARGS__)
          #define GET_SHM_OPEN_MACRO(_1, _2, _3, NAME, ...) NAME
          #define shm_open_3(name, flags, mode) custom_shm_open(name, flags, mode)
          #define shm_open_2(name, flags)       custom_shm_open(name, flags, 0)

          #undef shm_unlink
          #define shm_unlink custom_shm_unlink

          #undef ftruncate
          #define ftruncate custom_ftruncate

          #undef syscall
          #define syscall custom_syscall

          #endif
          EOF

      - name: Termux
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true

          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            if grep -q 'InterlockedOr(&dummy, 0)' "$FILE"; then
              sed -i 's/LONG dummy/long dummy/g' "$FILE"
              sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
              echo "✔ InterlockedOr patched with explicit casting"
            else
              echo "✔ InterlockedOr already patched or not found"
            fi
          fi

          FILE_LOADER="dlls/ntdll/unix/loader.c"
          if [ -f "$FILE_LOADER" ]; then
            echo "Removing M_PERTURB calls from $FILE_LOADER..."
            # mallopt( M_PERTURB, ... ) 로 시작하는 모든 줄을 주석 처리 (// 추가)
            sed -i 's/^[[:space:]]*mallopt( M_PERTURB,/\/\/ mallopt( M_PERTURB,/g' "$FILE_LOADER"
          fi

          # [1] server/fsync.c 패치 (서버측 생성부 - 강화 버전)
          if [ -f "server/fsync.c" ]; then
            sed -i 's/\bshm_open\s*(/custom_shm_open(/g' server/fsync.c
            sed -i 's/\bshm_unlink\s*(/custom_shm_unlink(/g' server/fsync.c
            # sed -i 's/shm_size\s*=\s*FSYNC_SHM_PAGE_SIZE/shm_size = 4*1024*1024/g' server/fsync.c
            sed -i 's/!defined(__ANDROID__)//g' server/fsync.c
            echo "✔ server/fsync.c: Ironclad patch applied."
          fi

          # [2] dlls/ntdll/unix/fsync.c 패치 (클라이언트측 연결부)
          if [ -f "dlls/ntdll/unix/fsync.c" ]; then
            echo "Aggressive patching for ntdll fsync.c..."
            if grep -q "#include \"config.h\"" dlls/ntdll/unix/fsync.c; then
              sed -i "/#include \"config.h\"/a #undef __NR_futex_waitv\n#define __NR_futex_waitv 449" dlls/ntdll/unix/fsync.c
            fi
            # 3. 비정상 종료 차단
            sed -i 's/exit\s*(1\s*)/\/* exit(1) disabled *\//g' dlls/ntdll/unix/fsync.c
            # 4. mmap 호환성 패치 (안드로이드에서 MAP_ANONYMOUS와 파일 매핑 혼용 금지 대응)
            sed -i 's/MAP_SHARED\s*|\s*MAP_ANONYMOUS/MAP_SHARED/g' dlls/ntdll/unix/fsync.c
            sed -i 's/MAP_SHARED|MAP_ANONYMOUS/MAP_SHARED/g' dlls/ntdll/unix/fsync.c       
            echo "✔ ntdll fsync.c: Aggressive open-redirection applied."
          fi

          TOTAL_TARGETS=" 
            dlls/ntdll/unix/fsync.c 
            server/fsync.c 
          "

          for FILE in $TOTAL_TARGETS; do
            if [ -f "$FILE" ]; then
              echo "Fixing SHM Hook for $FILE..."
              sed -i '/shm_utils.h/d' "$FILE"
              if grep -q "#include \"config.h\"" "$FILE"; then
                sed -i "/#include \"config.h\"/a #include <shm_utils.h>" "$FILE"
              else
                sed -i "1i #include <shm_utils.h>" "$FILE"
              fi            
              sed -i 's/\bsyscall\s*(/custom_syscall(/g' "$FILE"
            fi
          done

      - name: configure
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64
                    
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"

          export deps="/data/data/com.termux/files/usr"
          export depsg="/data/data/com.termux/files/usr/glibc"

          export CFLAGS="-march=x86-64-v3 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64-v3 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64-v3 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64-v3 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"

          export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -L/lib/x86_64-linux-gnu"

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-wow64 \
            --with-vulkan \
            --enable-nls \
            --with-pulse \
            --disable-win16 \
            --with-gstreamer \
            --without-ffmpeg \
            --disable-opencl \
            --disable-tests \
            --disable-winemenubuilder \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-alsa \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --with-xshm \
            --without-xxf86vm
            
          make -j$(nproc) > /dev/null
          make install

          # 验证安装是否生成 bin 目录（若缺失则报错）
          if [ ! -d /tmp/wine-install-wow64/bin ]; then
            echo "错误: /tmp/wine-install-wow64/bin 目录不存在，安装可能不完整"
            exit 1
          fi

      - name: Shared Library Path Fix
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
              WINE_ARCH="x86_64"
          else
              WINE_ARCH="aarch64"
          fi
          echo "=== 1. 표준 디렉토리 구조 생성 ($WINE_ARCH-unix) ==="
          mkdir -p "$TARGET_PREFIX/bin"
          mkdir -p "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix"
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          mkdir -p "$TARGET_PREFIX/share/wine/fonts"
          # NATIVE NLS 복사
          if [ -d "$NATIVE_NLS_DIR" ]; then
              cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          fi
          if [ -d "$SOURCE_DIR/fonts" ]; then
              cp -v "$SOURCE_DIR/fonts"/*.ttf "$SOURCE_DIR/fonts"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || true
          fi
          echo "=== 2. 유닉스 라이브러리(.so) 및 ntdll.so 강제 배치 ==="
          find "$BUILD_DIR" -name "ntdll.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/dlls" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;
          find "$BUILD_DIR/programs" -name "*.so" -exec cp -vL {} "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/" \;

          echo "=== 3. 로더 및 실행 파일 복사 ==="
          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              found=$(find "$BUILD_DIR" -type f -name "$prog" -executable | head -1)
              [ -n "$found" ] && cp -vL "$found" "$TARGET_PREFIX/bin/" || echo "⚠ $prog 찾지 못함"
          done

          echo "=== 4. 심볼릭 링크 재생성 (절대 경로 에러 방어) ==="
          # ntdll.so 링크가 실제로 존재하는지 확인 후 생성
          if [ -f "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/ntdll.so" ]; then
              cd "$TARGET_PREFIX/bin"
              # 상대 경로가 확실히 맞도록 해당 디렉토리로 이동 후 링크 생성
              ln -sf "../lib/wine/$WINE_ARCH-unix/ntdll.so" "ntdll.so"
              echo "✔ ntdll.so 심볼릭 링크 생성 완료"
          else
              echo "❌ 치명적 오류: ntdll.so 원본 파일이 없습니다!"
              exit 1
          fi         
          if [ -f "wine" ]; then
              cp -r wine wine64
          fi
          echo "=== 5. 환경 변수 및 공백 에러 방지 처리 ==="
          echo "=== 최종 구조 검증 ==="
          ls -l "$TARGET_PREFIX/bin/wine"
          ls -l "$TARGET_PREFIX/lib/wine/$WINE_ARCH-unix/ntdll.so"
  
      # ------------------------------------------------------------
      # 13. 验证安装目录内容（可选，便于调试）
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录 /tmp/wine-install-wow64 的内容："
          ls -la /tmp/wine-install-wow64/
          if [ -d /tmp/wine-install-wow64/bin ]; then
            echo "bin 目录内容："
            ls -la /tmp/wine-install-wow64/bin/
          fi
          if [ -d /tmp/wine-install-wow64/share ]; then
            echo "share 目录内容："
            ls -la /tmp/wine-install-wow64/share/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          mkdir -p wine-package/wine 
          cp -r /tmp/wine-install-wow64/* wine-package/wine/

      - name: 创建打包文件
        run: |
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C wine-package wine
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: Publish Wine to GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            - **Wine Branch**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine Version**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **Host Architecture**: Amd64
            - **Target Windows Architectures**: i386, x86_64 (via WOW64 emulation)

            - Build Time: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
