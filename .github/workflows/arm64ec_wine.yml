name: Build Wine AMD64 WOW64

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'proton'
        type: choice
        options:
        - proton
        - staging
        - protonec
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update

      - name: apt-amd64
        run: |
          apt-get install -y python3 python3-minimal \
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            gettext \
            libvulkan-dev \
            libgettextpo-dev

      - name: llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: locales
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Wine 源码（分支处理与原工作流一致）
      # ------------------------------------------------------------
      - name: Wine
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          case "$WINE_BRANCH" in
            protonec)
              echo "Processing protonarm64ec branch"

              git clone -b "proton_10.0" https://github.com/Stredohori/proton-wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            staging)
              echo " Staging "
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            proton)
              echo "Processing Proton branch"

              PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
              PROTON_COMMIT="${{ github.event.inputs.proton_commit || '' }}"

              git clone -b "$PROTON_BRANCH" https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
          esac

          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      - name: configure
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: native wine64 NLS
        run: |
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          ../source/configure \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-gstreamer \
            --without-wayland
          make __tooldeps__ -j$(nproc) > /dev/null
          echo "构建 NLS 目录..."
          make -C nls
          # 备份整个 nls 目录（跟随符号链接）
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          ls -la /opt/nls-backup/

      - name: 复制构建目录并验证 NLS（带恢复机制）
        run: |
          set -e
          mkdir -p /opt/wine64-native
          # 检查源文件，若不存在则从备份恢复（备份包含所有 nls 文件）
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          # 复制整个构建目录，使用 -aL 选项（归档且跟随符号链接）
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          # 验证复制后的文件是否为普通文件（不是符号链接）
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失或为无效符号链接，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      # ------------------------------------------------------------
      # 6. 修复 Termux 路径问题
      # ------------------------------------------------------------
      - name: Termux
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          echo "路径修复完成"
                    
          # 1. InterlockedOr 타입 캐스팅 수정 (atiadlxx)
          FILE="dlls/atiadlxx/atiadlxx_main.c"
          if [ -f "$FILE" ]; then
            if grep -q 'InterlockedOr(&dummy, 0)' "$FILE"; then
              # dummy 변수 선언을 long으로 변경하여 _InterlockedOr와의 호환성 확보
              sed -i 's/LONG dummy/long dummy/g' "$FILE"
              sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
              echo "✔ InterlockedOr patched with explicit casting"
            else
              echo "✔ InterlockedOr already patched or not found"
            fi
          fi

          FILE3="dlls/wdscore/wdscore.spec"
          if [ -f "$FILE3" ]; then
            if grep -q '@ stub' "$FILE3"; then
              echo "Cleaning wdscore.spec stubs..."
              sed -i '/CDynamicArray/d' "$FILE3"
              echo "✔ wdscore stubs cleaned"
            else
              echo "✔ wdscore already cleaned or not found"
            fi
          fi

          # 2. ntdll virtual.c 미초기화 변수 방어 (컴파일러 경고 해결)
          FILE="dlls/ntdll/unix/virtual.c"
          if [ -f "$FILE" ]; then
            if grep -q 'unsigned int vprot, sec_flags;' "$FILE"; then
              echo "Fixing uninitialized vprot in virtual.c..."
              sed -i 's/unsigned int vprot, sec_flags;/unsigned int vprot = 0, sec_flags = 0;/g' "$FILE"
            fi
          fi

          FILE="dlls/ntdll/unix/loader.c"
          if ! grep -q '/aarch64-windows' "$FILE"; then
            echo "Patching PE directory mapping..."
            sed -i 's|/x86_64-windows|/aarch64-windows|g' "$FILE"
          fi

          FILE="dlls/ntdll/loader.c"
          if [ -f "$FILE" ]; then
            if grep -q 'xtajit64\.dll' "$FILE"; then
              echo "Replacing xtajit64.dll with libarm64ecfex.dll..."
              sed -i 's|xtajit64\.dll|libarm64ecfex.dll|g' "$FILE"
            fi
            if grep -q 'ULONG buffer\[16\];' "$FILE"; then
              echo "Increasing loader buffer size from 16 to 32..."
              sed -i 's/ULONG buffer\[16\];/ULONG buffer\[32\];/g' "$FILE"
            fi
          fi

          INF="loader/wine.inf.in"
          if ! grep -q 'libarm64ecfex.dll' "$INF"; then
            echo "Patching wine.inf..."
            sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$INF"
            sed -i 's/xtajit\.dll/libwow64fex.dll/g' "$INF"
          fi

          # 5. FEX YMM State 대응 (unwind.h)
          FILE="dlls/ntdll/unwind.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            echo "Patching unwind flags for FEX YMM state..."
            sed -i '/ctx_flags_x64_to_arm/,/}/ {
              /CONTEXT_AMD64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_AMD64_XSTATE) ret |= CONTEXT_ARM64_FEX_YMMSTATE;/
            }' "$FILE"
            sed -i '/ctx_flags_arm_to_x64/,/}/ {
              /CONTEXT_ARM64_FLOATING_POINT/ s/$/\n          if (flags \& CONTEXT_ARM64_FEX_YMMSTATE) ret |= CONTEXT_AMD64_XSTATE;/
            }' "$FILE"
          fi

          # 6. winnt.h FEX 플래그 정의 추가
          FILE="include/winnt.h"
          if [ -f "$FILE" ] && ! grep -q 'CONTEXT_ARM64_FEX_YMMSTATE' "$FILE"; then
            echo "Patching winnt.h to match FEX diff..."
            sed -i 's|InterlockedOr(&dummy, 0)|_InterlockedOr((long volatile *)\&dummy, 0)|g' "$FILE"
            sed -i 's/^#define CONTEXT_ARM64_X18.*/#define CONTEXT_ARM64_X18             (CONTEXT_ARM64 | 0x00000010)/' "$FILE"
            if ! grep -q 'CONTEXT_ARM64_XSTATE' "$FILE"; then
              sed -i '/CONTEXT_ARM64_X18/a #define CONTEXT_ARM64_XSTATE          (CONTEXT_ARM64 | 0x00000020)' "$FILE"
            fi
            sed -i '/CONTEXT_ARM64_XSTATE/a #define CONTEXT_ARM64_FEX_YMMSTATE   (CONTEXT_ARM64 | 0x00000040)' "$FILE"
          fi

          # 8. Vulkan VRAM Faking 적용
          FILE="dlls/winevulkan/vulkan.c"
          if [ -f "$FILE" ] && ! grep -q 'WINE_VRAM_SIZE' "$FILE" ; then
            echo "Applying VRAM faking to winevulkan..."
            sed -i '/p_vkGetPhysicalDeviceMemoryProperties(host_physical_device, \&object->memory_properties);/a \
              { \
                  const char *v = getenv("WINE_VRAM_SIZE"); \
                  uint64_t s = v ? (uint64_t)atoll(v)*1024*1024 : (uint64_t)2048*1024*1024; \
                  uint32_t k; \
                  for (k=0; k<object->memory_properties.memoryHeapCount; k++) \
                      if (object->memory_properties.memoryHeaps[k].flags \& VK_MEMORY_HEAP_DEVICE_LOCAL_BIT) \
                          object->memory_properties.memoryHeaps[k].size = s; \
              }' "$FILE"
          fi

          export PATCH_BASE="https://raw.githubusercontent.com/mebabo1/menano/refs/heads/main/path"

          PATCH_FILES="1.patch 2.patch"
          echo "Applying external patches from $PATCH_BASE..."
          for FILE in $PATCH_FILES; do
            URL="${PATCH_BASE}/${FILE}"
            PATCH_FILE="$FILE"           
            echo "--------------------------------------------"
            echo "Downloading $PATCH_FILE..."
            wget -q -O "$PATCH_FILE" "$URL"
            
            if git apply --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "✔ $PATCH_FILE can be applied cleanly"
                git apply --whitespace=fix "$PATCH_FILE"
            elif git apply --3way --check "$PATCH_FILE" > /dev/null 2>&1; then
                echo "⚠ Applying $PATCH_FILE with 3-way merge"
                git apply --3way --whitespace=fix "$PATCH_FILE"
            else
                echo "❌ $PATCH_FILE failed, generating rejects"
                git apply --reject --whitespace=fix "$PATCH_FILE" || true
                find . -name "*.rej"
            fi
          done
          echo "--------------------------------------------"
          echo "✔ All patch processes completed"

      - name: configure
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      - name: apt-aarch64 (Source Separation & Optimized Install)
        run: |
          set -e
          echo "📦 Configuring Multi-arch APT sources..."
          
          # 1. 기존 리스트 백업 및 아키텍처별 분리 설정
          # 기존 소스에서 주석을 제외하고 모든 'deb' 앞에 [arch=amd64] 추가
          grep -v '^#' /etc/apt/sources.list | sed 's/^deb /deb [arch=amd64] /g' > /tmp/amd64.list
          # amd64 리스트를 기반으로 arm64용 리스트 생성
          sed -e 's/\[arch=amd64\]/[arch=arm64]/g' /tmp/amd64.list > /tmp/arm64.list
          # 두 리스트를 합쳐서 적용
          cat /tmp/amd64.list /tmp/arm64.list > /etc/apt/sources.list

          # 2. 아키텍처 추가 및 업데이트
          dpkg --add-architecture arm64
          apt-get update

          # 3. 크로스 빌드 도구 및 arm64 라이브러리 설치
          # --no-install-recommends를 사용하여 불필요한 용량 차지 방지
          apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libx11-dev:arm64 \
            libxext-dev:arm64 \
            libxi-dev:arm64 \
            libxrandr-dev:arm64 \
            libxcursor-dev:arm64 \
            libxcomposite-dev:arm64 \
            libxdamage-dev:arm64 \
            libxfixes-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrender-dev:arm64 \
            libxinerama-dev:arm64 \
            libgl-dev:arm64 \
            libsdl2-dev:arm64 \
            libglu-dev:arm64 \
            libosmesa6-dev:arm64 \
            libfreetype6-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libpcap-dev:arm64 \
            libdbus-1-dev:arm64 \
            libssl-dev:arm64 \
            libasound2-dev:arm64 \
            libpulse-dev:arm64 \
            libudev-dev:arm64 \
            libcups2-dev:arm64 \
            libjpeg-dev:arm64 \
            libpng-dev:arm64 \
            libtiff-dev:arm64 \
            libxml2-dev:arm64 \
            libvulkan-dev:arm64 \
            libgettextpo-dev:arm64

      - name: ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64
                    
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export LLVM_MINGW_PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin"
          export PATH="$LLVM_MINGW_PATH:$PATH"

          export i386_CC="$LLVM_MINGW_PATH/i686-w64-mingw32-clang"
          export x86_64_CC="$LLVM_MINGW_PATH/x86_64-w64-mingw32-clang"
          export arm64ec_CC="$LLVM_MINGW_PATH/arm64ec-w64-mingw32-clang"
          export aarch64_CC="$LLVM_MINGW_PATH/aarch64-w64-mingw32-clang"

          export deps="/data/data/com.termux/files/usr"
          export depsg="/data/data/com.termux/files/usr/glibc"

          # export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          # export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          # export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          # export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          export CFLAGS="-march=armv8-a -O3 -pipe"
          export CXXFLAGS="-march=armv8-a -O3 -pipe"
          export CROSSCFLAGS="-march=armv8-a -O3 -pipe"
          export CROSSCXXFLAGS="-march=armv8-a -O3 -pipe"

          export PULSE_CFLAGS="-I$deps/include/pulse"
          export PULSE_LIBS="-L$deps/lib/pulseaudio -lpulse"
          # export FFMPEG_CFLAGS="-I$depsg/include/libavutil"
          # export FFMPEG_LIBS="-L$depsg/lib -lavutil -lavcodec -lavformat"
          # export GSTREAMER_CFLAGS="-I$depsg/include/gstreamer-1.0 -I$deps/include/glib-2.0 -I$deps/lib/glib-2.0/include -I$deps/glib-2.0/include -I$deps/lib/gstreamer-1.0/include"
          # export GSTREAMER_LIBS="-L$depsg/lib -lgstgl-1.0 -lgstapp-1.0 -lgstvideo-1.0 -lgstaudio-1.0 -lglib-2.0 -lgobject-2.0 -lgio-2.0 -lgsttag-1.0 -lgstbase-1.0 -lgstreamer-1.0"

          # export LDFLAGS="-L/usr/lib/x86_64-linux-gnu -L/lib/x86_64-linux-gnu"
          export LDFLAGS="-s -L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=$depsg/lib/ld-linux-aarch64.so.1 -Wl,-rpath=$depsg/lib"
          
          ../configure \
            --host=aarch64-linux-gnu \
            --enable-archs=arm64ec,aarch64,i386 \
            --prefix=/tmp/wine-install-wow64 \
            --with-wine-tools=/opt/wine64-native \
            --with-mingw=clang \
            --with-i386-windows-target=i686-w64-mingw32 \
            --enable-win64 \
            --with-vulkan \
            --enable-nls \
            --with-pulse \
            --without-ffmpeg \
            --disable-win16 \
            --without-gstreamer \
            --disable-opencl \
            --without-alsa \
            --disable-tests \
            --without-capi \
            --without-coreaudio \
            --without-cups \
            --without-dbus \
            --without-gphoto \
            --without-gssapi \
            --without-krb5 \
            --without-alsa \
            --without-netapi \
            --without-oss \
            --without-pcap \
            --without-pcsclite \
            --without-sane \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --without-xinerama \
            --with-xshm \
            --without-xxf86vm
            
          make -j$(nproc) > /dev/null
          make install

          # 验证安装是否生成 bin 目录（若缺失则报错）
          if [ ! -d /tmp/wine-install-wow64/bin ]; then
            echo "错误: /tmp/wine-install-wow64/bin 目录不存在，安装可能不完整"
            exit 1
          fi
      # ------------------------------------------------------------
      # 12. 全面补全安装目录的运行时文件（增强版：优先从 programs/ 查找）
      # ------------------------------------------------------------
      - name: 全面补全安装目录的运行时文件（增强版）
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          SOURCE_FONTS_DIR="$SOURCE_DIR/fonts"

          echo "=== 补全 share/wine/nls ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          if [ -d "$NATIVE_NLS_DIR" ]; then
              cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || echo "没有找到 .nls 文件，可能已存在"
          fi
          if [ ! -f "$TARGET_PREFIX/share/wine/nls/locale.nls" ] && [ -f "/opt/nls-backup/locale.nls" ]; then
              cp -v "/opt/nls-backup/locale.nls" "$TARGET_PREFIX/share/wine/nls/"
          fi

          echo "=== 补全 share/wine/fonts ==="
          if [ -d "$SOURCE_FONTS_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine/fonts"
              cp -v "$SOURCE_FONTS_DIR"/*.ttf "$SOURCE_FONTS_DIR"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || echo "字体复制完成或无字体文件"
          else
              echo "警告: 源码 fonts 目录不存在，跳过字体复制"
          fi

          echo "=== 补全 wine.inf ==="
          # 查找构建生成的 wine.inf（优先）
          WINE_INF_SRC=$(find "$BUILD_DIR" -name "wine.inf" -type f 2>/dev/null | head -1)
          if [ -z "$WINE_INF_SRC" ]; then
              # 如果未生成，尝试从源码目录复制原始文件
              if [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf"
              elif [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf.in" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf.in"
              fi
          fi
          if [ -n "$WINE_INF_SRC" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine"
              TARGET_INF="$TARGET_PREFIX/share/wine/wine.inf"
              cp -v "$WINE_INF_SRC" "$TARGET_INF"
              sed -i 's/xtajit64\.dll/libarm64ecfex.dll/g' "$TARGET_INF"
              sed -i 's/xtajit\.dll/libwow64fex.dll/g' "$TARGET_INF"
              grep -E 'arm64ecfex|wow64fex|xtajit' "$TARGET_INF" || true
          else
              echo "警告: 未找到 wine.inf 文件"
          fi

      - name: Architecture Agnostic & Complete Installation
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          
          echo "=== 1. 아키텍처 자동 감지 ==="
          # .so 파일 경로를 분석하여 x86_64-unix 또는 aarch64-unix 등을 찾아냅니다.
          DETECTED_ARCH=$(find "$BUILD_DIR" -name "*.so" -type f | grep -oP '(?<=dlls/).*(?=-unix/|/)' | head -1 | cut -d'/' -f1 || echo "")
          
          if [ -z "$DETECTED_ARCH" ]; then
              DETECTED_ARCH=$(uname -m)
              echo "아키텍처 감지 실패, 기본값 사용: $DETECTED_ARCH"
          fi
          
          UNIX_LIB_DIR="$TARGET_PREFIX/lib/wine/${DETECTED_ARCH}-unix"
          echo "검색된 아키텍처: $DETECTED_ARCH"
          echo "타겟 라이브러리 경로: $UNIX_LIB_DIR"

          # 필수 디렉토리 생성
          mkdir -p "$TARGET_PREFIX/bin"
          mkdir -p "$UNIX_LIB_DIR"
          mkdir -p "$TARGET_PREFIX/lib/wine"

          echo "=== 2. 핵심 프로그램 복사 (PE/WOW64) ==="
          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              # 이미 설치된 경우 스킵 (make install에서 들어온 경우)
              [ -f "$TARGET_PREFIX/bin/$prog" ] && continue
              
              found=$(find "$BUILD_DIR" -type f \( -name "$prog" -o -name "$prog.exe" \) | grep -E "loader/wine$|server/wineserver$|programs/" | head -1)
              if [ -n "$found" ]; then
                  echo "Copying $prog from $found"
                  cp -v "$found" "$TARGET_PREFIX/bin/$prog"
                  chmod +x "$TARGET_PREFIX/bin/$prog"
              fi
          done

          echo "=== 3. Unix 라이브러리 (.so) 통합 및 링크 ==="
          # 모든 .so 파일을 찾아 타겟 디렉토리로 이동
          find "$BUILD_DIR" -name "*.so" -type f -exec cp -v {} "$UNIX_LIB_DIR/" \;

          # 링크 생성 (상대 경로 사용으로 이식성 강화)
          cd "$UNIX_LIB_DIR"
          for so_file in *.so; do
              [ -e "$so_file" ] || continue
              # /bin/ 폴더에서 라이브러리를 직접 참조할 수 있도록 링크
              ln -sf "../lib/wine/${DETECTED_ARCH}-unix/$so_file" "$TARGET_PREFIX/bin/$so_file"
              # /lib/ 루트에서도 참조 가능하게 링크
              ln -sf "wine/${DETECTED_ARCH}-unix/$so_file" "$TARGET_PREFIX/lib/$so_file"
          done

          echo "=== 4. 검증 ==="
          for required in wine wineserver wineboot; do
              if [ ! -f "$TARGET_PREFIX/bin/$required" ]; then
                  echo "❌ 오류: 필수 파일 $required 가 없습니다."
                  exit 1
              fi
          done
          echo "✅ 모든 필수 파일 및 라이브러리 보정 완료"

          echo "=== 最终安装目录结构预览 ==="
          ls -la "$TARGET_PREFIX/share/wine/" || true
          ls -la "$TARGET_PREFIX/bin/" || true

      # ------------------------------------------------------------
      # 13. 验证安装目录内容（可选，便于调试）
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录 /tmp/wine-install-wow64 的内容："
          ls -la /tmp/wine-install-wow64/
          if [ -d /tmp/wine-install-wow64/bin ]; then
            echo "bin 目录内容："
            ls -la /tmp/wine-install-wow64/bin/
          fi
          if [ -d /tmp/wine-install-wow64/share ]; then
            echo "share 目录内容："
            ls -la /tmp/wine-install-wow64/share/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          mkdir -p wine-package/wine 
          cp -r /tmp/wine-install-wow64/* wine-package/wine/

      - name: 创建打包文件
        run: |
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C wine-package wine
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: Publish Wine to GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            - **Wine Branch**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine Version**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **Host Architecture**: ARM64 (aarch64)
            - **Target Windows Architectures**: i386, x86_64, arm64ec (via WOW64 emulation)

            - Build Time: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
