name: Build lsfg-vk ARM64 (Termux glibc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout lsfg-vk repository
      uses: actions/checkout@v4
      with:
        repository: PancakeTAS/lsfg-vk
        ref: ff1a0f72a7d6d08b84d58b7b4dc5f05c9f904f98
        fetch-depth: 0
        submodules: recursive

    - name: Install Build Tools & ARM64 Cross-Compiler
      run: |
        sudo apt-get update
        # vulkan-headers 제거하고 libvulkan-dev만 설치
        sudo apt-get install -y cmake ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libvulkan-dev

    - name: Termux glibc path patches
      run: |
        # /tmp 경로를 Termux glibc 내부 임시 폴더 경로로 일치화
        find . -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
  
    - name: Configure lsfg-vk for Termux glibc
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=./target \
          -DLSFGVK_BUILD_VK_LAYER=ON \
          -DLSFGVK_BUILD_UI=OFF \
          -DLSFGVK_BUILD_CLI=OFF \
          -DLSFGVK_INSTALL_XDG_FILES=OFF \
          -DLSFGVK_LAYER_LIBRARY_PATH="/data/data/com.termux/files/usr/glibc/lib/liblsfg-vk-layer.so" \

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Install
      run: cmake --install build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsfg-vk-termux-glibc
        path: target/*
