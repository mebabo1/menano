name: Build VMA (ARM64 for Termux glibc)

on:
  workflow_dispatch: # 수동 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout VMA
      uses: actions/checkout@v4
      with:
        repository: GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator
        fetch-depth: 0

    - name: Install ARM64 Toolchain
      run: |
        sudo apt update
        sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake ninja-build

    - name: Setup Vulkan Headers
      run: |
        git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git
        echo "VULKAN_HEADERS_DIR=$GITHUB_WORKSPACE/Vulkan-Headers" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        # VMA는 루트에 CMakeLists.txt가 있으므로 -S . 을 사용합니다.
        cmake -S . -B build -G Ninja \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DVulkan_INCLUDE_DIR=$VULKAN_HEADERS_DIR/include \
          -DVMA_BUILD_SAMPLES=OFF \
          -DVMA_BUILD_TESTS=OFF \
          -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-shlib-undefined"

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vma-arm64
        path: build/
