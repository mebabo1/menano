name: Build lsfg-vk ARM64 (Termux Bionic Native)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout lsfg-vk repository
      uses: actions/checkout@v4
      with:
        repository: RedClient231/LSFG-MODIFIED
        fetch-depth: 0
        submodules: recursive

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build wget unzip

    - name: Install Android NDK (r26d)
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip -q android-ndk-r26d-linux.zip
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r26d" >> $GITHUB_ENV

    - name: Configure lsfg-vk for Termux Bionic
      run: |
        # NDK 툴체인 파일을 사용하여 Android 네이티브(Bionic) 타겟팅
        cmake -S lsfg-vk-android -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=./target \
          -DLSFGVK_BUILD_VK_LAYER=ON \
          -DLSFGVK_BUILD_UI=OFF \
          -DLSFGVK_BUILD_CLI=OFF \
          -DLSFGVK_INSTALL_XDG_FILES=OFF \
          -DLSFGVK_LAYER_LIBRARY_PATH="/data/data/com.termux/files/usr/lib/liblsfg-vk-layer.so"

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Install
      run: cmake --install build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsfg-vk-termux-bionic
        path: target/*
