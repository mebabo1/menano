name: Build lsfg-vk ARM64 (Manual)

on:
  workflow_dispatch: # Actions 탭에서 수동으로 버튼을 눌러 실행할 수 있게 합니다.

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout lsfg-vk repository
      uses: actions/checkout@v4
      with:
        repository: PancakeTAS/lsfg-vk  # <== [핵심] 가져올 원본 소스코드 저장소를 정확히 지정합니다.
        fetch-depth: 0
        ref: ff1a0f72a7d6d08b84d58b7b4dc5f05c9f904f98
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git curl llvm clang clang-tools clang-tidy \
          cmake ninja-build pkg-config \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          libvulkan-dev mesa-common-dev

    - name: Update Vulkan headers
      run: |
        git clone -b vulkan-sdk-1.4.328 https://github.com/KhronosGroup/Vulkan-Headers /tmp/vkh
        sudo rm -rf /usr/include/{vulkan,vk_video}
        sudo mv /tmp/vkh/include/{vulkan,vk_video} /usr/include/
        rm -rf /tmp/vkh
        
    - name: Android Turnip patches
      run: |
        find . -type f \( -name "*.cpp" -o -name "*.hpp" \) | while read f; do
          sed -i 's/VK_PRESENT_MODE_MAILBOX_KHR/VK_PRESENT_MODE_FIFO_KHR/g' "$f"
        done

        find . -type f \( -name "*.cpp" -o -name "*.hpp" \) | while read f; do
          sed -i 's/minImageCount\s*=\s*5/minImageCount = 3/g' "$f"
          sed -i 's/imageCount\s*=\s*5/imageCount = 3/g' "$f"
        done

        find . -type f \( -name "*.cpp" -o -name "*.hpp" \) | while read f; do
          sed -i 's/VK_EXTERNAL_SEMAPHORE_HANDLE_TYPE_OPAQUE_FD_BIT/VK_EXTERNAL_SEMAPHORE_HANDLE_TYPE_SYNC_FD_BIT/g' "$f"
          sed -i 's/exportInfo.handleTypes =/exportInfo.handleTypes = 0; \/\/ Patched for Android /g' "$f"
        done

        VOLK_FILE="framegen/src/thirdparty/volk.c"
        if [ -f "$VOLK_FILE" ]; then
          echo "Found volk.c! Applying vkWaitForPresentKHR patch..."
          sed -i 's/vkWaitForPresentKHR = (PFN_vkWaitForPresentKHR)load(context, "vkWaitForPresentKHR");/vkWaitForPresentKHR = NULL;/g' "$VOLK_FILE"
          sed -i 's/table->vkWaitForPresentKHR = (PFN_vkWaitForPresentKHR)load(context, "vkWaitForPresentKHR");/table->vkWaitForPresentKHR = NULL;/g' "$VOLK_FILE"
        else
          echo "WARNING: volk.c not found! Check submodules."
        fi

        DEVICE_FILE="framegen/src/core/device.cpp"
        if [ -f "$DEVICE_FILE" ]; then
          sed -i 's/VK_KHR_EXTERNAL_SEMAPHORE_FD_EXTENSION_NAME/VK_ANDROID_EXTERNAL_MEMORY_ANDROID_HARDWARE_BUFFER_EXTENSION_NAME/g' "$DEVICE_FILE"
        fi
        
    - name: Configure lsfg-vk
      run: |
        export CFLAGS="-O2"
        export CXXFLAGS="-O2"
        
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_INSTALL_PREFIX=./target \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DLSFGVK_BUILD_VK_LAYER=ON \
          -DLSFGVK_BUILD_UI=OFF \
          -DLSFGVK_BUILD_CLI=OFF \
          -DLSFGVK_INSTALL_XDG_FILES=OFF \
          -DLSFGVK_LAYER_LIBRARY_PATH="/data/data/com.termux/files/usr/glibc/lib/liblsfg-vk-layer.so"

    - name: Build with Ninja
      run: |
        ninja -C build

    - name: Install with CMake
      run: |
        cmake --install build

    - name: Upload lsfg-vk artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsfg-vk-arm64
        path: target/*
