name: Build lsfg-vk ARM64 (Manual)

on:
  workflow_dispatch: # Actions 탭에서 수동으로 버튼을 눌러 실행할 수 있게 합니다.

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout lsfg-vk repository
      uses: actions/checkout@v4
      with:
        repository: FrankBarretta/lsfg-vk-android  # <== [핵심] 가져올 원본 소스코드 저장소를 정확히 지정합니다.
        fetch-depth: 0
        ref:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git curl llvm clang clang-tools clang-tidy \
          cmake ninja-build pkg-config \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          libvulkan-dev mesa-common-dev

    - name: Update Vulkan headers
      run: |
        git clone -b vulkan-sdk-1.4.328 https://github.com/KhronosGroup/Vulkan-Headers /tmp/vkh
        sudo rm -rf /usr/include/{vulkan,vk_video}
        sudo mv /tmp/vkh/include/{vulkan,vk_video} /usr/include/
        rm -rf /tmp/vkh

    - name: Fix Fundamental Vulkan Types (VkFlags)
      run: |
        # 모든 .cpp, .hpp 파일의 맨 윗줄에 가장 안전한 방식으로 헤더를 삽입합니다.
        # vulkan.h는 내부적으로 기초 타입(VkFlags 등)을 모두 포함합니다.
        find . -type f \( -name "*.cpp" -o -name "*.hpp" \) | while read f; do
          # 기존에 우리가 넣었을지 모르는 중복 include를 방지하기 위해 
          # 맨 윗줄에 'vulkan.h'와 'android' 관련 헤더만 깔끔하게 넣습니다.
          # VK_NO_PROTOTYPES를 코드 내에서도 정의하여 안전성을 높입니다.
          sed -i '1i #ifndef VK_NO_PROTOTYPES\n#define VK_NO_PROTOTYPES\n#endif\n#include <vulkan/vulkan.h>\n#ifdef __ANDROID__\n#include <android/hardware_buffer.h>\n#endif' "$f"
        done

    - name: Download Android Native Headers
      run: |
        sudo mkdir -p /usr/include/android
        BASE_URL="https://raw.githubusercontent.com/aosp-mirror/platform_frameworks_native/master/libs/nativewindow/include/android"
        sudo curl -L -o /usr/include/android/hardware_buffer.h "$BASE_URL/hardware_buffer.h"
        sudo curl -L -o /usr/include/android/native_window.h "$BASE_URL/native_window.h"
        sudo chmod 644 /usr/include/android/*.h
 
    - name: Configure lsfg-vk
      run: |
        export CFLAGS="-O2 -D__ANDROID__"   # C 컴파일러에 안드로이드 매크로 주입
        export CXXFLAGS="-O2 -D__ANDROID__" # C++ 컴파일러에 안드로이드 매크로 주입
        
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_INSTALL_PREFIX=./target \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DLSFGVK_BUILD_VK_LAYER=ON \
          -DLSFGVK_BUILD_UI=OFF \
          -DLSFGVK_BUILD_CLI=OFF \
          -DLSFGVK_INSTALL_XDG_FILES=OFF \
          -DCMAKE_C_FLAGS="-D__ANDROID__ -DVK_NO_PROTOTYPES" \
          -DCMAKE_CXX_FLAGS="-D__ANDROID__ -DVK_NO_PROTOTYPES" \
          -DLSFGVK_LAYER_LIBRARY_PATH="/data/data/com.termux/files/usr/glibc/lib/liblsfg-vk-layer.so"

    - name: Build with Ninja
      run: |
        ninja -C build

    - name: Install with CMake
      run: |
        cmake --install build

    - name: Upload lsfg-vk artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsfg-vk-arm64
        path: target/*
