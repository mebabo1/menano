name: Build Android Vulkan Wrapper mail

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🌟 1. 소스코드 레포지토리를 leegao의 bionic-vulkan-wrapper로 전격 교체
      - name: Clone Bionic Vulkan Wrapper
        run: |
          git clone --depth 1 https://github.com/leegao/bionic-vulkan-wrapper.git wrapper-src
          
      # 🌟 2. 툴체인 및 빌드에 필요한 핵심 도구만 설치 (Meson, Python 종속성 제거)
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip pkg-config cmake ninja-build build-essential

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      # 🌟 3. CMake 구동 및 Android NDK 크로스 컴파일러 연결
      - name: Configure CMake
        run: |
          cd wrapper-src
          mkdir build && cd build
          
          # NDK 내부의 표준 android.toolchain.cmake를 활용하여 가장 안정적인 빌드 환경을 잡습니다.
          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${API_LEVEL} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-D__TERMUX__ -D__USE_GNU -U__ANDROID__ -idirafter$TERMUX_PREFIX/include" \
            -DCMAKE_C_FLAGS="-D__TERMUX__ -D__USE_GNU -U__ANDROID__ -idirafter$TERMUX_PREFIX/include" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem" \
            -DCMAKE_INSTALL_PREFIX=$PWD/install_output

      # 🌟 4. 빌드 및 산출물 추출
      - name: Build
        run: |
          cd wrapper-src/build
          ninja -v 2>&1 | tee build.log

      - name: Install
        run: |
          cd wrapper-src/build
          ninja install

      - name: Show Files
        run: |
          echo "=== Installed Files ==="
          find wrapper-src/build/install_output -type f || true
          echo "=== All Built .so Files ==="
          find wrapper-src/build -name "*.so"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bionic-vulkan-wrapper
          path: |
            wrapper-src/build/build.log
            wrapper-src/build/*.so
            wrapper-src/build/install_output
