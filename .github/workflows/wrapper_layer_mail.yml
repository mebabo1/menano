name: Build Android Vulkan Wrapper mail

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Bionic Vulkan Wrapper
        run: |
          git clone --depth 1 https://github.com/leegao/bionic-vulkan-wrapper.git wrapper-src
          
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget unzip pkg-config build-essential

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "RUNTIME_PATH=/data/data/com.termux/files/usr" >> $GITHUB_ENV

      # 🌟 [수정] CMake 대신 ndk-build를 사용하여 프로젝트 본래 규격대로 빌드합니다.
      - name: Build with NDK-Build
        run: |
          cd wrapper-src
          
          # NDK 내부의 ndk-build 실행 파일 경로 지정
          NDK_BUILD=$ANDROID_NDK/ndk-build
          
          # Termux 전용 컴파일 옵션 및 링크 옵션을 ndk-build 인자로 직접 주입합니다.
          $NDK_BUILD \
            APP_ABI=arm64-v8a \
            APP_PLATFORM=android-${API_LEVEL} \
            APP_BUILD_SCRIPT=./Android.mk \
            NDK_PROJECT_PATH=. \
            TARGET_CFLAGS="-D__TERMUX__ -D__USE_GNU -U__ANDROID__ -idirafter$TERMUX_PREFIX/include" \
            TARGET_LDFLAGS="-L$TERMUX_PREFIX/lib -Wl,-rpath=$RUNTIME_PATH/lib -landroid-shmem" \
            V=1

      - name: Show Built Files
        run: |
          echo "=== All Built Files ==="
          find wrapper-src/libs -type f || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bionic-vulkan-wrapper
          path: |
            wrapper-src/libs/arm64-v8a/*.so
