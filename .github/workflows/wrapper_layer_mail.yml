name: Build Android Vulkan Wrapper mail

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r27
      API_LEVEL: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. leegao의 패키지 빌드 허브를 클론합니다. (서브모듈은 수동으로 처리하므로 기본 클론)
      - name: Clone Vulkan Wrapper Packages Hub
        run: |
          git clone --depth 1 \
            https://github.com/leegao/vulkan_wrapper_termux-packages.git \
            mesa-src

      # 2. 권한 오류를 막기 위해 SPIRV-Tools 주소를 HTTPS로 바꾸고 수동 업데이트합니다.
      - name: Initialize SPIRV-Tools Submodule
        run: |
          cd mesa-src
          git submodule init SPIRV-Tools
          git config submodule.SPIRV-Tools.url "https://github.com/leegao/SPIRV-Tools.git"
          git submodule update --depth 1 SPIRV-Tools

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip pkg-config ninja-build cmake bison flex python3-dev \
            libx11-dev libxext-dev libxcb1-dev libxrandr-dev libxfixes-dev \
            libxshmfence-dev libdrm-dev zlib1g-dev libzstd-dev glslang-tools

          python -m pip install --upgrade pip
          python -m pip install meson mako pyyaml ninja

      - name: Download Android NDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download and extract termuxfs for aarch64
        run: |
          mkdir -p $HOME/termuxfs/aarch64
          cd $HOME/termuxfs/aarch64
          wget -q https://github.com/ziad9267/termux-on-gha/releases/download/test/termuxfs.tar
          tar -xf termuxfs.tar
          
          echo "TERMUX_PREFIX=$HOME/termuxfs/aarch64/data/data/com.termux/files/usr" >> $GITHUB_ENV
          echo "TERMUX_SYSROOT=$HOME/termuxfs/aarch64" >> $GITHUB_ENV

      # 🌟 [핵심 변경] 우리가 직접 세팅하지 않고, 내장된 빌드 스크립트를 실행합니다.
      # 스크립트가 요구하는 환경변수(NDK 경로 등)만 정확히 수동으로 찔러넣어 줍니다.
      - name: Build Vulkan Wrapper via Official Script
        run: |
          cd mesa-src
          
          # 스크립트가 실행될 수 있도록 실행 권한 부여
          chmod +x *.sh
          
          # 환경변수 동기화
          export ANDROID_NDK="$ANDROID_NDK"
          export TERMUX_STANDALONE_TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64"
          
          # 저장소 전용 빌드 스크립트 구동 (wrapper 또는 mesa 패키지 타겟팅)
          # ./build-package.sh가 내부적으로 소스를 받고 패치한 뒤 SPIRV-Tools까지 결합하여 자동 빌드합니다.
          ./build-package.sh wrapper || ./build-package.sh mesa_bionic

      # 3. 빌드가 완료되면 생성된 템플릿 파일(.deb 또는 .so)들을 아티팩트로 수집합니다.
      - name: Show and Gather Files
        run: |
          echo "=== Built Packages ==="
          find mesa-src/debs mesa-src/packages -type f || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-packages
          path: |
            mesa-src/debs/
            mesa-src/packages/
