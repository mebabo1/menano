name: Build Android Vulkan Wrapper mail

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wrapper:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. leegao의 통합 빌드 패키지 허브를 가져옵니다.
      - name: Clone Vulkan Wrapper Packages Hub
        run: |
          git clone --depth 1 \
            https://github.com/leegao/vulkan_wrapper_termux-packages.git \
            termux-packages

      # 2. 인증 에러를 우회하여 SPIRV-Tools 서브모듈을 HTTPS로 동기화합니다.
      - name: Initialize SPIRV-Tools Submodule
        run: |
          cd termux-packages
          git submodule init SPIRV-Tools
          git config submodule.SPIRV-Tools.url "https://github.com/leegao/SPIRV-Tools.git"
          git submodule update --depth 1 SPIRV-Tools

      # 3. Termux 전용 공식 도커 환경 빌드 스크립트 구동
      # 이 저장소의 공식 빌드법은 ./run-docker.sh를 이용해 도커 내부에서 패키지를 빌드하는 것입니다.
      - name: Build Packages inside Termux Docker
        run: |
          cd termux-packages
          
          # 실행 권한 부여
          chmod +x *.sh scripts/*.sh
          
          # [핵심] 도커 컨테이너를 띄우고, 컨테이너 안에서 build-package.sh를 실행하도록 명령을 내립니다.
          # -a aarch64 옵션으로 안드로이드용(ARM64) 크로스 컴파일을 강제 지정합니다.
          echo "=== Starting Termux Docker Build ==="
          
          # packages 폴더 내부를 뒤져서 순서대로 도커 빌드 환경에 밀어 넣습니다.
          for pkg in $(ls packages/); do
            echo "🎯 Building $pkg inside Docker container..."
            ./run-docker.sh ./build-package.sh -a aarch64 "$pkg" || echo "⚠️ $pkg build encountered an issue, continuing..."
          done

      # 4. 도커 환경 내부에서 최종 생성된 아웃풋 빌드 파일(.deb)들을 수집합니다.
      - name: Show and Gather Compiled Libraries
        run: |
          echo "=== Compiled Debian Packages (.deb) ==="
          find termux-packages/debs -type f -name "*.deb" || true
          
          # 만약 압축 해제된 순수 .so 라이브러리 파일이 필요할 경우를 대비해 packages 트리 내부도 검색합니다.
          echo "=== Compiled Dynamic Libraries (.so) ==="
          find termux-packages/packages -type f -name "*.so" || true

      # 5. 최종 추출된 .deb 패키지와 바이너리 파일들을 GitHub Artifact로 업로드합니다.
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-wrapper-final-binaries
          path: |
            termux-packages/debs/
            termux-packages/packages/**/*.so
          if-no-files-found: error
